  const p=(phone||"").replace(/^0/,"972").replace(/[-\s]/g,"");
  if(!p&&!msg){toast("⚠️ אין מספר טלפון");return}
  const encodedMsg=msg?encodeURIComponent(msg):"";
  let url;
  if(p){

  }else{
    url="https://api.whatsapp.com/send?text="+encodedMsg;
  }

}

function ImgUp({images=[],onAdd,onRemove}){const fr=useRef();const[prev,setPrev]=useState(null);function handle(files){const arr=Array.from(files);let results=[];let done=0;arr.forEach(f=>{const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const MAX=500;let w=img.width,h=img.height;if(w>MAX||h>MAX){if(w>h){h=Math.round(h*(MAX/w));w=MAX}else{w=Math.round(w*(MAX/h));h=MAX}}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(img,0,0,w,h);const compressed=c.toDataURL("image/jpeg",0.4);results.push({id:Date.now()+Math.random(),url:compressed});done++;if(done===arr.length)onAdd(results.length===1?results[0]:results)};img.src=e.target.result};r.readAsDataURL(f)})}return <div>{prev&&<div onClick={()=>setPrev(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"zoom-out"}}><img src={prev} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16}}/></div>}<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{images.map(img=><div key={img.id} style={{position:"relative"}}><img src={img.url} onClick={()=>setPrev(img.url)} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)",cursor:"pointer"}}/>{onRemove&&<button onClick={()=>onRemove(img.id)} style={{position:"absolute",top:-8,left:-8,width:24,height:24,borderRadius:"50%",background:RE,border:"2px solid #07060d",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button>}</div>)}{onAdd&&<button onClick={()=>fr.current.click()} style={{width:92,height:74,borderRadius:12,border:"2px dashed rgba(201,168,76,0.3)",background:"rgba(201,168,76,0.04)",color:G,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,fontSize:12,fontWeight:700}}><span style={{fontSize:26}}>📷</span>הוסף</button>}</div>{onAdd async function aiCall(prompt,max=900){
  const key=getKey();
  if(!key){toast("⚠️ חסר API Key — לחץ ⚙️ הגדרות");throw new Error("no key")}
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,
      system:"אתה עוזר אישי של חיים בן סימון, מתווך נדל\"ן RE/MAX בבאר שבע עם 13 שנות ניסיון. ענה תמיד בעברית, בקצרה ובמקצועיות.",
      messages:[{role:"user",content:prompt}]})
  });
  const d=await r.json();
  if(d.error){toast("⚠️ "+d.error.message);throw new Error(d.error.message)}
  return d.content.map(i=>i.text||"").join("").trim()
}

function GradeBadge({grade,onChange}){const[open,setOpen]=useState(false);const g=GRADES[grade||"B"];return <div style={{position:"relative"}}><button onClick={()=>setOpen(!open)} style={{background:g.c+"18",border:"1px solid "+g.c+"44",borderRadius:10,padding:"5px 14px",color:g.c,fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{g.l} ▾</button>{open&&<div style={{position:"absolute",top:"115%",right:0,background:"#1c1a28",border:"1px solid rgba(255,255,255,0.12)",borderRadius:14,zIndex:200,minWidth:155,overflow:"hidden",boxShadow:"0 12px 40px rgba(0,0,0,.5)"}}>{Object.entries(GRADES).map(([k,v])=><div key={k} onClick={()=>{onChange(k);setOpen(false);toast("✅ דירוג עודכן ל-"+k)}} style={{padding:"12px 18px",cursor:"pointer",color:v.c,fontSize:14,fontWeight:700,borderBottom:"1px solid rgba(255,255,255,0.06)"}}>{v.l}</div>)}</div>}</div>}

// ━━━ DASHBOARD ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Dashboard({buyers,sellers,tasks,hotProps,setHotProps,brokerProps,setTab,setCrmInitTab}){
  const today=new Date();
  const pending=tasks.filter(t=>!t.done).length;
  const expiring=sellers.filter(s=>{const d=daysTo(s.exclusiveEnd);return d!==null&&d>=0&&d<=14});
  const sentBuyers=buyers.filter(b=>b.sentProperties&&b.sentProperties.length>0);
  const allProps=[...sellers.map(s=>({...s,source:"seller"})),...(brokerProps||[]).map(p=>({...p,source:"broker"}))];
  const[showHotPicker,setShowHotPicker]=useState(false);

  return <div style={{padding:S.pg}} className="fade">
    <div style={{marginBottom:24}}><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:30,fontWeight:900,lineHeight:1.2}}><span className="shimmer">שלום חיים 👋</span></div><div style={{color:"#666",fontSize:15,marginTop:6}}>{today.toLocaleDateString("he-IL",{weekday:"long",day:"numeric",month:"long"})}</div></div>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12,marginBottom:18}}>
      {[{l:"מוכרים",v:sellers.length,i:"🏡",c:OR,go:()=>{setCrmInitTab("sellers");setTab("crm")}},{l:"קונים",v:buyers.length,i:"👥",c:BL,go:()=>{setCrmInitTab("buyers");setTab("crm")}},{l:"בלעדיויות",v:sellers.filter(s=>s.exclusiveEnd).length,i:"📋",c:G,go:()=>{setCrmInitTab("sellers");setTab("crm")}},{l:"משימות",v:pending,i:"⚡",c:PU,go:()=>setTab("daily")}].map(s=><div key={s.l} onClick={s.go} style={{...S.card,padding:20,textAlign:"center",cursor:"pointer"}}><div style={{fontSize:30,marginBottom:8}}>{s.i}</div><div style={{fontSize:36,fontWeight:900,color:s.c,fontFamily:"'Frank Ruhl Libre',serif",lineHeight:1}}>{s.v}</div><div style={{fontSize:13,color:"#555",marginTop:8,fontWeight:600}}>{s.l}</div></div>)}
    </div>

    {/* Hot Properties */}
    <div style={{...S.card,border:"1px solid rgba(232,168,76,0.25)"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontWeight:700,color:OR,fontSize:16}}>🔥 דירות חמות ({hotProps.length}/10)</div>
        <Btn sm ch="+ הוסף" c={OR} onClick={()=>setShowHotPicker(true)}/>
      </div>
      {hotProps.length===0&&<div style={{color:"#555",fontSize:14,padding:10}}>בחר עד 10 דירות חמות להצגה</div>}
      {hotProps.map(hp=>{const p=allProps.find(x=>x.id===hp.id&&x.source===hp.source);if(!p)return null;return <div key={hp.id+hp.source} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:14}}>{p.address||p.name}</div><div style={{color:"#777",fontSize:12}}>{p.rooms||"?"}חד · {fmtP(p.price)} {p.source==="broker"?"(מתווך)":""}</div></div>
        <button onClick={()=>{setHotProps(hotProps.filter(x=>!(x.id===hp.id&&x.source===hp.source)));toast("🗑 הוסר")}} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:18}}>×</button>
      </div>})}
      {showHotPicker&&<Modal title="בחר דירות חמות" color={OR} onClose={()=>setShowHotPicker(false)}>
        {allProps.filter(p=>!hotProps.find(h=>h.id===p.id&&h.source===p.source)).map(p=><div key={p.id+p.source} onClick={()=>{if(hotProps.length>=10){toast("⚠️ מקסימום 10");return}const nh=[...hotProps,{id:p.id,source:p.source}];setHotProps(nh);sv("hotProps",nh);toast("✅ נוסף")}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer"}}>
          <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:15}}>{p.address||p.name}</div><div style={{color:"#777",fontSize:13}}>{p.rooms||"?"}חד · {fmtP(p.price)} {p.source==="broker"?"(מתווך)":""}</div></div>
          <span style={{color:OR,fontSize:20}}>+</span>
        </div>)}
      </Modal>}
    </div>

    {/* Sent buyers */}
    {sentBuyers.length>0&&<div style={{...S.card,border:"1px solid "+BL+"33",marginTop:6}}>
      <div style={{fontWeight:700,color:BL,fontSize:16,marginBottom:10}}>📤 קונים שנשלחו אליהם דירות</div>
      {sentBuyers.map(b=><div key={b.id} style={{padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{fontWeight:600,color:"#ede8f5",fontSize:14}}>{b.name} · <GradeBadge grade={b.grade} onChange={()=>{}}/></div>
        <div style={{color:"#777",fontSize:12}}>{b.sentProperties.length} דירות נשלחו</div>
      </div>)}
    </div>}

    {expiring.length>0&&<div style={{...S.card,border:"1px solid rgba(232,168,76,0.3)",marginTop:6}}>
      <div style={{fontWeight:700,color:OR,marginBottom:12,fontSize:16}}>⚠️ בלעדיויות ({expiring.length})</div>
      {expiring.map(s=>{const days=daysTo(s.exclusiveEnd);return <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:15}}>{s.name}</div><div style={{color:"#777",fontSize:13}}>{s.address}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><Tag c={days<=7?RE:OR} ch={days===0?"היום!":days+" ימים"}/>{s.phone&&<Btn sm ch="💬" c={GR} onClick={()=>openWA(s.phone,"שלום "+s.name+", חיים בן סימון מרימקס. רציתי לעדכן לגבי הבלעדיות.")}/>}{s.phone&&<Btn sm ch="📞" c={BL} onClick={()=>window.location.href='tel:'+(s.phone||'')}/>}</div>
      </div>})}
    </div>}
  </div>
}

// ━━━ DAILY PLAN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function DailyPlan({tasks,setTasks}){
  const[nt,setNt]=useState("");const[ntime,setNtime]=useState("");const[ntype,setNtype]=useState("call");
  const[nclient,setNclient]=useState("");const[ncphone,setNcphone]=useState("");const[nctype,setNctype]=useState("");
  function toggle(id){const t=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);setTasks(t);sv("tasks",t)}
  function add(){if(!nt)return;const t=[...tasks,{id:Date.now(),text:nt,time:ntime||"—",done:false,type:ntype,clientName:nclient,clientPhone:ncphone,clientType:nctype}];setTasks(t);sv("tasks",t);setNt("");setNtime("");setNclient("");setNcphone("");setNctype("");toast("✅ משימה נוספה")}
  function del(id){const t=tasks.filter(t=>t.id!==id);setTasks(t);sv("tasks",t)}
  function addDefaults(){
    const defs=[
      {text:"🎬 סרטון טיקטוק בוקר",time:"10:00",type:"publish"},
      {text:"🎬 סרטון טיקטוק ערב",time:"19:00",type:"publish"},
      {text:"📞 שיחות פולואפ קונים",time:"11:00",type:"call"},
      {text:"📤 שליחת דירות לקונים חדשים",time:"12:00",type:"send"},
      {text:"📣 פרסום נכסים בפלטפורמות",time:"14:00",type:"publish"},
    ];
    const newTasks=[...tasks,...defs.map(d=>({id:Date.now()+Math.random(),done:false,clientName:"",clientPhone:"",clientType:"",...d}))];
    setTasks(newTasks);sv("tasks",newTasks);toast("✅ נוספו "+defs.length+" משימות")
  }
  const icons={call:"📞",tour:"🏠",send:"📤",publish:"📣",meeting:"🤝",remind:"⏰"};
  const done=tasks.filter(t=>t.done).length;const pct=tasks.length?Math.round(done/tasks.length*100):0;
  return <div style={{padding:S.pg}} className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G}}>תוכנית יום</div><Tag c={done===tasks.length&&tasks.length>0?"#7ec97e":G} ch={done+"/"+tasks.length+" · "+pct+"%"}/></div>
    {tasks.length>0&&<div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:6,marginBottom:18,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+G+","+OR+")",borderRadius:6,transition:"width .5s"}}/></div>}
    {tasks.length===0&&<div style={{textAlign:"center",padding:20}}><Empty icon="📋" text="אין משימות"/><Btn sm ch="הוסף משימות ברירת מחדל" onClick={addDefaults} c={G} icon="⚡"/></div>}
    {tasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:t.done?"rgba(126,201,126,0.04)":"rgba(255,255,255,0.03)",borderRadius:16,marginBottom:8,border:"1px solid "+(t.done?"rgba(126,201,126,0.15)":"rgba(255,255,255,0.06)")}}>
      <div onClick={()=>toggle(t.id)} style={{width:28,height:28,borderRadius:"50%",border:"2px solid "+(t.done?"#7ec97e":G+"44"),background:t.done?"#7ec97e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#1a1208",cursor:"pointer",flexShrink:0}}>{t.done?"✓":""}</div>
      <div style={{flex:1}}>
        <div style={{fontSize:15,color:t.done?"#555":"#ede8f5",textDecoration:t.done?"line-through":"none"}}>{icons[t.type]||"📌"} {t.text}</div>
        {t.clientName&&<div style={{fontSize:12,color:"#777",marginTop:2}}>{t.clientType==="buyer"?"👤 קונה":"🏡 מוכר"}: {t.clientName}{t.clientPhone&&<span style={{color:BL,marginRight:6}}> · {t.clientPhone}</span>}</div>}
      </div>
      <div style={{color:"#555",fontSize:13,flexShrink:0,fontWeight:600}}>{t.time}</div>
      {t.clientPhone&&<a href={"tel:"+t.clientPhone} title="חייג" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:4,color:BL,textDecoration:"none"}}>📞</a>}
      {t.clientPhone&&<button onClick={()=>openWA(t.clientPhone)} title="ווטסאפ" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:4,color:GR}}>💬</button>}
      <button onClick={()=>addCal(t.text+(t.clientName?" — "+t.clientName:""))} title="יומן" style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:4}}>📅</button>
      <button onClick={()=>del(t.id)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:20,padding:4}}>×</button>
    </div>)}
    <div style={S.card}>
      <Lbl t="משימה חדשה" icon="➕"/>
      <input placeholder="תיאור..." value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} style={{...S.inp,marginBottom:12}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <input type="time" value={ntime} onChange={e=>setNtime(e.target.value)} style={S.inp}/>
        <select value={ntype} onChange={e=>setNtype(e.target.value)} style={{...S.inp,background:"#0e0d14"}}><option value="call">📞 שיחה</option><option value="tour">🏠 סיור</option><option value="meeting">🤝 פגישה</option><option value="send">📤 שליחה</option><option value="publish">📣 פרסום</option><option value="remind">⏰ תזכורת</option></select>
      </div>
      <Lbl t="לקוח (אופציונלי)" icon="👤"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <input placeholder="שם לקוח" value={nclient} onChange={e=>setNclient(e.target.value)} style={S.inp}/>
        <input placeholder="טלפון" value={ncphone} onChange={e=>setNcphone(e.target.value)} style={S.inp}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[{v:"buyer",l:"👤 קונה"},{v:"seller",l:"🏡 מוכר"}].map(x=><button key={x.v} onClick={()=>setNctype(nctype===x.v?"":x.v)} style={{flex:1,background:nctype===x.v?G+"22":"rgba(255,255,255,0.03)",border:"1px solid "+(nctype===x.v?G+"55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"10px",color:nctype===x.v?G:"#777",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{x.l}</button>)}
      </div>
      <Btn full ch="הוסף משימה" onClick={add} dis={!nt} icon="➕"/>
    </div>
  </div>
}

// ━━━ RECRUIT (גיוס נכסים) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Recruit({prospects,setProspects}){
  const[phones,setPhones]=useState("");
  const[selMsg,setSelMsg]=useState(0);
  const[msg,setMsg]=useState("");
  const[viewP,setViewP]=useState(null);
  const[mode,setMode]=useState("send"); // send | list

  const templates=["שלום 👋\nחיים בן סימון, מתווך RE/MAX באר שבע 13 שנה.\nראיתי את הנכס שלך ויש לי 2 קונים רציניים עם הון עצמי מוכן שמחפשים בדיוק באזור שלך.\nאשמח לשיחה קצרה של 3 דקות — בלי התחייבות.\nמתי נוח לך? 📞\nחיים בן סימון | RE/MAX באר שבע","שלום 👋\nחיים בן סימון מרימקס באר שבע.\nפניתי אליך כי יש לי קונה עם מזומן שמחפש נכס בדיוק כמו שלך — והוא רוצה לסגור השבוע.\nשווה שיחה של 5 דקות? אני זמין היום.\nחיים | RE/MAX | באר שבע","שלום 👋\nחיים בן סימון מרימקס באר שבע.\nבעקבות המעבר לעיר הבהד\"ים יש לי קונים מצה\"ל ומשרד הביטחון עם תקציב מוכן שמחפשים דירות בדיוק באזור שלך.\nאשמח לשיחה קצרה — בלי התחייבות.\nחיים בן סימון | RE/MAX | 13 שנות ניסיון"];

  useEffect(()=>{setMsg(templates[selMsg])},[selMsg]);

  function sendAll(){
    const nums=phones.split(/[\n,;]+/).map(x=>x.trim()).filter(Boolean);
    if(!nums.length){toast("⚠️ הכנס מספרים");return}
    nums.forEach((n,i)=>setTimeout(()=>openWA(n,msg),i*500));
    toast("📤 נשלח ל-"+nums.length+" מספרים");
  }
  function addProspect(){
    const num=phones.trim().split(/[\n,;]+/)[0]||"";
    if(!num){toast("⚠️ הכנס מספר");return}
    const p={id:Date.now(),phone:num,grade:"B",notes:"",sentMaterial:false,followUp:false,exclusive:false,calDate:"",logs:[{text:"כרטיסייה נפתחה",time:nowStr()}]};
    const np=[...prospects,p];setProspects(np);sv("prospects",np);toast("✅ כרטיסייה נפתחה");setViewP(p)
  }
  function updProspect(id,f,v){const np=prospects.map(p=>p.id===id?{...p,[f]:v}:p);setProspects(np);sv("prospects",np);if(viewP&&viewP.id===id)setViewP(np.find(p=>p.id===id))}
  function addPLog(id,text){const np=prospects.map(p=>p.id===id?{...p,logs:[...p.logs,{text,time:nowStr()}]}:p);setProspects(np);sv("prospects",np);if(viewP&&viewP.id===id)setViewP(np.find(p=>p.id===id))}
  function delProspect(id){const np=prospects.filter(p=>p.id!==id);setProspects(np);sv("prospects",np);setViewP(null);toast("🗑 נמחק")}

  if(viewP){return <div style={{padding:S.pg}} className="fade">
    <button onClick={()=>setViewP(null)} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.card,border:"1px solid "+OR+"44"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:22,color:"#ede8f5"}}>{viewP.phone}</div></div>
        <div style={{display:"flex",gap:8}}><GradeBadge grade={viewP.grade} onChange={v=>updProspect(viewP.id,"grade",v)}/><Btn sm ch="🗑" c={RE} ghost onClick={()=>delProspect(viewP.id)}/></div>
      </div>
      <Inp label="מספר טלפון" ph="050..." val={viewP.phone} set={v=>updProspect(viewP.id,"phone",v)} icon="📱" mb={12}/>
      <Inp label="הערות" ph="מלל חופשי..." val={viewP.notes} set={v=>updProspect(viewP.id,"notes",v)} rows={3} mb={12}/>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        {[{f:"sentMaterial",l:"נשלח חומר",i:"📤"},{f:"followUp",l:"פולואפ",i:"🔄"},{f:"exclusive",l:"גויסה בלעדיות",i:"🏆"}].map(x=><button key={x.f} onClick={()=>updProspect(viewP.id,x.f,!viewP[x.f])} style={{background:viewP[x.f]?"#7ec97e22":"rgba(255,255,255,0.03)",border:"1px solid "+(viewP[x.f]?"#7ec97e55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"10px 16px",color:viewP[x.f]?"#7ec97e":"#777",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{x.i} {x.l}</button>)}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <Btn sm ch="📅 יומן" ghost onClick={()=>addCal("פגישה גיוס — "+viewP.phone)}/>
        <Btn sm ch="💬 ווטסאפ" c={GR} onClick={()=>openWA(viewP.phone)}/>
        {viewP.phone&&<Btn sm ch="📞" c={BL} onClick={()=>window.location.href='tel:'+(viewP.phone||'')}/>}
      </div>
      <Lbl t="תיעוד" icon="📝"/>
      {viewP.logs&&viewP.logs.map((l,i)=><div key={i} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}><span style={{color:"#555"}}>{l.time}</span> — <span style={{color:"#bbb"}}>{l.text}</span></div>)}
      <div style={{display:"flex",gap:8,marginTop:10}}><input placeholder="הוסף תיעוד..." id="plog" style={{...S.inp,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value){addPLog(viewP.id,e.target.value);e.target.value=""}}}/></div>
    </div>
  </div>}

  return <div style={{padding:S.pg}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📤 גיוס נכסים</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>שלח הודעות מפתות לבעלי נכסים מיד2</div>
    <div style={{display:"flex",gap:10,marginBottom:16}}><Pill ch="✉️ שליחה" active={mode==="send"} onClick={()=>setMode("send")} c={OR}/><Pill ch={"📋 כרטיסיות ("+prospects.length+")"} active={mode==="list"} onClick={()=>setMode("list")} c={G}/></div>

    {mode==="send"&&<div>
      <div style={S.card}>
        <Lbl t="מספרי טלפון" icon="📱"/>
        <textarea placeholder="הכנס מספרים (כל מספר בשורה חדשה)..." value={phones} onChange={e=>setPhones(e.target.value)} rows={3} style={{...S.inp,resize:"none",marginBottom:14}}/>
        <Lbl t="בחר הודעה"/>
        <div style={{display:"flex",gap:8,marginBottom:14}}>

        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn sm ch="כרטיסייה" c={OR} onClick={()=>setViewP(p)}/>

          {p.phone&&<Btn sm ch="📞" c={BL} onClick={()=>window.location.href='tel:'+(p.phone||'')}/>}
          <Btn sm ghost c={RE} ch="מחק" onClick={()=>delProspect(p.id)}/>
        </div>
      </div>)}
    </div>}
  </div>
}

st")}/></div></div></div>}

  if(mode==="add"&&tab==="buyers"){return <div style={{padding:S.pg}} className="fade"><button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button><div style={{...S.card,border:"1px solid "+BL+"44"}}><div style={{fontWeight:800,color:BL,fontSize:18,marginBottom:20}}>👤 קונה חדש</div><Inp label="שם *" ph="ישראל" val={bn} set={setBn} mb={10}/><Inp label="טלפון" ph="050-000" val={bp} set={setBp} mb={10}/><Inp label="תקציב מקסימלי" ph="800000" val={bb} set={setBb} mb={10} icon="💰"/><div style={{marginBottom:14}}><Lbl t="דירוג"/><div style={{display:"flex",gap:8}}>{Object.entries(GRADES).map(([k,v])=><button key={k} onClick={()=>setBg(k)} style={{flex:1,background:bg===k?v.c+"22":"rgba(255,255,255,0.03)",border:"1px solid "+(bg===k?v.c+"55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"10px",color:bg===k?v.c:"#777",fontSize:14,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{v.l}</button>)}</div></div><Inp label="מלל חופשי" ph="מחפש 3 חד בשכונה ד..." val={bnotes} set={setBnotes} rows={3} mb={14}/><div style={{display:"flex",gap:10}}><Btn full ch="שמור" onClick={addBuyer} dis={!bn} c={BL} icon="💾"/><Btn ghost ch="ביטול" onClick={()=>setMode("list")}/></div></div></div>}

      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}><Btn sm ch="כרטיסייה" c={OR} onClick={()=>{setSel(s);setMode("view")}}/>{s.phone&&<Btn sm c={GR} ch="💬" onClick={()=>openWA(s.phone)}/>}{s.phone&&<Btn sm ch="📞" c={BL} onClick={()=>window.location.href='tel:'+(s.phone||'')}/>}<Btn sm ghost c={RE} ch="מחק" onClick={()=>delS(s.id)}/></div>
    </div>)}</div>}

    {tab==="buyers"&&<div>{fB.length===0&&<Empty icon="👥" text="אין קונים"/>}{fB.map(b=><div key={b.id} style={S.card}>

    </div>)}</div>}
  </div>

// ━━━ BROKER PROPS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function BrokerPage({brokerProps,setBrokerProps,buyers}){
  const[mode,setMode]=useState("list");const[sel,setSel]=useState(null);const[search,setSearch]=useState("");
  const[bn,setBn]=useState("");const[bp,setBp]=useState("");const[ba,setBa]=useState("");const[bc,setBc]=useState("באר שבע");const[br2,setBr2]=useState("");const[bs,setBs]=useState("");const[bf,setBf]=useState("");const[bprice,setBprice]=useState("");const[bnotes,setBnotes]=useState("");const[bimgs,setBimgs]=useState([]);const[bvid,setBvid]=useState("");const[bagent,setBagent]=useState("");
  const[pubOpen,setPubOpen]=useState(false);const[pubPlat,setPubPlat]=useState("whatsapp");const[pubResult,setPubResult]=useState(null);const[pubLoading,setPubLoading]=useState(false);const[galleryOpen,setGalleryOpen]=useState(null);
  const[sendBuyer,setSendBuyer]=useState(null);const[sendMsg,setSendMsg]=useState("");
  function buildSendMsg(buyerName,prop,variant){
    const addr=prop.address||"—";const rooms=prop.rooms||"—";const size=prop.size?prop.size+"מ״ר":"—";const floor=prop.floor||"—";const price=prop.price?fmtP(prop.price):"—";
    const tpls=[
      "שלום "+(buyerName||"")+" 😊\n\nחיים בן סימון מרימקס באר שבע.\n\nחשבתי עליך! יש לי דירה מושלמת בשבילך:\n\n🏠 "+addr+"\n🛏 "+rooms+" חדרים\n📐 "+size+"\n🏢 קומה "+floor+"\n💰 "+price+"\n\n📸 מעוניין? אשלח לך תמונות ופרטים נוספים\n\n📞 חיים | RE/MAX | 054-4740691",
      "שלום "+(buyerName||"")+" 👋\n\nחיים מרימקס באר שבע.\n\nנתקלתי בדירה שיכולה להתאים לך מצוין:\n\n🏠 "+addr+"\n🛏 "+rooms+" חדרים | 📐 "+size+"\n🏢 קומה "+floor+"\n💰 "+price+"\n\n😊 רוצה לשמוע עוד פרטים?\n\n📞 חיים | RE/MAX | 054-4740691",
      "היי "+(buyerName||"")+" 😊\n\nחיים בן סימון מרימקס.\n\nיש לי משהו מעניין בשבילך!\n\n🏠 דירה ב"+addr+"\n🛏 "+rooms+" חד | 📐 "+size+" | 🏢 קומה "+floor+"\n💰 "+price+"\n\n📸 אשמח לשלוח תמונות ולתאם סיור\n\n📞 חיים | RE/MAX | 054-4740691"
    ];
    return tpls[(variant||0)%tpls.length];
  }

  function addProp(){if(!ba&&!bn)return;const p={id:Date.now(),name:bn,phone:bp,address:ba,city:bc,rooms:br2,size:bs,floor:bf,price:bprice,notes:bnotes,images:bimgs,video:bvid,agentName:bagent,actions:[],logs:[],created:nowStr()};const np=[...brokerProps,p];setBrokerProps(np);sv("brokerProps",np);setBn("");setBp("");setBa("");setBr2("");setBs("");setBf("");setBprice("");setBnotes("");setBimgs([]);setBvid("");setBagent("");setMode("list");toast("✅ נכס נוסף")}

          <span style={{color:GR,fontSize:20}}>💬</span>

        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>

      </div>}

      {/* Saved Ads */}

  if(mode==="add"){return <div style={{padding:S.pg}} className="fade"><button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button><div style={{...S.card,border:"1px solid "+TE+"44"}}><div style={{fontWeight:800,color:TE,fontSize:18,marginBottom:20}}>🤝 נכס ממתווך</div><Inp label="שם מתווך (פנימי)" val={bagent} set={setBagent} mb={10} icon="🤝"/><Inp label="כתובת *" ph="רחוב 10" val={ba} set={setBa} mb={10}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="עיר" val={bc} set={setBc} mb={10}/><Inp label="מחיר" val={bprice} set={setBprice} mb={10}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><Inp label="חדרים" val={br2} set={setBr2} mb={10}/><Inp label="מ״ר" val={bs} set={setBs} mb={10}/><Inp label="קומה" val={bf} set={setBf} mb={10}/></div><Inp label="טלפון" val={bp} set={setBp} mb={10}/><Inp label="הערות" val={bnotes} set={setBnotes} rows={2} mb={14}/><Inp label="קישור סרטון" ph="https://..." val={bvid} set={setBvid} mb={14} icon="🎬"/><div style={{marginBottom:18}}><Lbl t="תמונות" icon="📷"/><ImgUp images={bimgs} onAdd={img=>setBimgs(p=>[...p,...(Array.isArray(img)?img:[img])])} onRemove={id=>setBimgs(p=>p.filter(i=>i.id!==id))}/></div><div style={{display:"flex",gap:10}}><Btn full ch="שמור" onClick={addProp} dis={!ba&&!bn} c={TE} icon="💾"/><Btn ghost ch="ביטול" onClick={()=>setMode("list")}/></div></div></div>}

// ━━━ WEEKLY REPORT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function App(){
  const[tab,setTab]=useState("home");const[crmInitTab,setCrmInitTab]=useState("sellers");
  const[loaded,setLoaded]=useState(false);
  const[buyers,_setBuyers]=useState([]);
  const[sellers,_setSellers]=useState([]);
  const[tasks,_setTasks]=useState([]);
  const[brokerProps,_setBrokerProps]=useState([]);
  const[hotProps,setHotProps]=useState(()=>lv("hotProps",[]));
  const[prospects,_setProspects]=useState([]);

  function fsWrite(name,items){try{const size=JSON.stringify(items).length;if(size>900000){toast("⚠️ יותר מדי תמונות — מחק כמה");return}db.collection("data").doc(name).set({items})}catch(e){console.error("Firestore write error:",e)}}
  function setBuyers(v){_setBuyers(v);sv("buyers",v);fsWrite("buyers",v)}
  function setSellers(v){_setSellers(v);sv("sellers",v);fsWrite("sellers",v)}
  function setTasks(v){_setTasks(v);sv("tasks",v);fsWrite("tasks",v)}
  function setBrokerProps(v){_setBrokerProps(v);sv("brokerProps",v);fsWrite("brokerProps",v)}
  function setProspects(v){_setProspects(v);sv("prospects",v);fsWrite("prospects",v)}

  useEffect(()=>{
    let unsubs=[];
    (async()=>{
      try{
        const initDoc=await db.collection("data").doc("_init").get();
        if(!initDoc.exists){
          await db.collection("data").doc("sellers").set({items:IS});
          await db.collection("data").doc("buyers").set({items:IB});
          await db.collection("data").doc("tasks").set({items:[]});
          await db.collection("data").doc("brokerProps").set({items:[]});
          await db.collection("data").doc("prospects").set({items:[]});
          await db.collection("data").doc("_init").set({done:true,time:new Date().toISOString()});
        }
      }catch(e){console.error("Firestore init error:",e)}
      const collections=[["buyers",_setBuyers],["sellers",_setSellers],["tasks",_setTasks],["brokerProps",_setBrokerProps],["prospects",_setProspects]];
      collections.forEach(([name,setter])=>{
        const unsub=db.collection("data").doc(name).onSnapshot(doc=>{
          if(doc.exists){const items=doc.data().items||[];setter(items);sv(name,items)}
        },e=>console.error("Firestore sync error:",name,e));
        unsubs.push(unsub);
      });
      setLoaded(true);
    })();
    return()=>unsubs.forEach(u=>u());
  },[]);

  return <div style={{background:"#07060d",minHeight:"100vh",paddingBottom:92}}>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse 60% 45% at 12% 8%,rgba(100,70,180,0.07) 0%,transparent 55%)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1}}>
      <div style={{background:"rgba(7,6,13,0.96)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(201,168,76,0.1)",padding:"15px 18px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:G}}>NadlanPro</div><div style={{fontSize:11,color:"#444",marginTop:2}}>RE/MAX · חיים בן סימון · באר שבע</div></div>
          <div style={{background:"rgba(37,211,102,0.07)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:22,padding:"5px 14px",fontSize:11,color:GR,fontWeight:700,display:"flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,background:GR,borderRadius:"50%",display:"inline-block",animation:"pdot 2s infinite"}}/>פעיל</div>
        </div>
      </div>

      {tab==="home"&&<Dashboard buyers={buyers} sellers={sellers} tasks={tasks} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} brokerProps={brokerProps} setTab={setTab} setCrmInitTab={setCrmInitTab}/>}
      {tab==="recruit"&&<Recruit prospects={prospects} setProspects={setProspects}/>}
      {tab==="daily"&&<DailyPlan tasks={tasks} setTasks={setTasks}/>}
      {tab==="crm"&&<CRM buyers={buyers} setBuyers={setBuyers} sellers={sellers} setSellers={setSellers} brokerProps={brokerProps} initialTab={crmInitTab}/>}
      {tab==="broker"&&<BrokerPage brokerProps={brokerProps} setBrokerProps={setBrokerProps} buyers={buyers}/>}
      {tab==="report"&&<WeeklyReport sellers={sellers}/>}
      {tab==="tiktok"&&<Tiktok/>}
      {tab==="uni"&&<University/>}
      {tab==="archive"&&<Archive sellers={sellers} setSellers={setSellers} buyers={buyers} setBuyers={setBuyers}/>}
      {tab==="settings"&&<Settings onClose={()=>setTab("home")}/>}

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(5,4,10,0.98)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(201,168,76,0.1)",display:"flex",zIndex:200,padding:"6px 0 12px",overflowX:"auto"}}>
        {TABS.map(t=>{const active=tab===t.k;return <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:"0 0 auto",minWidth:54,background:"none",border:"none",cursor:"pointer",padding:"6px 6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
          {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:3,background:G,borderRadius:3}}/>}
          <span style={{fontSize:22}}>{t.i}</span>
          <span style={{fontSize:9.5,fontWeight:active?800:600,color:active?G:"#2a2a2a",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</span>
        </button>})}
      </nav>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
