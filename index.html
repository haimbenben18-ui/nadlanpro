// ━━━ RECENT CHATS — quick send-images to anyone you've recently chatted with
function RecentChats({sellers,brokerProps,customAgentTexts,onVipChange}){
  const[chats,setChats]=useState([]);
  const[loading,setLoading]=useState(false);
  const[loadedOnce,setLoadedOnce]=useState(false);
  const[search,setSearch]=useState("");
  const[picker,setPicker]=useState(null);
  const[tplPicker,setTplPicker]=useState(null);
  const[manualPhone,setManualPhone]=useState("");
  const[addVipModal,setAddVipModal]=useState(null); // {phone, name}
  const[tourModal,setTourModal]=useState(null); // {phone, name, date, time, notes}

  function fmtIsraeliPhone(intl){
    if(!intl)return "";
    let p=String(intl).replace(/@c\.us$/i,"");
    if(p.startsWith("972"))p="0"+p.slice(3);
    if(/^\d{10}$/.test(p))return p.slice(0,3)+"-"+p.slice(3,6)+"-"+p.slice(6);
    return p;
  }
  function avatarLetter(name,fallback){
    const s=((name||fallback||"").trim());
    const ch=s.charAt(0).toUpperCase();
    return ch||"?";
  }
  function manualToChatId(raw){
    let p=(raw||"").replace(/[-\s+]/g,"");
    if(p.startsWith("0"))p="972"+p.slice(1);
    if(!p.endsWith("@c.us"))p=p+"@c.us";
    return p;
  }

  async function loadChats(){
    setLoading(true);
    try{
      const r=await fetch("https://api.ultramsg.com/instance169955/chats?token=slhhpfslyuey11fp");
      const data=await r.json();
      const arr=Array.isArray(data)?data:(Array.isArray(data&&data.chats)?data.chats:[]);
      const filtered=arr
        .filter(c=>c&&c.id&&!/@g\.us$/i.test(c.id)&&!c.isGroup)
        .sort((a,b)=>(b.last_time||0)-(a.last_time||0))
        .slice(0,20);
      setChats(filtered);
      setLoadedOnce(true);
    }catch(e){console.error("loadChats err",e);toast("⚠️ שגיאה בטעינת צ'אטים")}
    setLoading(false);
  }

  const visible=chats.filter(c=>{
    if(!search)return true;
    const q=search.toLowerCase();
    const name=(c.name||"").toLowerCase();
    const phone=fmtIsraeliPhone(c.id);
    const idRaw=(c.id||"").replace(/@c\.us$/i,"");
    return name.includes(q)||phone.includes(search)||idRaw.includes(search.replace(/[-\s]/g,""));
  });
  const searchClean=search.replace(/[-\s+]/g,"");
  const isPhoneSearch=/^0\d{9}$/.test(searchClean)||/^972\d{9}$/.test(searchClean);
  const phoneNotInList=isPhoneSearch&&visible.length===0;

  const allProps=[...(sellers||[]).map(s=>({...s,_src:"s"})),...(brokerProps||[]).map(p=>({...p,_src:"b"}))];

  async function handlePropertyPick(prop){
    if(!picker)return;
    const target=picker;
    const mode=target.mode||"images";
    setPicker(null);
    if(mode==="details"){
      // Prefer the user's saved custom text for this property; otherwise
      // fall back to the first template. Never re-applies placeholder
      // substitution on saved text — it's stored final.
      const saved=(customAgentTexts||{})[propKeyOf(prop)];
      const hasSaved=saved&&typeof saved==="string"&&saved.trim()!=="";
      const tpl=AGENT_GROUP_TEMPLATES[0];
      setTplPicker({phone:target.phone,name:target.name,prop,template:hasSaved?"custom":tpl.key,text:hasSaved?saved:tpl.build(prop)});
      return;
    }
    // Media fix: send ALL media (images + videos) with empty caption
    const media=(prop.images||[]).filter(i=>i&&i.url);
    if(media.length===0){toast("⚠️ אין מדיה לנכס זה");return}
    const ok=await sendWhatsAppMedia(target.phone,"",media);
    if(ok)toast("🖼️ "+media.length+" קבצים נשלחו ל-"+(target.name||fmtIsraeliPhone(target.phone)));
  }
  async function sendTextFromTplPicker(){
    if(!tplPicker)return;
    const t=tplPicker;
    const finalText=(t.text||"").trim();
    if(!finalText){toast("⚠️ הטקסט ריק");return}
    setTplPicker(null);
    const ok=await sendDirectMessage(t.phone,finalText);
    if(ok)toast("📝 פרטים נשלחו ל-"+(t.name||fmtIsraeliPhone(t.phone)));
  }

  return <div style={S.card}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div style={{fontSize:"1rem",fontWeight:700,color:"var(--text-white)"}}>📱 צ'אטים אחרונים</div>
      <button onClick={loadChats} disabled={loading} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--text-gray)",padding:"6px 12px",borderRadius:8,fontSize:"0.78rem",cursor:loading?"not-allowed":"pointer",fontFamily:"inherit"}}>{loading?"טוען...":(loadedOnce?"🔄 רענן":"📥 טען")}</button>
    </div>

    {!loadedOnce&&<div style={{textAlign:"center",padding:"24px 14px",color:"var(--text-gray)",fontSize:"0.88rem",lineHeight:1.6}}>
      לחץ "טען" כדי לקבל את 20 השיחות הפרטיות האחרונות מ-WhatsApp,<br/>או הזן מספר ידנית בתחתית.
    </div>}

    {loadedOnce&&<>
      <input type="text" placeholder="חיפוש לפי שם או מספר..." value={search} onChange={e=>setSearch(e.target.value)} style={{...S.inp,marginBottom:12,fontSize:"0.88rem"}}/>

      {phoneNotInList&&<button onClick={()=>setPicker({phone:manualToChatId(searchClean),name:searchClean,mode:"images"})} style={{width:"100%",background:"var(--gold-soft)",border:"1px solid var(--border-gold)",color:G,padding:"10px",borderRadius:10,fontSize:"0.85rem",fontWeight:600,cursor:"pointer",fontFamily:"inherit",marginBottom:12}}>📤 שלח ל-{searchClean}</button>}

      <div style={{maxHeight:400,overflowY:"auto"}}>
        {visible.length===0?<div style={{color:"var(--text-gray)",padding:14,textAlign:"center",fontSize:13}}>לא נמצאו צ'אטים</div>:visible.map(c=>{
          const phone=fmtIsraeliPhone(c.id);
          const isSel=picker&&picker.phone===c.id;
          const vip=isVipPhone(c.id);
          const lastMsg=c.last_message||c.lastMessage||c.body||"";
          const askingForPhotos=vip&&wantsImagesText(lastMsg);
          const displayName=vip?vip.name:(c.name||phone);
          const waIntl=String(c.id).replace(/@c\.us$/i,"");
          return <div key={c.id} style={{display:"flex",alignItems:"center",gap:12,padding:"12px 14px",borderBottom:"1px solid rgba(255,255,255,0.04)",borderRadius:10,marginBottom:2,background:isSel?"var(--gold-soft)":"transparent",border:isSel?"1px solid var(--border-gold)":"1px solid transparent",transition:"background .2s ease"}}>
            <div style={{width:42,height:42,borderRadius:"50%",background:"var(--blue-soft)",border:"1px solid rgba(26,86,219,0.2)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"1.1rem",fontWeight:600,color:"var(--blue)",flexShrink:0}}>{avatarLetter(c.name,phone)}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:"flex",alignItems:"center",gap:6,overflow:"hidden"}}>
                <span style={{fontSize:"14px",fontWeight:700,color:"var(--text-white)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{displayName}</span>
                {vip&&<span style={{fontSize:"0.65rem",background:"var(--gold-soft)",border:"1px solid var(--border-gold)",color:"var(--gold)",padding:"2px 8px",borderRadius:10,fontWeight:600,whiteSpace:"nowrap",flexShrink:0}}>⭐ VIP</span>}
              </div>
              <div style={{fontSize:"0.78rem",color:"var(--text-gray)",direction:"ltr",textAlign:"right"}}>{phone}</div>
            </div>
            <div style={{display:"flex",gap:5,alignItems:"center",flexShrink:0,flexWrap:"wrap",justifyContent:"flex-end",maxWidth:200}}>
              <button onClick={()=>setPicker({phone:c.id,name:displayName,mode:"images"})} title="מדיה (תמונות+סרטונים)" className={"icon-btn icon-btn-purple"+(askingForPhotos?" vip-pulse":"")} style={{width:34,height:34,fontSize:14}}>🖼️</button>
              <button onClick={()=>setPicker({phone:c.id,name:displayName,mode:"details"})} title="פרטים בלבד" className="icon-btn icon-btn-edit" style={{width:34,height:34,fontSize:14}}>📝</button>
              <button onClick={()=>setTourModal({phone:waIntl,name:displayName,date:"",time:"",notes:""})} title="תיאום סיור" className="icon-btn icon-btn-info" style={{width:34,height:34,fontSize:14}}>🗓️</button>
              {!vip&&<button onClick={()=>setAddVipModal({phone:waIntl,name:c.name||""})} title="הוסף כ-VIP" style={{width:34,height:34,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,cursor:"pointer",background:"rgba(195,166,82,0.08)",border:"1px solid var(--border-gold)",color:"var(--gold)",transition:"all 0.2s ease"}}>⭐</button>}
              <a href={"https://wa.me/"+waIntl} target="_blank" rel="noopener" title="פתיחה בוואטסאפ" className="icon-btn icon-btn-wa" style={{width:34,height:34,fontSize:14,textDecoration:"none"}}>📱</a>
            </div>
          </div>;
        })}
      </div>
    </>}

    <div style={{marginTop:14,paddingTop:14,borderTop:"1px solid var(--border)"}}>
      <div style={{color:"var(--text-gray)",fontSize:"0.85rem",marginBottom:8}}>או הזינו מספר טלפון:</div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <input type="tel" placeholder="05X-XXX-XXXX" value={manualPhone} onChange={e=>setManualPhone(e.target.value)} style={{...S.inp,flex:"1 1 180px",direction:"ltr",textAlign:"left"}}/>
        <Btn sm ch="🖼️ תמונות" c={PU} ghost onClick={()=>{
          const clean=(manualPhone||"").replace(/[-\s+]/g,"");
          if(!/^0\d{9}$/.test(clean)&&!/^972\d{9}$/.test(clean)){toast("⚠️ מספר לא תקין");return}
          setPicker({phone:manualToChatId(clean),name:manualPhone,mode:"images"});
        }}/>
        <Btn sm ch="📝 פרטים" c={G} ghost onClick={()=>{
          const clean=(manualPhone||"").replace(/[-\s+]/g,"");
          if(!/^0\d{9}$/.test(clean)&&!/^972\d{9}$/.test(clean)){toast("⚠️ מספר לא תקין");return}
          setPicker({phone:manualToChatId(clean),name:manualPhone,mode:"details"});
        }}/>
      </div>
    </div>

    {/* Property picker modal */}
    {picker&&<Modal title={(picker.mode==="details"?"בחר נכס — פרטים בלבד — ":"בחר נכס — תמונות בלבד — ")+(picker.name||fmtIsraeliPhone(picker.phone))} color={picker.mode==="details"?G:PU} onClose={()=>setPicker(null)} center>
      <div style={{color:"var(--text-gray)",fontSize:"0.85rem",marginBottom:12,lineHeight:1.6}}>
        {picker.mode==="details"?"לאחר בחירת נכס תופיע תבנית עריכה — נשלח טקסט בלבד, ללא תמונות.":"נשלחות רק התמונות, ללא טקסט מלווה. השהייה 2 שניות בין תמונה."}
      </div>
      {allProps.length===0?<div style={{color:"var(--text-gray)",padding:20,textAlign:"center"}}>אין נכסים זמינים</div>:<div style={{maxHeight:300,overflowY:"auto"}}>
        {allProps.map(p=>{
          const mediaCount=(p.images||[]).filter(i=>i&&i.url).length;
          const dis=picker.mode!=="details"&&mediaCount===0;
          return <div key={p._src+"_"+p.id} onClick={()=>{if(!dis)handlePropertyPick(p)}} style={{padding:"12px 8px",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:dis?"not-allowed":"pointer",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,opacity:dis?0.5:1}}>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"var(--text-white)",fontSize:14,fontWeight:600}}>{p.address||p.name||"—"}{p._src==="b"&&<span style={{color:TE,fontSize:11,marginRight:6}}> 🤝</span>}</div>
              <div style={{color:"var(--text-gray)",fontSize:12}}>{p.rooms?p.rooms+" חד'":""}{p.price?" · "+fmtP(p.price):""}{mediaCount>0?" · 📷 "+mediaCount:(picker.mode==="details"?"":" · ללא מדיה")}</div>
            </div>
            <span style={{color:picker.mode==="details"?G:PU,fontSize:18}}>📤</span>
          </div>;
        })}
      </div>}
    </Modal>}

    {/* Template picker modal (details mode) */}
    {tplPicker&&<Modal title={"שליחת פרטים — "+(tplPicker.name||fmtIsraeliPhone(tplPicker.phone))} color={G} onClose={()=>setTplPicker(null)} center>
      <Lbl t="בחר תבנית" icon="📝"/>
      <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
        {AGENT_GROUP_TEMPLATES.map(t=>{const active=tplPicker.template===t.key;return <button key={t.key} onClick={()=>setTplPicker(p=>p?{...p,template:t.key,text:t.build(p.prop)}:p)} style={{padding:"8px 14px",borderRadius:10,fontSize:"0.78rem",fontWeight:500,border:"1px solid "+(active?"var(--gold)":"var(--border)"),background:active?"var(--gold-soft)":"transparent",color:active?G:"var(--text-gray)",cursor:"pointer",fontFamily:"inherit",transition:"all .2s ease"}}>{t.label}</button>})}
      </div>
      <Lbl t="הודעה (ניתן לעריכה)" icon="✏️"/>
      <textarea value={tplPicker.text||""} onChange={e=>setTplPicker(p=>p?{...p,text:e.target.value,template:"custom"}:p)} style={{...S.inp,resize:"none",minHeight:140,fontSize:"0.9rem",lineHeight:1.65,direction:"rtl",marginBottom:14}}/>
      <button onClick={sendTextFromTplPicker} style={{background:"linear-gradient(135deg, var(--gold), #a8882e)",color:"var(--midnight)",fontWeight:700,fontSize:"1rem",padding:"12px 0",width:"100%",borderRadius:14,border:"none",cursor:"pointer",boxShadow:"0 4px 16px rgba(195,166,82,0.25)",fontFamily:"inherit"}}>📝 שלח עכשיו</button>
      <button onClick={()=>setTplPicker(null)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--text-gray)",fontSize:"0.9rem",padding:"10px 0",width:"100%",borderRadius:14,marginTop:8,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
    </Modal>}

    {/* Add VIP modal — gender picker */}
    {addVipModal&&<Modal title="⭐ הוספה לרשימת VIP" color={G} onClose={()=>setAddVipModal(null)} center>
      <div style={{marginBottom:14}}>
        <Lbl t="שם" icon="👤"/>
        <input value={addVipModal.name||""} onChange={e=>setAddVipModal(m=>m?{...m,name:e.target.value}:m)} style={{...S.inp,marginBottom:12}}/>
        <Lbl t="טלפון" icon="📱"/>
        <div style={{...S.inp,background:"rgba(255,255,255,0.04)",color:"var(--text-gray)",direction:"ltr",textAlign:"left"}}>{addVipModal.phone}</div>
      </div>
      <Lbl t="מגדר (לברכת בוא/בואי נמכור)" icon="🔤"/>
      <div style={{display:"flex",gap:10,marginBottom:18}}>
        <button onClick={()=>setAddVipModal(m=>m?{...m,gender:"male"}:m)} style={{flex:1,padding:"14px 0",borderRadius:12,fontSize:"0.95rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",border:addVipModal.gender==="male"?"2px solid var(--gold)":"1px solid var(--border)",background:addVipModal.gender==="male"?"var(--gold-soft)":"transparent",color:addVipModal.gender==="male"?"var(--gold)":"var(--text-gray)"}}>👨 זכר (בוא)</button>
        <button onClick={()=>setAddVipModal(m=>m?{...m,gender:"female"}:m)} style={{flex:1,padding:"14px 0",borderRadius:12,fontSize:"0.95rem",fontWeight:700,cursor:"pointer",fontFamily:"inherit",border:addVipModal.gender==="female"?"2px solid var(--gold)":"1px solid var(--border)",background:addVipModal.gender==="female"?"var(--gold-soft)":"transparent",color:addVipModal.gender==="female"?"var(--gold)":"var(--text-gray)"}}>👩 נקבה (בואי)</button>
      </div>
      <button onClick={()=>{
        if(!addVipModal.name||!addVipModal.name.trim()){toast("⚠️ הזן שם");return}
        if(!addVipModal.gender){toast("⚠️ בחר מגדר");return}
        let ph=(addVipModal.phone||"").replace(/[-\s+]/g,"");
        if(ph.startsWith("0"))ph="972"+ph.slice(1);
        ph=ph.replace(/@c\.us$/i,"");
        const ok=addVipAgent({name:addVipModal.name.trim(),phone:ph,gender:addVipModal.gender});
        if(ok){toast("⭐ "+addVipModal.name+" נוסף/ה ל-VIP");if(onVipChange)onVipChange()}
        setAddVipModal(null);
      }} disabled={!addVipModal.gender} style={{background:"linear-gradient(135deg, var(--gold), #a8882e)",color:"var(--midnight)",fontWeight:700,fontSize:"1rem",padding:"12px 0",width:"100%",borderRadius:14,border:"none",cursor:!addVipModal.gender?"not-allowed":"pointer",boxShadow:"0 4px 16px rgba(195,166,82,0.25)",fontFamily:"inherit",opacity:!addVipModal.gender?0.5:1}}>⭐ הוסף ל-VIP</button>
      <button onClick={()=>setAddVipModal(null)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--text-gray)",fontSize:"0.9rem",padding:"10px 0",width:"100%",borderRadius:14,marginTop:8,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
    </Modal>}

    {/* Tour scheduling modal */}
    {tourModal&&<Modal title={"🗓️ תיאום סיור — "+(tourModal.name||"")} color={BL} onClose={()=>setTourModal(null)} center>
      <div style={{marginBottom:14}}>
        <Lbl t="איש קשר" icon="👤"/>
        <div style={{...S.inp,background:"rgba(255,255,255,0.04)",color:"var(--text-gray)",marginBottom:12}}>{tourModal.name} — {tourModal.phone}</div>
        <Lbl t="תאריך" icon="📅"/>
        <input type="date" value={tourModal.date||""} onChange={e=>setTourModal(m=>m?{...m,date:e.target.value}:m)} style={{...S.inp,marginBottom:12}}/>
        <Lbl t="שעה" icon="⏰"/>
        <input type="time" value={tourModal.time||""} onChange={e=>setTourModal(m=>m?{...m,time:e.target.value}:m)} style={{...S.inp,marginBottom:12}}/>
        <Lbl t="הערות (אופציונלי)" icon="📝"/>
        <textarea value={tourModal.notes||""} onChange={e=>setTourModal(m=>m?{...m,notes:e.target.value}:m)} rows={2} style={{...S.inp,resize:"none"}}/>
      </div>
      <button onClick={()=>{
        if(!tourModal.date||!tourModal.time){toast("⚠️ בחר תאריך ושעה");return}
        const title="סיור נדל\"ן — "+(tourModal.name||"לקוח")+" — "+(tourModal.phone||"");
        const dt=tourModal.date.replace(/-/g,"");
        const tm=tourModal.time.replace(/:/g,"");
        const startStr=dt+"T"+tm+"00";
        const endH=String(Math.min(23,parseInt(tourModal.time.split(":")[0])+1)).padStart(2,"0");
        const endStr=dt+"T"+endH+tourModal.time.split(":")[1]+"00";
        const details=(tourModal.notes?"הערות: "+tourModal.notes+"\n":"")+"טלפון: "+tourModal.phone;
        const url="https://calendar.google.com/calendar/render?action=TEMPLATE"+
          "&text="+encodeURIComponent(title)+
          "&dates="+startStr+"/"+endStr+
          "&details="+encodeURIComponent(details)+
          "&reminders="+encodeURIComponent("METHOD:POPUP,MINUTES:30");
        window.open(url,"_blank");
        toast("📅 הסיור נוסף ליומן");
        setTourModal(null);
      }} disabled={!tourModal.date||!tourModal.time} style={{background:"linear-gradient(135deg, #1a56db, #1a56dbcc)",color:"#fff",fontWeight:700,fontSize:"1rem",padding:"12px 0",width:"100%",borderRadius:14,border:"none",cursor:(!tourModal.date||!tourModal.time)?"not-allowed":"pointer",boxShadow:"0 4px 16px rgba(26,86,219,0.25)",fontFamily:"inherit",opacity:(!tourModal.date||!tourModal.time)?0.5:1}}>📅 הוסף ל-Google Calendar</button>
      <button onClick={()=>setTourModal(null)} style={{background:"transparent",border:"1px solid var(--border)",color:"var(--text-gray)",fontSize:"0.9rem",padding:"10px 0",width:"100%",borderRadius:14,marginTop:8,cursor:"pointer",fontFamily:"inherit"}}>ביטול</button>
    </Modal>}
  </div>;
}

// ━━━ LANDING PAGE EDITOR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function LandingVideoSlot({index,video,onChange,onDelete}){
  const fr=useRef();
  const[uploading,setUploading]=useState(false);
  async function handleFile(files){
    const f=files&&files[0];
    if(!f)return;
    if(!f.type.startsWith("video/")){toast("⚠️ אנא בחר קובץ וידאו");return}
    if(f.size>100*1024*1024){toast("⚠️ הקובץ גדול מדי (מקס 100MB)");return}
    setUploading(true);
    toast("⏳ מעלה סרטון...");
    try{
      const fd=new FormData();
      fd.append("file",f);
      fd.append("upload_preset","nadlanpro");
      fd.append("folder","nadlanpro/videos");
      const r=await fetch("https://api.cloudinary.com/v1_1/dopvqfgzw/video/upload",{method:"POST",body:fd});
      const d=await r.json();
      if(d.secure_url){
        onChange({...video,url:d.secure_url});
        toast("✅ הסרטון הועלה");
      }else{
        console.error(d);
        toast("❌ שגיאה בהעלאה");
      }
    }catch(e){console.error(e);toast("❌ "+e.message)}
    setUploading(false);
  }
  return <div style={{background:"rgba(155,142,196,0.05)",border:"1px solid rgba(155,142,196,0.15)",borderRadius:12,padding:10,marginBottom:10}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
      <div style={{color:PU,fontSize:12,fontWeight:700}}>סרטון {index+1}</div>
      {(video.url||video.title)&&<button onClick={()=>{if(confirm("למחוק את הסרטון?"))onDelete()}} title="מחק" style={{background:"transparent",border:"none",color:RE,fontSize:18,cursor:"pointer",padding:"2px 8px"}}>🗑</button>}
    </div>
    <input placeholder="כותרת לסרטון" value={video.title||""} onChange={e=>onChange({...video,title:e.target.value})} style={{...S.inp,marginBottom:8}}/>
    {video.url?<div style={{marginBottom:8}}>
      <video src={video.url} controls playsinline preload="metadata" style={{width:"100%",borderRadius:10,background:"#000",maxHeight:240,display:"block"}}/>
      <div style={{color:"#666",fontSize:11,marginTop:6,direction:"ltr",textAlign:"left",wordBreak:"break-all"}}>{video.url}</div>
    </div>:<div style={{color:"#666",fontSize:12,padding:"14px 10px",textAlign:"center",border:"1px dashed rgba(155,142,196,0.25)",borderRadius:10,marginBottom:8}}>אין סרטון</div>}
    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
      <Btn sm ch={uploading?"מעלה...":(video.url?"🔄 החלף סרטון":"⬆️ העלה סרטון")} c={BL} onClick={()=>!uploading&&fr.current.click()} dis={uploading}/>

    <div style={{textAlign:"center"}}><button onClick={()=>setShowLogin(!showLogin)} style={{background:"transparent",border:"none",color:"var(--text-dim)",fontSize:18,cursor:"pointer",opacity:0.4,padding:8}} title="כניסת מנהל">🔒</button></div>
    {showLogin&&<form onSubmit={tryLogin} autoComplete="on" className="fade" style={{maxWidth:280,margin:"16px auto 0",background:"var(--surface)",border:"1px solid var(--border-gold)",borderRadius:14,padding:20}}>
      <div style={{position:"relative"}}>
        <input type={showPw?"text":"password"} name="password" autoComplete="current-password" placeholder="סיסמה" value={pw} onChange={e=>{setPw(e.target.value);setErr(false)}} style={{width:"100%",background:"var(--midnight-light)",border:"1px solid "+(err?"var(--red)":"var(--border-gold)"),borderRadius:10,padding:"12px 44px 12px 14px",color:"var(--text-white)",fontSize:15,marginBottom:12,direction:"ltr"}}/>
        <button type="button" onClick={()=>setShowPw(!showPw)} style={{position:"absolute",top:10,right:10,background:"none",border:"none",color:"var(--text-dim)",fontSize:18,cursor:"pointer",padding:2,lineHeight:1}}>{showPw?"🙈":"👁️"}</button>
      </div>
      <button type="submit" style={{width:"100%",background:err?"var(--red)":"linear-gradient(135deg,var(--gold),#a8882e)",border:"none",borderRadius:10,padding:"11px 0",color:err?"#fff":"var(--midnight)",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",transition:"background .2s ease"}}>{err?"סיסמה שגויה":"כניסה"}</button>
    </form>}
  </div>
}

function App(){
  const[tab,setTab]=useState("home");const[crmInitTab,setCrmInitTab]=useState("sellers");
  const[loaded,setLoaded]=useState(false);
  const{authed,login,logout}=useAuth();
  const[loginModal,setLoginModal]=useState(false);
  const[loginPw,setLoginPw]=useState("");
  const[loginErr,setLoginErr]=useState(false);
  const[loginShowPw,setLoginShowPw]=useState(false);
  function tryFooterLogin(e){if(e)e.preventDefault();if(login(loginPw)){setLoginModal(false);setLoginPw("");setLoginErr(false);setLoginShowPw(false);toast("✅ מחובר")}else{setLoginErr(true);setTimeout(()=>setLoginErr(false),1500)}}
  const PRIVATE_TABS=["home","recruit","daily","crm","broker","agents","autoagents","report","archive","settings"];
  // Guard: if not authed and trying to access private tab, reset to landing
  useEffect(()=>{if(!authed&&PRIVATE_TABS.includes(tab)){setTab("landing")}},[authed,tab]);
  const[buyers,_setBuyers]=useState([]);
  const[sellers,_setSellers]=useState([]);
  const[tasks,_setTasks]=useState([]);
  const[brokerProps,_setBrokerProps]=useState([]);
  const[hotProps,setHotProps]=useState(()=>lv("hotProps",[]));
  const[prospects,_setProspects]=useState([]);
  const[agentsContacts,_setAgentsContacts]=useState([]);
  const[fbGroups,setFbGroups]=useState([]);
  const[agentAuto,_setAgentAuto]=useState({});
  const[agentGroups,_setAgentGroups]=useState([]);
  const[customAgentTexts,_setCustomAgentTexts]=useState({});
  const[landingConfig,_setLandingConfig]=useState({});
  const[autoBanner,setAutoBanner]=useState(null); // {time} when due

  function addFbGroup(g){
    try{db.collection("fb_groups").add({...g,created:new Date().toISOString()})}
    catch(e){console.error("fb_groups add err",e)}
  }
  function delFbGroup(docId){
    try{db.collection("fb_groups").doc(docId).delete()}
    catch(e){console.error("fb_groups del err",e)}
  }

  function fsWrite(name,items){try{const size=JSON.stringify(items).length;if(size>900000){toast("⚠️ יותר מדי תמונות — מחק כמה");return}db.collection("data").doc(name).set({items})}catch(e){console.error("Firestore write error:",e)}}
  function setBuyers(v){_setBuyers(v);sv("buyers",v);fsWrite("buyers",v)}
  function setSellers(v){_setSellers(v);sv("sellers",v);fsWrite("sellers",v)}
  function setTasks(v){_setTasks(v);sv("tasks",v);fsWrite("tasks",v)}
  function setBrokerProps(v){_setBrokerProps(v);sv("brokerProps",v);fsWrite("brokerProps",v)}
  function setProspects(v){_setProspects(v);sv("prospects",v);fsWrite("prospects",v)}
  function setAgentsContacts(v){_setAgentsContacts(v);sv("agentsContacts",v);fsWrite("agentsContacts",v)}
  function setAgentAuto(v){_setAgentAuto(v);sv("agentAuto",v);try{db.collection("data").doc("agentAuto").set({items:v})}catch(e){console.error("agentAuto write err",e)}}
  function setAgentGroups(v){_setAgentGroups(v);sv("agentGroups",v);try{db.collection("data").doc("agentGroups").set({items:v})}catch(e){console.error("agentGroups write err",e)}}
  function setCustomAgentTexts(v){_setCustomAgentTexts(v);sv("customAgentTexts",v);try{db.collection("data").doc("customAgentTexts").set({items:v})}catch(e){console.error("customAgentTexts write err",e)}}
  function setLandingConfig(v){_setLandingConfig(v);sv("landingConfig",v);try{db.collection("landing_page").doc("config").set(v)}catch(e){console.error("landingConfig write err",e)}}

  useEffect(()=>{
    let unsubs=[];
    (async()=>{
      try{
        const initDoc=await db.collection("data").doc("_init").get();
        if(!initDoc.exists){
          await db.collection("data").doc("sellers").set({items:IS});
          await db.collection("data").doc("buyers").set({items:IB});
          await db.collection("data").doc("tasks").set({items:[]});
          await db.collection("data").doc("brokerProps").set({items:[]});
          await db.collection("data").doc("prospects").set({items:[]});
          await db.collection("data").doc("agentsContacts").set({items:[]});
          await db.collection("data").doc("_init").set({done:true,time:new Date().toISOString()});
        }else{
          const sellersDoc=await db.collection("data").doc("sellers").get();
          if(!sellersDoc.exists||!(sellersDoc.data()&&sellersDoc.data().items&&sellersDoc.data().items.length)){
            await db.collection("data").doc("sellers").set({items:IS});
            console.log("Restored sellers from seed");
          }
          const buyersDoc=await db.collection("data").doc("buyers").get();
          if(!buyersDoc.exists||!(buyersDoc.data()&&buyersDoc.data().items&&buyersDoc.data().items.length)){
            await db.collection("data").doc("buyers").set({items:IB});
            console.log("Restored buyers from seed");
          }
          const agentGroupsDoc=await db.collection("data").doc("agentGroups").get();
          if(!agentGroupsDoc.exists||!(agentGroupsDoc.data()&&agentGroupsDoc.data().items&&agentGroupsDoc.data().items.length)){
            await db.collection("data").doc("agentGroups").set({items:DEFAULT_AGENT_GROUPS});
            console.log("Seeded agentGroups from defaults");
          }
        }
      }catch(e){console.error("Firestore init error:",e)}
      const collections=[["buyers",_setBuyers],["sellers",_setSellers],["tasks",_setTasks],["brokerProps",_setBrokerProps],["prospects",_setProspects],["agentsContacts",_setAgentsContacts],["agentAuto",d=>_setAgentAuto(d||{})],["agentGroups",d=>_setAgentGroups(Array.isArray(d)?d:[])],["customAgentTexts",d=>_setCustomAgentTexts(d&&typeof d==="object"&&!Array.isArray(d)?d:{})]];
      // Landing-page config lives at landing_page/config (flat doc, no items wrapper).
      const landingUnsub=db.collection("landing_page").doc("config").onSnapshot(doc=>{
        if(doc.exists){const data=doc.data()||{};_setLandingConfig(data);sv("landingConfig",data)}
      },e=>console.error("landing_page sync err",e));
      unsubs.push(landingUnsub);
      collections.forEach(([name,setter])=>{
        const unsub=db.collection("data").doc(name).onSnapshot(doc=>{
          if(doc.exists){
            const raw=doc.data().items;
            const isObjDoc=name==="agentAuto";
            const items=raw==null?(isObjDoc?{}:[]):raw;
            setter(items);sv(name,items);
          }
        },e=>console.error("Firestore sync error:",name,e));
        unsubs.push(unsub);
      });
      const fbUnsub=db.collection("fb_groups").onSnapshot(snap=>{
        const arr=[];snap.forEach(d=>arr.push({_docId:d.id,...d.data()}));setFbGroups(arr);
      },e=>console.error("fb_groups sync err",e));
      unsubs.push(fbUnsub);
      // Sync VIP extras from Firebase (merge with localStorage)
      const vipUnsub=db.collection("data").doc("vipExtras").onSnapshot(doc=>{
        if(doc.exists){
          const fbExtras=(doc.data()&&doc.data().items)||[];
          if(fbExtras.length>0){
            const merged=[..._vipExtras];
            fbExtras.forEach(fe=>{if(!merged.some(m=>m.phone===fe.phone))merged.push(fe)});
            _vipExtras=merged;
            localStorage.setItem('np7_vipExtras',JSON.stringify(_vipExtras));
            VIP_AGENTS=[...VIP_AGENTS_BUILTIN,..._vipExtras];
          }
        }
      },e=>console.error("vipExtras sync err",e));
      unsubs.push(vipUnsub);
      setLoaded(true);
    })();
    return()=>unsubs.forEach(u=>u());
  },[]);

  // Check if a send-time has passed today and was not yet sent — show banner.
  useEffect(()=>{
    if(!loaded)return;
    const times=(agentAuto&&agentAuto.sendTimes)||["09:00","14:00"];
    const lastSent=(agentAuto&&agentAuto.lastSent)||{};
    const now=new Date();
    const today=now.toISOString().slice(0,10);
    const nowMin=now.getHours()*60+now.getMinutes();
    let due=null;
    for(const t of times){
      const[h,m]=t.split(":").map(Number);
      const tMin=h*60+m;
      const key=today+"_"+t;
      if(nowMin>=tMin&&!lastSent[key]){due=t}
    }
    setAutoBanner(due?{time:due}:null);
  },[loaded,agentAuto,tab]);

  // ── PUBLIC: show landing page when not authenticated ──
  if(!authed){return <div style={{background:"var(--midnight)",minHeight:"100vh"}}>
    <div style={{background:"rgba(8,9,13,0.85)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid var(--border-gold)",padding:"18px 16px",position:"sticky",top:0,zIndex:100}}>
      <div style={{display:"flex",justifyContent:"center",alignItems:"center",gap:10}}>
        <div className="remax-branding"><img src="https://upload.wikimedia.org/wikipedia/commons/thumb/a/a4/Remax_logo.svg/320px-Remax_logo.svg.png" alt="RE/MAX" style={{height:45,objectFit:"contain"}}/></div>
        <div>
          <div style={{fontWeight:800,fontSize:"1.4rem",letterSpacing:"-0.02em",background:"linear-gradient(135deg,#c3a652,#e8c84a)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",lineHeight:1.1}}>NadlanPro</div>
          <div style={{fontSize:"0.78rem",color:"var(--text-dim)",marginTop:3,fontWeight:400}}>RE/MAX Plus · חיים בן סימון · באר שבע</div>
        </div>
      </div>
    </div>
    <PublicLanding onLogin={login} landingConfig={landingConfig}/>
  </div>}

  // ── PRIVATE: authenticated CRM ──
  return <div style={{background:"var(--midnight)",minHeight:"100vh",paddingBottom:90}}>
    <div style={{position:"relative",zIndex:1}}>
      <div style={{background:"rgba(8,9,13,0.85)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",borderBottom:"1px solid var(--border)",padding:"18px 16px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontWeight:800,fontSize:"1.4rem",letterSpacing:"-0.02em",background:"linear-gradient(135deg,#c3a652,#e8c84a)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",backgroundClip:"text",lineHeight:1.1}}>NadlanPro</div>
            <div style={{fontSize:"0.78rem",color:"var(--text-dim)",marginTop:3,fontWeight:400}}>CRM · חיים בן סימון</div>
          </div>
          <div style={{background:"var(--green-soft)",border:"1px solid rgba(22,163,74,0.25)",borderRadius:22,padding:"5px 14px",fontSize:11,color:GR,fontWeight:600,display:"flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,background:GR,borderRadius:"50%",display:"inline-block",animation:"pdot 2s infinite"}}/>פעיל</div>
        </div>
      </div>

      {autoBanner&&<div style={{background:"linear-gradient(135deg,#c3a652,#a8882e)",color:"#08090d",padding:"14px 20px",borderRadius:"0 0 12px 12px",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,flexWrap:"wrap",boxShadow:"0 4px 16px rgba(195,166,82,0.3)",fontWeight:600}}>
        <div style={{fontSize:14,fontWeight:700}}>⏰ הגיע זמן שליחה למתווכים ({autoBanner.time}) — לשלוח עכשיו?</div>
        <div style={{display:"flex",gap:8}}>
          <button onClick={()=>{setTab("autoagents");setAutoBanner(null)}} style={{background:"#08090d",border:"none",borderRadius:10,padding:"8px 14px",color:"#c3a652",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>פתח אוטומציה</button>
          <button onClick={()=>setAutoBanner(null)} style={{background:"transparent",border:"1px solid rgba(8,9,13,0.35)",borderRadius:10,padding:"8px 12px",color:"#08090d",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"inherit"}}>סגור</button>
        </div>
      </div>}
      {tab==="home"&&<Dashboard buyers={buyers} setBuyers={v=>{setBuyers(v);sv("buyers",v)}} sellers={sellers} tasks={tasks} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} brokerProps={brokerProps} setTab={setTab} setCrmInitTab={setCrmInitTab}/>}
      {tab==="recruit"&&<Recruit prospects={prospects} setProspects={setProspects} landingConfig={landingConfig||{}} setLandingConfig={setLandingConfig}/>}
      {tab==="daily"&&<DailyPlan tasks={tasks} setTasks={setTasks}/>}
      {tab==="crm"&&<CRM buyers={buyers} setBuyers={setBuyers} sellers={sellers} setSellers={setSellers} brokerProps={brokerProps} initialTab={crmInitTab} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} tasks={tasks} setTasks={setTasks} agentsContacts={agentsContacts} fbGroups={fbGroups} addFbGroup={addFbGroup} delFbGroup={delFbGroup} customAgentTexts={customAgentTexts||{}}/>}
      {tab==="broker"&&<BrokerPage brokerProps={brokerProps} setBrokerProps={setBrokerProps} buyers={buyers} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} agentsContacts={agentsContacts} fbGroups={fbGroups} addFbGroup={addFbGroup} delFbGroup={delFbGroup} customAgentTexts={customAgentTexts||{}}/>}
      {tab==="agents"&&<AgentsList agentsContacts={agentsContacts} setAgentsContacts={setAgentsContacts} sellers={sellers} brokerProps={brokerProps}/>}
      {tab==="autoagents"&&<AgentAutomation sellers={sellers} brokerProps={brokerProps} agentsContacts={agentsContacts} agentAuto={agentAuto||{}} setAgentAuto={setAgentAuto} agentGroups={agentGroups||[]} setAgentGroups={setAgentGroups} customAgentTexts={customAgentTexts||{}} setCustomAgentTexts={setCustomAgentTexts}/>}
      {tab==="report"&&<WeeklyReport sellers={sellers}/>}
      {tab==="archive"&&<Archive sellers={sellers} setSellers={setSellers} buyers={buyers} setBuyers={setBuyers}/>}
      {tab==="settings"&&<Settings onClose={()=>setTab("home")}/>}

      {loginModal&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center"}} onClick={()=>{setLoginModal(false);setLoginPw("");setLoginErr(false);setLoginShowPw(false)}}>
        <form onSubmit={tryFooterLogin} autoComplete="on" onClick={e=>e.stopPropagation()} className="fade" style={{background:"var(--surface)",border:"1px solid var(--border-gold)",borderRadius:14,padding:20,width:260}}>
          <div style={{position:"relative"}}>
            <input type={loginShowPw?"text":"password"} name="password" autoComplete="current-password" placeholder="סיסמה" value={loginPw} onChange={e=>{setLoginPw(e.target.value);setLoginErr(false)}} style={{width:"100%",background:"var(--midnight-light)",border:"1px solid "+(loginErr?"var(--red)":"var(--border-gold)"),borderRadius:10,padding:"12px 44px 12px 14px",color:"var(--text-white)",fontSize:15,marginBottom:12,direction:"ltr"}}/>
            <button type="button" onClick={()=>setLoginShowPw(!loginShowPw)} style={{position:"absolute",top:10,right:10,background:"none",border:"none",color:"var(--text-dim)",fontSize:18,cursor:"pointer",padding:2,lineHeight:1}}>{loginShowPw?"🙈":"👁️"}</button>
          </div>
          <button type="submit" style={{width:"100%",background:loginErr?"var(--red)":"linear-gradient(135deg,var(--gold),#a8882e)",border:"none",borderRadius:10,padding:"11px 0",color:loginErr?"#fff":"var(--midnight)",fontWeight:700,fontSize:14,cursor:"pointer",fontFamily:"inherit",transition:"background .2s ease"}}>{loginErr?"סיסמה שגויה":"כניסה"}</button>
        </form>
      </div>}

      <nav style={{position:"fixed",bottom:14,left:18,right:18,height:54,background:"rgba(15,17,25,0.82)",backdropFilter:"blur(24px)",WebkitBackdropFilter:"blur(24px)",border:"1px solid rgba(255,255,255,0.05)",borderRadius:27,display:"flex",alignItems:"center",justifyContent:"space-around",zIndex:50,padding:"0 8px",overflowX:"auto",boxShadow:"0 8px 32px rgba(0,0,0,0.5)"}}>
        {TABS.map(t=>{const active=tab===t.k;return <button key={t.k} onClick={()=>setTab(t.k)} className="dock-btn" style={{flex:"0 0 auto",minWidth:46,background:active?"var(--gold-soft)":"transparent",border:"none",cursor:"pointer",padding:"6px 14px",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",color:active?G:"var(--text-dim)"}}>
          <span style={{fontSize:20,lineHeight:1}}>{t.i}</span>
          <span style={{fontSize:"0.6rem",marginTop:2,fontWeight:500,fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</span>
        </button>})}
        <button onClick={()=>{if(authed){logout();setTab("landing");toast("🔓 יצאת מהמערכת")}else{setLoginModal(true)}}} className="dock-btn" style={{flex:"0 0 auto",minWidth:36,background:"transparent",border:"none",cursor:"pointer",padding:"6px 8px",borderRadius:16,display:"flex",flexDirection:"column",alignItems:"center",color:authed?"var(--gold)":"var(--text-dim)",opacity:0.5}}>
          <span style={{fontSize:16,lineHeight:1}}>{authed?"🔓":"🔒"}</span>
        </button>
      </nav>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
