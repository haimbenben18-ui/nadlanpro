function openWA(phone,msg){const p=(phone||"").replace(/^0/,"972").replace(/[-\s]/g,"");if(!p){toast("⚠️ אין מספר טלפון");return}window.open("https://wa.me/"+p+(msg?"?text="+encodeURIComponent(msg):""),"_blank")}
function addCal(title,date,time){const dt=date||(new Date().toISOString().split("T")[0]);const t=time||"09:00";const s=dt.replace(/-/g,"")+"T"+t.replace(":","")+"00";const h=String(Math.min(23,parseInt(t.split(":")[0])+1)).padStart(2,"0");const e=dt.replace(/-/g,"")+"T"+h+t.split(":")[1]+"00";window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(title)+"&dates="+s+"/"+e,"_blank")}

function daysTo(str){if(!str)return null;const p=str.split("/");if(p.length<3)return null;const y=p[2].length===2?"20"+p[2]:p[2];return Math.ceil((new Date(parseInt(y),parseInt(p[1])-1,parseInt(p[0]))-new Date())/86400000)}

function ImgUp({images=[],onAdd,onRemove}){const fr=useRef();const[prev,setPrev]=useState(null);function handle(files){Array.from(files).forEach(f=>{const r=new FileReader();r.onload=e=>onAdd({id:Date.now()+Math.random(),url:e.target.result});r.readAsDataURL(f)})}return <div>{prev&&<div onClick={()=>setPrev(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"zoom-out"}}><img src={prev} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16}}/></div>}<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{images.map(img=><div key={img.id} style={{position:"relative"}}><img src={img.url} onClick={()=>setPrev(img.url)} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)",cursor:"pointer"}}/>{onRemove&&<button onClick={()=>onRemove(img.id)} style={{position:"absolute",top:-8,left:-8,width:24,height:24,borderRadius:"50%",background:RE,border:"2px solid #07060d",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button>}</div>)}{onAdd&&<button onClick={()=>fr.current.click()} style={{width:92,height:74,borderRadius:12,border:"2px dashed rgba(201,168,76,0.3)",background:"rgba(201,168,76,0.04)",color:G,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,fontSize:12,fontWeight:700}}><span style={{fontSize:26}}>📷</span>הוסף</button>}</div>{onAdd&&<input ref={fr} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>}</div>}

      </div>
      {hotProps.length===0&&<div style={{color:"#555",fontSize:14,padding:10}}>בחר עד 10 דירות חמות להצגה</div>}
      {hotProps.map(hp=>{const p=allProps.find(x=>x.id===hp.id&&x.source===hp.source);if(!p)return null;return <div key={hp.id+hp.source} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:14}}>{p.address||p.name}</div><div style={{color:"#777",fontSize:12}}>{p.rooms||"?"}חד · {fmtP(p.price)} {p.source==="broker"?"(מתווך)":""}</div></div>
        <button onClick={()=>{setHotProps(hotProps.filter(x=>!(x.id===hp.id&&x.source===hp.source)));toast("🗑 הוסר")}} style={{background:"none",border:"none",color:"#444",cursor:"pointer",fontSize:18}}>×</button>
      </div>})}
      {showHotPicker&&<Modal title="בחר דירות חמות" color={OR} onClose={()=>setShowHotPicker(false)}>
        {allProps.filter(p=>!hotProps.find(h=>h.id===p.id&&h.source===p.source)).map(p=><div key={p.id+p.source} onClick={()=>{if(hotProps.length>=10){toast("⚠️ מקסימום 10");return}const nh=[...hotProps,{id:p.id,source:p.source}];setHotProps(nh);sv("hotProps",nh);toast("✅ נוסף")}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer"}}>
          <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:15}}>{p.address||p.name}</div><div style={{color:"#777",fontSize:13}}>{p.rooms||"?"}חד · {fmtP(p.price)} {p.source==="broker"?"(מתווך)":""}</div></div>
          <span style={{color:OR,fontSize:20}}>+</span>
        </div>)}
      </Modal>}
    </div>

    {/* Sent buyers */}
    {sentBuyers.length>0&&<div style={{...S.card,border:"1px solid "+BL+"33",marginTop:6}}>
      <div style={{fontWeight:700,color:BL,fontSize:16,marginBottom:10}}>📤 קונים שנשלחו אליהם דירות</div>
      {sentBuyers.map(b=><div key={b.id} style={{padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
        <div style={{fontWeight:600,color:"#ede8f5",fontSize:14}}>{b.name} · <GradeBadge grade={b.grade} onChange={()=>{}}/></div>
        <div style={{color:"#777",fontSize:12}}>{b.sentProperties.length} דירות נשלחו</div>
      </div>)}
    </div>}

    {expiring.length>0&&<div style={{...S.card,border:"1px solid rgba(232,168,76,0.3)",marginTop:6}}>
      <div style={{fontWeight:700,color:OR,marginBottom:12,fontSize:16}}>⚠️ בלעדיויות ({expiring.length})</div>
      {expiring.map(s=>{const days=daysTo(s.exclusiveEnd);return <div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
        <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:15}}>{s.name}</div><div style={{color:"#777",fontSize:13}}>{s.address}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}><Tag c={days<=7?RE:OR} ch={days===0?"היום!":days+" ימים"}/>{s.phone&&<Btn sm ch="💬" c={GR} onClick={()=>openWA(s.phone,"שלום "+s.name+", חיים בן סימון מרימקס. רציתי לעדכן לגבי הבלעדיות.")}/>}</div>
      </div>})}
    </div>}
  </div>
}

// ━━━ DAILY PLAN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function DailyPlan({tasks,setTasks}){
  const[nt,setNt]=useState("");const[ntime,setNtime]=useState("");const[ntype,setNtype]=useState("call");
  function toggle(id){const t=tasks.map(t=>t.id===id?{...t,done:!t.done}:t);setTasks(t);sv("tasks",t)}
  function add(){if(!nt)return;const t=[...tasks,{id:Date.now(),text:nt,time:ntime||"—",done:false,type:ntype}];setTasks(t);sv("tasks",t);setNt("");setNtime("");toast("✅ משימה נוספה")}
  function del(id){const t=tasks.filter(t=>t.id!==id);setTasks(t);sv("tasks",t)}
  const icons={call:"📞",tour:"🏠",send:"📤",publish:"📣",meeting:"🤝",remind:"⏰"};
  const done=tasks.filter(t=>t.done).length;const pct=tasks.length?Math.round(done/tasks.length*100):0;
  return <div style={{padding:S.pg}} className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:18}}><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G}}>תוכנית יום</div><Tag c={done===tasks.length&&tasks.length>0?"#7ec97e":G} ch={done+"/"+tasks.length+" · "+pct+"%"}/></div>
    {tasks.length>0&&<div style={{height:6,background:"rgba(255,255,255,0.06)",borderRadius:6,marginBottom:18,overflow:"hidden"}}><div style={{height:"100%",width:pct+"%",background:"linear-gradient(90deg,"+G+","+OR+")",borderRadius:6,transition:"width .5s"}}/></div>}
    {tasks.length===0&&<Empty icon="📋" text="אין משימות"/>}
    {tasks.map(t=><div key={t.id} style={{display:"flex",alignItems:"center",gap:12,padding:"14px 16px",background:t.done?"rgba(126,201,126,0.04)":"rgba(255,255,255,0.03)",borderRadius:16,marginBottom:8,border:"1px solid "+(t.done?"rgba(126,201,126,0.15)":"rgba(255,255,255,0.06)")}}>
      <div onClick={()=>toggle(t.id)} style={{width:28,height:28,borderRadius:"50%",border:"2px solid "+(t.done?"#7ec97e":G+"44"),background:t.done?"#7ec97e":"transparent",display:"flex",alignItems:"center",justifyContent:"center",fontSize:14,color:"#1a1208",cursor:"pointer",flexShrink:0}}>{t.done?"✓":""}</div>
      <div style={{flex:1,fontSize:15,color:t.done?"#555":"#ede8f5",textDecoration:t.done?"line-through":"none"}}>{icons[t.type]||"📌"} {t.text}</div>
      <div style={{color:"#555",fontSize:13,flexShrink:0,fontWeight:600}}>{t.time}</div>
      <button onClick={()=>addCal(t.text)} title="יומן" style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:4}}>📅</button>
      <button onClick={()=>del(t.id)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:20,padding:4}}>×</button>
    </div>)}
    <div style={S.card}><Lbl t="משימה חדשה" icon="➕"/><input placeholder="תיאור..." value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} style={{...S.inp,marginBottom:12}}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}><input type="time" value={ntime} onChange={e=>setNtime(e.target.value)} style={S.inp}/><select value={ntype} onChange={e=>setNtype(e.target.value)} style={{...S.inp,background:"#0e0d14"}}><option value="call">📞 שיחה</option><option value="tour">🏠 סיור</option><option value="meeting">🤝 פגישה</option><option value="send">📤 שליחה</option><option value="publish">📣 פרסום</option><option value="remind">⏰ תזכורת</option></select></div><Btn full ch="הוסף משימה" onClick={add} dis={!nt} icon="➕"/></div>
  </div>
}

// ━━━ RECRUIT (גיוס נכסים) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Recruit(){
  const[phones,setPhones]=useState("");
  const[selMsg,setSelMsg]=useState(0);
  const[msg,setMsg]=useState("");
  const[prospects,setProspects]=useState(()=>lv("prospects",[]));
  const[viewP,setViewP]=useState(null);
  const[mode,setMode]=useState("send"); // send | list

  const templates=["שלום 👋\nחיים בן סימון, מתווך RE/MAX באר שבע 13 שנה.\nראיתי את הנכס שלך ויש לי 2 קונים רציניים עם הון עצמי מוכן שמחפשים בדיוק באזור שלך.\nאשמח לשיחה קצרה של 3 דקות — בלי התחייבות.\nמתי נוח לך? 📞\nחיים בן סימון | RE/MAX באר שבע","שלום 👋\nחיים בן סימון מרימקס באר שבע.\nפניתי אליך כי יש לי קונה עם מזומן שמחפש נכס בדיוק כמו שלך — והוא רוצה לסגור השבוע.\nשווה שיחה של 5 דקות? אני זמין היום.\nחיים | RE/MAX | באר שבע","שלום 👋\nחיים בן סימון מרימקס באר שבע.\nבעקבות המעבר לעיר הבהד\"ים יש לי קונים מצה\"ל ומשרד הביטחון עם תקציב מוכן שמחפשים דירות בדיוק באזור שלך.\nאשמח לשיחה קצרה — בלי התחייבות.\nחיים בן סימון | RE/MAX | 13 שנות ניסיון"];

  useEffect(()=>{setMsg(templates[selMsg])},[selMsg]);

  function sendAll(){
    const nums=phones.split(/[\n,;]+/).map(x=>x.trim()).filter(Boolean);
    if(!nums.length){toast("⚠️ הכנס מספרים");return}
    nums.forEach((n,i)=>setTimeout(()=>openWA(n,msg),i*500));
    toast("📤 נשלח ל-"+nums.length+" מספרים");
  }
  function addProspect(){
    const num=phones.trim().split(/[\n,;]+/)[0]||"";
    if(!num){toast("⚠️ הכנס מספר");return}
    const p={id:Date.now(),phone:num,grade:"B",notes:"",sentMaterial:false,followUp:false,exclusive:false,calDate:"",logs:[{text:"כרטיסייה נפתחה",time:nowStr()}]};
    const np=[...prospects,p];setProspects(np);sv("prospects",np);toast("✅ כרטיסייה נפתחה");setViewP(p)
  }
  function updProspect(id,f,v){const np=prospects.map(p=>p.id===id?{...p,[f]:v}:p);setProspects(np);sv("prospects",np);if(viewP&&viewP.id===id)setViewP(np.find(p=>p.id===id))}
  function addPLog(id,text){const np=prospects.map(p=>p.id===id?{...p,logs:[...p.logs,{text,time:nowStr()}]}:p);setProspects(np);sv("prospects",np);if(viewP&&viewP.id===id)setViewP(np.find(p=>p.id===id))}
  function delProspect(id){const np=prospects.filter(p=>p.id!==id);setProspects(np);sv("prospects",np);setViewP(null);toast("🗑 נמחק")}

  if(viewP){return <div style={{padding:S.pg}} className="fade">
    <button onClick={()=>setViewP(null)} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.card,border:"1px solid "+OR+"44"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:22,color:"#ede8f5"}}>{viewP.phone}</div></div>
        <div style={{display:"flex",gap:8}}><GradeBadge grade={viewP.grade} onChange={v=>updProspect(viewP.id,"grade",v)}/><Btn sm ch="🗑" c={RE} ghost onClick={()=>delProspect(viewP.id)}/></div>
      </div>
      <Inp label="מספר טלפון" ph="050..." val={viewP.phone} set={v=>updProspect(viewP.id,"phone",v)} icon="📱" mb={12}/>
      <Inp label="הערות" ph="מלל חופשי..." val={viewP.notes} set={v=>updProspect(viewP.id,"notes",v)} rows={3} mb={12}/>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        {[{f:"sentMaterial",l:"נשלח חומר",i:"📤"},{f:"followUp",l:"פולואפ",i:"🔄"},{f:"exclusive",l:"גויסה בלעדיות",i:"🏆"}].map(x=><button key={x.f} onClick={()=>updProspect(viewP.id,x.f,!viewP[x.f])} style={{background:viewP[x.f]?"#7ec97e22":"rgba(255,255,255,0.03)",border:"1px solid "+(viewP[x.f]?"#7ec97e55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"10px 16px",color:viewP[x.f]?"#7ec97e":"#777",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{x.i} {x.l}</button>)}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16}}>
        <Btn sm ch="📅 יומן" ghost onClick={()=>addCal("פגישה גיוס — "+viewP.phone)}/>
        <Btn sm ch="💬 ווטסאפ" c={GR} onClick={()=>openWA(viewP.phone)}/>
      </div>
      <Lbl t="תיעוד" icon="📝"/>
      {viewP.logs&&viewP.logs.map((l,i)=><div key={i} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}><span style={{color:"#555"}}>{l.time}</span> — <span style={{color:"#bbb"}}>{l.text}</span></div>)}
      <div style={{display:"flex",gap:8,marginTop:10}}><input placeholder="הוסף תיעוד..." id="plog" style={{...S.inp,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value){addPLog(viewP.id,e.target.value);e.target.value=""}}}/></div>
    </div>
  </div>}

  return <div style={{padding:S.pg}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📤 גיוס נכסים</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>שלח הודעות מפתות לבעלי נכסים מיד2</div>
    <div style={{display:"flex",gap:10,marginBottom:16}}><Pill ch="✉️ שליחה" active={mode==="send"} onClick={()=>setMode("send")} c={OR}/><Pill ch={"📋 כרטיסיות ("+prospects.length+")"} active={mode==="list"} onClick={()=>setMode("list")} c={G}/></div>

    {mode==="send"&&<div>
      <div style={S.card}>
        <Lbl t="מספרי טלפון" icon="📱"/>
        <textarea placeholder="הכנס מספרים (כל מספר בשורה חדשה)..." value={phones} onChange={e=>setPhones(e.target.value)} rows={3} style={{...S.inp,resize:"none",marginBottom:14}}/>
        <Lbl t="בחר הודעה"/>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[1,2,3].map(i=><button key={i} onClick={()=>setSelMsg(i-1)} style={{flex:1,background:selMsg===i-1?"rgba(232,168,76,0.15)":"rgba(255,255,255,0.03)",border:"1px solid "+(selMsg===i-1?OR+"55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"11px",cursor:"pointer",color:selMsg===i-1?OR:"#666",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>אופציה {i}</button>)}
        </div>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={8} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.75,marginBottom:14}}/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn full ch="שלח ווטסאפ" c={GR} onClick={sendAll} icon="📱"/>
          <Btn sm ghost ch="פתח כרטיסייה" onClick={addProspect} icon="📋"/>
        </div>
      </div>
    </div>}

    {mode==="list"&&<div>
      {prospects.length===0&&<Empty icon="📋" text="אין כרטיסיות גיוס"/>}
      {prospects.map(p=><div key={p.id} style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div><div style={{fontWeight:700,color:"#ede8f5",fontSize:16}}>{p.phone}</div><div style={{color:"#777",fontSize:13}}>{p.notes?p.notes.substring(0,50):"ללא הערות"}</div></div>
          <div style={{display:"flex",gap:8}}><GradeBadge grade={p.grade} onChange={v=>updProspect(p.id,"grade",v)}/></div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {p.sentMaterial&&<Tag c="#7ec97e" ch="📤 נשלח חומר"/>}
          {p.followUp&&<Tag c={BL} ch="🔄 פולואפ"/>}
          {p.exclusive&&<Tag c={G} ch="🏆 בלעדיות"/>}
        </div>
        <div style={{display:"flex",gap:8}}>
          <Btn sm ch="כרטיסייה" c={OR} onClick={()=>setViewP(p)}/>
          <Btn sm ch="💬" c={GR} onClick={()=>openWA(p.phone)}/>
          <Btn sm ghost c={RE} ch="מחק" onClick={()=>delProspect(p.id)}/>
        </div>
      </div>)}
    </div>}
  </div>
}

// ━━━ CRM ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function CRM({buyers,setBuyers,sellers,setSellers,brokerProps}){
  const[tab,setTab]=useState("sellers");const[mode,setMode]=useState("list");const[sel,setSel]=useState(null);const[search,setSearch]=useState("");
  // seller form
  const[sn,setSn]=useState("");const[sp,setSp]=useState("");const[sa,setSa]=useState("");const[sc,setSc]=useState("באר שבע");const[sr,setSr]=useState("");const[ss,setSs]=useState("");const[sf,setSf]=useState("");const[sprice,setSprice]=useState("");const[sred,setSred]=useState("");const[ses,setSes]=useState("");const[see,setSee]=useState("");const[snotes,setSnotes]=useState("");const[simgs,setSimgs]=useState([]);const[svid,setSvid]=useState("");
  // buyer form
  const[bn,setBn]=useState("");const[bp,setBp]=useState("");const[bb,setBb]=useState("");const[bnotes,setBnotes]=useState("");const[bg,setBg]=useState("B");
  // publish
  const[pubOpen,setPubOpen]=useState(false);const[pubPlat,setPubPlat]=useState("whatsapp");const[pubResult,setPubResult]=useState(null);const[pubLoading,setPubLoading]=useState(false);
  // send property modal
  const[sendModal,setSendModal]=useState(null);const[sendSelProp,setSendSelProp]=useState(null);
  // log input
  const[logInput,setLogInput]=useState("");

  const allProps=[...sellers.map(s=>({...s,src:"s"})),...(brokerProps||[]).map(p=>({...p,src:"b"}))];

  function addSeller(){if(!sn)return;const s={id:Date.now(),name:sn,phone:sp,address:sa,city:sc,rooms:sr,size:ss,floor:sf,price:sprice,reducedPrice:sred,exclusiveStart:ses,exclusiveEnd:see,notes:snotes,images:simgs,video:svid,actions:[],logs:[],created:nowStr()};const ns=[...sellers,s];setSellers(ns);sv("sellers",ns);setSn("");setSp("");setSa("");setSr("");setSs("");setSf("");setSprice("");setSred("");setSes("");setSee("");setSnotes("");setSimgs([]);setSvid("");setMode("list");toast("✅ מוכר נוסף")}
  function addBuyer(){if(!bn)return;const b={id:Date.now(),name:bn,phone:bp,budget:bb,notes:bnotes,grade:bg,sentProperties:[],status:"חדש",actions:[],logs:[],created:nowStr()};const nb=[...buyers,b];setBuyers(nb);sv("buyers",nb);setBn("");setBp("");setBb("");setBnotes("");setBg("B");setMode("list");toast("✅ קונה נוסף")}
  function delS(id){if(!confirm("למחוק?"))return;const ns=sellers.filter(s=>s.id!==id);setSellers(ns);sv("sellers",ns);setSel(null);setMode("list");toast("🗑 נמחק")}
  function delB(id){if(!confirm("למחוק?"))return;const nb=buyers.filter(b=>b.id!==id);setBuyers(nb);sv("buyers",nb);setSel(null);setMode("list");toast("🗑 נמחק")}
  function updS(id,f,v){const ns=sellers.map(s=>s.id===id?{...s,[f]:v}:s);setSellers(ns);sv("sellers",ns);if(sel&&sel.id===id)setSel(ns.find(s=>s.id===id))}
  function updB(id,f,v){const nb=buyers.map(b=>b.id===id?{...b,[f]:v}:b);setBuyers(nb);sv("buyers",nb);if(sel&&sel.id===id)setSel(nb.find(b=>b.id===id))}
  function addImg(id,img){updS(id,"images",[...(sellers.find(s=>s.id===id)?.images||[]),img])}
  function remImg(id,iid){updS(id,"images",(sellers.find(s=>s.id===id)?.images||[]).filter(i=>i.id!==iid))}
  function addLog(id,text,type){
    if(type==="s"){const ns=sellers.map(s=>s.id===id?{...s,logs:[...(s.logs||[]),{text,time:nowStr()}]}:s);setSellers(ns);sv("sellers",ns);if(sel&&sel.id===id)setSel(ns.find(s=>s.id===id))}
    else{const nb=buyers.map(b=>b.id===id?{...b,logs:[...(b.logs||[]),{text,time:nowStr()}]}:b);setBuyers(nb);sv("buyers",nb);if(sel&&sel.id===id)setSel(nb.find(b=>b.id===id))}
  }
  function sendPropertyToBuyer(buyerId,prop){
    const nb=buyers.map(b=>{if(b.id!==buyerId)return b;const sp=b.sentProperties||[];return{...b,sentProperties:[...sp,{id:prop.id,address:prop.address,time:nowStr()}],logs:[...(b.logs||[]),{text:"נשלחה דירה: "+prop.address,time:nowStr()}]}});

  if(mode==="add"){return <div style={{padding:S.pg}} className="fade"><button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button><div style={{...S.card,border:"1px solid "+TE+"44"}}><div style={{fontWeight:800,color:TE,fontSize:18,marginBottom:20}}>🤝 נכס ממתווך</div><Inp label="שם מתווך (פנימי)" val={bagent} set={setBagent} mb={10} icon="🤝"/><Inp label="כתובת *" ph="רחוב 10" val={ba} set={setBa} mb={10}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="עיר" val={bc} set={setBc} mb={10}/><Inp label="מחיר" val={bprice} set={setBprice} mb={10}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><Inp label="חדרים" val={br2} set={setBr2} mb={10}/><Inp label="מ״ר" val={bs} set={setBs} mb={10}/><Inp label="קומה" val={bf} set={setBf} mb={10}/></div><Inp label="טלפון" val={bp} set={setBp} mb={10}/><Inp label="הערות" val={bnotes} set={setBnotes} rows={2} mb={14}/><Inp label="קישור סרטון" ph="https://..." val={bvid} set={setBvid} mb={14} icon="🎬"/><div style={{marginBottom:18}}><Lbl t="תמונות" icon="📷"/><ImgUp images={bimgs} onAdd={img=>setBimgs(p=>[...p,img])} onRemove={id=>setBimgs(p=>p.filter(i=>i.id!==id))}/></div><div style={{display:"flex",gap:10}}><Btn full ch="שמור" onClick={addProp} dis={!ba&&!bn} c={TE} icon="💾"/><Btn ghost ch="ביטול" onClick={()=>setMode("list")}/></div></div></div>}

    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:18}}>🎓 אוניברסיטה</div>
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:18}}>{cats.map(c=><Pill key={c.k} ch={c.i+" "+c.l} active={cat===c.k} onClick={()=>setCat(c.k)} c={c.c}/>)}</div>
    {!content&&!loading&&<div>{(topics[cat]||[]).map((t,i)=><button key={i} onClick={()=>learn(t)} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,fontFamily:"inherit",textAlign:"right",marginBottom:8}}><span style={{fontSize:26}}>{cats.find(c=>c.k===cat)?.i}</span><span style={{color:"#d0c090",fontSize:15,flex:1,fontWeight:600}}>{t}</span><span style={{color:"#333",fontSize:18}}>←</span></button>)}<div style={{...S.card,marginTop:8}}><Lbl t="נושא שלי" icon="✏️"/><input placeholder="כתוב..." value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&topic.trim()&&learn(topic)} style={{...S.inp,marginBottom:12}}/><Btn full ch="למד" onClick={()=>learn(topic)} dis={!topic.trim()} icon="🎓"/></div></div>}
    {loading&&<div style={{...S.card,textAlign:"center",padding:44}}><div className="spinner" style={{margin:"0 auto 16px"}}/><div style={{color:G,fontWeight:700}}>מכין שיעור...</div></div>}
    {content&&!loading&&<div className="fade"><button onClick={()=>setContent(null)} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזרה</button><div style={S.cg}><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:20,color:G,marginBottom:16}}>{content.topic}</div><div style={{color:"#d0c8e8",fontSize:15,lineHeight:2,whiteSpace:"pre-wrap"}}>{content.text}</div><div style={{display:"flex",gap:10,marginTop:20}}><Btn ch="העתק" c={G} onClick={()=>{navigator.clipboard.writeText(content.text);toast("📋!")}} icon="📋" style={{flex:1}}/><Btn ghost ch="נושא חדש" onClick={()=>setContent(null)} style={{flex:1}}/></div></div></div>}
  </div>
}

// ━━━ SETTINGS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Settings({onClose}){
  return <div style={{padding:S.pg}} className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G}}>⚙️ הגדרות</div>{onClose&&<button onClick={onClose} style={{background:"rgba(255,255,255,0.06)",border:"none",color:"#888",width:36,height:36,borderRadius:12,fontSize:22,cursor:"pointer"}}>×</button>}</div>
    <div style={S.card}><Lbl t="API Key" icon="🔑"/><div style={{color:"#7ec97e",fontSize:14}}>✓ מפתח Claude מוגדר — כל הפיצ'רים זמינים</div></div>
    <div style={S.card}><Lbl t="Google Calendar" icon="📅"/><div style={{color:"#777",fontSize:14}}>כפתור 📅 בכל משימה פותח את Google Calendar</div></div>
    <div style={S.card}><Lbl t="גרסה" icon="💎"/><div style={{color:"#777",fontSize:14}}>NadlanPro v7 · RE/MAX חיים בן סימון · באר שבע</div></div>
  </div>
}

// ━━━ APP ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TABS=[
  {k:"home",l:"בית",i:"🏠"},{k:"recruit",l:"גיוס",i:"📤"},{k:"daily",l:"יומי",i:"📅"},
  {k:"crm",l:"לקוחות",i:"👥"},{k:"broker",l:"מתווך",i:"🤝"},{k:"report",l:"דיווח",i:"📊"},
  {k:"tiktok",l:"טיקטוק",i:"🎬"},{k:"uni",l:"אוני׳",i:"🎓"},{k:"settings",l:"⚙️",i:"⚙️"},
];

function App(){
  const[tab,setTab]=useState("home");
  const[buyers,setBuyers]=useState(()=>lv("buyers",[]));
  const[sellers,setSellers]=useState(()=>{const s=lv("sellers",null);return s&&s.length>0?s:IS});
  const[tasks,setTasks]=useState(()=>lv("tasks",[]));
  const[brokerProps,setBrokerProps]=useState(()=>lv("brokerProps",[]));
  const[hotProps,setHotProps]=useState(()=>lv("hotProps",[]));

  return <div style={{background:"#07060d",minHeight:"100vh",paddingBottom:92}}>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse 60% 45% at 12% 8%,rgba(100,70,180,0.07) 0%,transparent 55%)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1}}>
      <div style={{background:"rgba(7,6,13,0.96)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(201,168,76,0.1)",padding:"15px 18px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:G}}>NadlanPro</div><div style={{fontSize:11,color:"#444",marginTop:2}}>RE/MAX · חיים בן סימון · באר שבע</div></div>
          <div style={{background:"rgba(37,211,102,0.07)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:22,padding:"5px 14px",fontSize:11,color:GR,fontWeight:700,display:"flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,background:GR,borderRadius:"50%",display:"inline-block",animation:"pdot 2s infinite"}}/>פעיל</div>
        </div>
      </div>

      {tab==="home"&&<Dashboard buyers={buyers} sellers={sellers} tasks={tasks} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} brokerProps={brokerProps}/>}
      {tab==="recruit"&&<Recruit/>}
      {tab==="daily"&&<DailyPlan tasks={tasks} setTasks={setTasks}/>}
      {tab==="crm"&&<CRM buyers={buyers} setBuyers={setBuyers} sellers={sellers} setSellers={setSellers} brokerProps={brokerProps}/>}
      {tab==="broker"&&<BrokerPage brokerProps={brokerProps} setBrokerProps={setBrokerProps} buyers={buyers}/>}
      {tab==="report"&&<WeeklyReport sellers={sellers}/>}
      {tab==="tiktok"&&<Tiktok/>}
      {tab==="uni"&&<University/>}
      {tab==="settings"&&<Settings onClose={()=>setTab("home")}/>}

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(5,4,10,0.98)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(201,168,76,0.1)",display:"flex",zIndex:200,padding:"6px 0 12px",overflowX:"auto"}}>
        {TABS.map(t=>{const active=tab===t.k;return <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:"0 0 auto",minWidth:54,background:"none",border:"none",cursor:"pointer",padding:"6px 6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
          {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:3,background:G,borderRadius:3}}/>}
          <span style={{fontSize:22}}>{t.i}</span>
          <span style={{fontSize:9.5,fontWeight:active?800:600,color:active?G:"#2a2a2a",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</span>
        </button>})}
      </nav>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
