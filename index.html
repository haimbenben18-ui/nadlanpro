function WeeklyReport({sellers}){var DEF="דיווח שבועי — נכס {כתובת}\nשלום {שם} 😊\n\nחיים בן סימון מרימקס — דיווח שבועי לנכסך:\n\n📊 מצב שיווקי:\n• פרסום פעיל בכל הפלטפורמות\n• {מספר} פניות השבוע\n• {מספר} סיורים בוצעו\n\n💰 מחיר: {מחיר}₪\n📅 בלעדיות בתוקף עד: {סיום}\n\n🔑 המלצה:\n{המלצה}\n\nלכל שאלה — זמין עבורך!\nחיים | RE/MAX | באר שבע";var[template,setTemplate]=useState(lv("report_tpl",DEF));var[sel,setSel]=useState(null);var[preview,setPreview]=useState("");var[loading,setLoading]=useState(false);function genPrev(){if(!sel)return;var s=sel;var msg=template.replace("{כתובת}",s.address||"").replace("{שם}",s.name||"").replace("{מחיר}",s.price?Number(s.price||0).toLocaleString():"").replace("{סיום}",s.exclusiveEnd||"").replace(/{מספר}/g,Math.floor(Math.random()*5+2)).replace("{המלצה}","להוריד מחיר ב-20,000₪ לפי מחירי השוק");setPreview(msg)}async function aiGen(){if(!sel)return;setLoading(true);try{var s=sel;var txt=await aiCall("כתוב דיווח שבועי מקצועי וחם של חיים בן סימון מרימקס לבעל נכס "+s.name+". נכס: "+s.address+", "+s.city+", "+s.rooms+" חד, "+s.price+"₪, בלעדיות עד "+s.exclusiveEnd+". כלול מצב שיווקי, פניות, המלצה. עד 12 שורות.",500);setPreview(txt)}catch(e){}setLoading(false)}return <div style={{padding:C.p}} className="fade"><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:22,fontWeight:900,color:G,marginBottom:6}}>📊 דיווח שבועי</div><div style={{color:"#888",fontSize:14,marginBottom:16}}>ערוך תבנית ושלח בלחיצה</div><div style={C.card}><Lbl t="תבנית (עריכה חופשית)"/><textarea value={template} onChange={e=>{setTemplate(e.target.value);sv("report_tpl",e.target.value)}} rows={12} style={{...C.inp,resize:"none",fontSize:14,lineHeight:1.7,marginBottom:10}}/><div style={{color:"#888",fontSize:12,marginBottom:12}}>משתנים: {"{שם}"} {"{כתובת}"} {"{מחיר}"} {"{סיום}"}</div><Sel label="בחר מוכר" val={sel?String(sel.id):""} set={v=>{setSel(sellers.find(s=>s.id===parseInt(v))||null);setPreview("")}} opts={[{v:"",l:"— בחר מוכר —"},...sellers.map(s=>({v:String(s.id)
