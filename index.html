async function sendWhatsAppMedia(phone,caption,mediaItems){
  const ULTRAMSG_INSTANCE="instance169955";
  const ULTRAMSG_TOKEN="slhhpfslyuey11fp";
  const p=(phone||"").replace(/^0/,"972").replace(/[-\s+]/g,"");
  if(!p){toast("⚠️ אין מספר טלפון");return false}
  const items=(mediaItems||[]).map(m=>typeof m==='string'?{url:m,type:'image'}:m);
  if(items.length===0){
    try{
      const r=await fetch(`https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({token:ULTRAMSG_TOKEN,to:p,body:caption})
      });
      const d=await r.json();
      if(d.sent)toast("✅ הודעה נשלחה");
      else toast("❌ שגיאה: "+(d.error||"unknown"));
      return d.sent;
    }catch(e){toast("❌ "+e.message);return false}
  }
  async function sendMediaItem(item,i){
    const isVideo=item.type==='video';
    const endpoint=isVideo?'video':'image';
    const fieldName=isVideo?'video':'image';
    const bodyParams={token:ULTRAMSG_TOKEN,to:p,caption:i===0?caption:""};
    bodyParams[fieldName]=item.url;
    const r=await fetch(`https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/${endpoint}`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams(bodyParams)
    });
    return await r.json();
  }
  try{
    for(let i=0;i<items.length;i++){
      toast("📸 שולח "+(items[i].type==='video'?"וידאו":"תמונה")+" "+(i+1)+" מתוך "+items.length+"...");
      let d=await sendMediaItem(items[i],i);
      if(!d.sent){
        toast("⚠️ ניסיון חוזר לתמונה "+(i+1)+"...");
        await new Promise(res=>setTimeout(res,2000));
        d=await sendMediaItem(items[i],i);
        if(!d.sent){toast("❌ תמונה "+(i+1)+" נכשלה לאחר ניסיון חוזר");console.error(d);return false}
      }
      if(i<items.length-1)await new Promise(res=>setTimeout(res,2000));
    }
    toast("✅ כל "+items.length+" הקבצים נשלחו!");
    return true;
  }catch(e){
    toast("❌ "+e.message);
    console.error(e);
    return false;
  }
}

function buildCaption(prop,buyerName){
  const streetOnly=(prop.address||"").replace(/\s*\d+.*/,"").trim();
  const city=prop.city||"באר שבע";
  const rooms=prop.rooms?prop.rooms+" חדרים":"";
  const size=prop.size?prop.size+' מ"ר':"";
  const floor=prop.floor?"קומה "+prop.floor:"";
  const price=prop.price?Number(prop.price).toLocaleString()+" ₪":"";
  const notes=prop.notes||"";
  let msg="";
  if(buyerName)msg+="שלום "+buyerName+" 😊\n\n";
  msg+="🏠 *"+(streetOnly||prop.name||"נכס")+"*\n";
  msg+="📍 "+city+"\n\n";
  if(rooms)msg+="🛏 "+rooms+"\n";
  if(size)msg+="📐 "+size+"\n";
  if(floor)msg+="🏢 "+floor+"\n";
  if(price)msg+="\n💰 *"+price+"*\n";
  if(notes)msg+="\n"+notes+"\n";
  msg+="\n━━━━━━━━━━\n";
  msg+="📞 *חיים בן סימון*\n";
  msg+="🏆 RE/MAX באר שבע\n";
  msg+="📱 054-4740691";
  return msg;
}

function buildMultiCaption(prop,buyerName,isFirst,totalCount,currentIndex){
  const streetOnly=(prop.address||"").replace(/\s*\d+.*/,"").trim();

  msg+="📍 "+city+"\n\n";
  if(rooms)msg+="🛏 "+rooms+"\n";
  if(size)msg+="📐 "+size+"\n";
  if(floor)msg+="🏢 "+floor+"\n";
  if(price)msg+="\n💰 *"+price+"*\n";
  if(notes)msg+="\n"+notes+"\n";
  if(currentIndex===totalCount-1){
    msg+="\n━━━━━━━━━━\n";
    msg+="📞 *חיים בן סימון*\n";
    msg+="🏆 RE/MAX באר שבע\n";
    msg+="📱 054-4740691\n\n";
    if(totalCount>1){

    }else{
      msg+="מעוניין? אשמח לתאם סיור 😊";
    }
  }
  return msg;
}

async function sendMultipleProperties(buyer,propsArray){
  if(!buyer.phone){toast("⚠️ אין טלפון לקונה");return false}
  if(propsArray.length===0){toast("⚠️ לא נבחרו דירות");return false}
  toast("⏳ שולח "+propsArray.length+" דירות ל"+buyer.name+"...");
  for(let i=0;i<propsArray.length;i++){
    const prop=propsArray[i];
    const isFirst=(i===0);
    const caption=buildMultiCaption(prop,buyer.name,isFirst,propsArray.length,i);
    const media=prop.images||[];
    const ok=await sendWhatsAppMedia(buyer.phone,caption,media);
    if(!ok){
      toast("❌ נעצר אחרי דירה "+(i+1));
      return false;
    }
    if(i<propsArray.length-1){
      await new Promise(res=>setTimeout(res,3000));
    }
  }
  toast("✅ כל "+propsArray.length+" הדירות נשלחו!");
  return true;
}

async function sendDirectMessage(phone,text){
  const ULTRAMSG_INSTANCE="instance169955";
  const ULTRAMSG_TOKEN="slhhpfslyuey11fp";

      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({token:ULTRAMSG_TOKEN,to:p,body:text})
    });
    const d=await r.json();
    if(d.sent){
      try{db.collection("messages").doc(p).collection("msgs").add({text,sent_at:new Date().toISOString(),direction:"out"})}catch(e){console.error("msg save err",e)}
      return true;
    }else{toast("❌ שגיאה: "+(d.error||"unknown"));return false}
  }catch(e){toast("❌ "+e.message);return false}
}

// Cleanup posted-group marks. Each day uses a new storage key suffixed with
// YYYY-MM-DD, so a new day implicitly starts with an empty list — but old
// keys would otherwise accumulate forever. On every page load we drop any
// np7_fb_posted_* key whose suffix isn't today. A one-shot flag also forces
// a full wipe (including today's marks) the first time this code ships, so
// stale data from before this change is cleared immediately.
(function cleanupPostedMarks(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const postedPrefix=PX+"fb_posted_";
    const wipeFlagKey=PX+"fb_wipe_v1";
    const fullWipe=!localStorage.getItem(wipeFlagKey);
    const toRemove=[];
    for(let i=0;i<localStorage.length;i++){
      const k=localStorage.key(i);
      if(!k||!k.startsWith(postedPrefix))continue;
      if(fullWipe||!k.endsWith("_"+today))toRemove.push(k);
    }
    toRemove.forEach(k=>localStorage.removeItem(k));
    if(fullWipe)localStorage.setItem(wipeFlagKey,"1");
    if(toRemove.length)console.log("[cleanupPostedMarks] removed "+toRemove.length+" entries"+(fullWipe?" (initial full wipe)":""));
  }catch(e){console.warn("[cleanupPostedMarks] failed:",e)}
})();

function addCal(title,date,time){const dt=date||(new Date().toISOString().split("T")[0]);const t=time||"09:00";const s=dt.replace(/-/g,"")+"T"+t.replace(":","")+"00";const h=String(Math.min(23,parseInt(t.split(":")[0])+1)).padStart(2,"0");const e=dt.replace(/-/g,"")+"T"+h+t.split(":")[1]+"00";window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(title)+"&dates="+s+"/"+e,"_blank")}
function fmtP(p){if(!p||isNaN(Number(p)))return"—";return Number(p).toLocaleString("he-IL")+"₪"}
function daysTo(str){if(!str)return null;const p=str.split("/");if(p.length<3)return null;const y=p[2].length===2?"20"+p[2]:p[2];return Math.ceil((new Date(parseInt(y),parseInt(p[1])-1,parseInt(p[0]))-new Date())/86400000)}
function nowStr(){const d=new Date();return d.toLocaleDateString("he")+" "+d.toLocaleTimeString("he",{hour:"2-digit",minute:"2-digit"})}

function ImgUp({images=[],onAdd,onRemove}){const fr=useRef();const[prev,setPrev]=useState(null);async function handle(files){const arr=Array.from(files);if(arr.length===0)return;toast("⏳ מעלה "+arr.length+" קבצים...");const newMedia=[];for(const f of arr){try{const isVideo=f.type.startsWith('video/');if(isVideo&&f.size>40*1024*1024){toast("⚠️ וידאו גדול מדי (מקס 40MB): "+f.name);continue}const fd=new FormData();fd.append('file',f);fd.append('upload_preset','nadlanpro');const resourceType=isVideo?'video':'image';const r=await fetch('https://api.cloudinary.com/v1_1/dopvqfgzw/'+resourceType+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.secure_url){newMedia.push({id:Date.now()+Math.random(),url:d.secure_url,type:isVideo?'video':'image'})}else{console.error(d);toast("❌ שגיאה ב-"+f.name)}}catch(e){console.error(e);toast("❌ "+e.message)}}if(newMedia.length>0){onAdd(newMedia);toast("✅ "+newMedia.length+" קבצים הועלו")}else{toast("❌ שגיאה בהעלאה")}}return <div>{prev&&<div onClick={()=>setPrev(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"zoom-out"}}>{prev.type==='video'?<video src={prev.url} controls style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16}}/>:<img src={prev.url||prev} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16}}/>}</div>}<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{images.map(img=><div key={img.id} style={{position:"relative"}}>{img.type==='video'?<video src={img.url} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)"}} onClick={()=>setPrev(img)}/>:<img src={img.url} onClick={()=>setPrev(img)} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)",cursor:"pointer"}}/>}{onRemove&&<button onClick={()=>onRemove(img.id)} style={{position:"absolute",top:-8,left:-8,width:24,height:24,borderRadius:"50%",background:RE,border:"2px solid #07060d",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button>}</div>)}{onAdd&&<button onClick={()=>fr.current.click()} style={{width:92,height:74,borderRadius:12,border:"2px dashed rgba(201,168,76,0.3)",background:"rgba(201,168,76,0.04)",color:G,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,fontSize:12,fontWeight:700}}><span style={{fontSize:26}}>📷</span>הוסף</button>}</div>{onAdd&&<input ref={fr} type="file" accept="image/*,video/*" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>}</div>}

async function aiCall(prompt,max=900){

// ━━━ INLINE MSG BOX ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function InlineMsgBox({phone,name,onSent}){
  const[open,setOpen]=useState(false);
  const[text,setText]=useState("");
  const[sending,setSending]=useState(false);
  const[history,setHistory]=useState([]);
  async function loadHistory(){
    if(!phone)return;
    const p=phone.replace(/^0/,"972").replace(/[-\s+]/g,"");
    try{
      const snap=await db.collection("messages").doc(p).collection("msgs")
        .orderBy("sent_at","desc").limit(5).get();
      setHistory(snap.docs.map(d=>d.data()));
    }catch(e){console.error("hist err",e)}
  }
  async function send(){
    if(!text.trim()||!phone||sending)return;
    setSending(true);
    const ok=await sendDirectMessage(phone,text);
    if(ok){
      toast("✅ ההודעה נשלחה");
      const newMsg={text,time:nowStr(),sent_at:new Date().toISOString()};
      setHistory(h=>[newMsg,...h]);
      onSent&&onSent(text);
      setText("");
    }
    setSending(false);
  }
  return <div style={{marginTop:8}}>
    <button onClick={()=>{if(!open)loadHistory();setOpen(!open)}}
      style={{background:"rgba(37,211,102,0.07)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:10,
        padding:"7px 14px",color:GR,fontSize:12,fontWeight:700,cursor:"pointer",fontFamily:"inherit",
        display:"inline-flex",alignItems:"center",gap:6}}>
      💬 הודעה ישירה {open?"▲":"▼"}
    </button>
    {open&&<div style={{marginTop:8,background:"rgba(37,211,102,0.04)",borderRadius:14,padding:14,border:"1px solid rgba(37,211,102,0.12)"}}>
      {history.length>0&&<div style={{marginBottom:10}}>
        <div style={{color:"#555",fontSize:11,marginBottom:5,fontWeight:700,textTransform:"uppercase",letterSpacing:.4}}>היסטוריה</div>
        {history.slice(0,5).map((m,i)=><div key={i} style={{fontSize:11,color:"#666",padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,0.04)"}}>
          <span style={{color:"#444"}}>{m.time||new Date(m.sent_at).toLocaleDateString("he-IL")}</span>
          {" — "}{m.text.substring(0,65)}{m.text.length>65?"...":""}
        </div>)}
      </div>}
      <textarea value={text} onChange={e=>setText(e.target.value)}
        onKeyDown={e=>{if(e.key==="Enter"&&e.ctrlKey)send()}}
        placeholder={"כתוב הודעה ל"+name+"... (Ctrl+Enter לשליחה)"} rows={2}
        style={{...S.inp,resize:"none",fontSize:13,lineHeight:1.6,marginBottom:8,
          color:"#c8f0d0",background:"rgba(37,211,102,0.04)",border:"1px solid rgba(37,211,102,0.2)"}}/>
      <Btn sm ch={sending?"שולח...":"📤 שלח"} c={GR} dis={!text.trim()||!phone||sending} onClick={send}/>
    </div>}
  </div>
}

      <div><Lbl t="תאריך"/><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.inp}/></div>

    {distOpen&&<DistributionCenter prop={sel} onClose={()=>setDistOpen(false)} fbGroups={fbGroups} addFbGroup={addFbGroup} delFbGroup={delFbGroup}/>}

  if(mode==="add"){return <div style={{padding:S.pg}} className="fade"><button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button><div style={{...S.card,border:"1px solid "+TE+"44"}}><div style={{fontWeight:800,color:TE,fontSize:18,marginBottom:20}}>🤝 נכס ממתווך</div><Inp label="שם מתווך (פנימי)" val={bagent} set={setBagent} mb={10} icon="🤝"/><Inp label="כתובת *" ph="רחוב 10" val={ba} set={setBa} mb={10}/><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="עיר" val={bc} set={setBc} mb={10}/><Inp label="מחיר" val={bprice} set={setBprice} mb={10}/></div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><Inp label="חדרים" val={br2} set={setBr2} mb={10}/><Inp label="מ״ר" val={bs} set={setBs} mb={10}/><Inp label="קומה" val={bf} set={setBf} mb={10}/></div><Inp label="טלפון" val={bp} set={setBp} mb={10}/><Inp label="הערות" val={bnotes} set={setBnotes} rows={2} mb={14}/><Inp label="קישור סרטון" ph="https://..." val={bvid} set={setBvid} mb={14} icon="🎬"/><div style={{marginBottom:18}}><Lbl t="תמונות" icon="📷"/><ImgUp images={bimgs} onAdd={img=>setBimgs(p=>[...p,...(Array.isArray(img)?img:[img])])} onRemove={id=>setBimgs(p=>p.filter(i=>i.id!==id))}/></div><div style={{display:"flex",gap:10}}><Btn full ch="שמור" onClick={addProp} dis={!ba&&!bn} c={TE} icon="💾"/><Btn ghost ch="ביטול" onClick={()=>setMode("list")}/></div></div></div>}

// ━━━ WEEKLY REPORT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function WeeklyReport({sellers}){
  const DEF="דיווח שבועי — נכס {כתובת}\nשלום {שם} 😊\n\nחיים בן סימון מרימקס — דיווח שבועי לנכסך:\n\n📊 מצב שיווקי:\n• פורסם ב: פייסבוק, טיקטוק, אינסטגרם, יד2\n• {צפיות} צפיות\n• {מספר} פניות השבוע\n• {מספר} סיורים בוצעו\n\n💰 מחיר: {מחיר}₪\n\n🔑 המלצה:\n{המלצה}\n\nלכל שאלה — זמין עבורך!\nחיים | RE/MAX | באר שבע";
  const[template,setTemplate]=useState(lv("report_tpl",DEF));
  const[sel,setSel]=useState(null);const[preview,setPreview]=useState("");const[loading,setLoading]=useState(false);const[views,setViews]=useState("");const[sending,setSending]=useState(false);
  async function sendDirect(){
    if(!sel||!sel.phone||!preview.trim()||sending)return;
    setSending(true);
    const ok=await sendDirectMessage(sel.phone,preview);
    if(ok)toast("✅ הדיווח נשלח ל"+sel.name);
    setSending(false);
  }
  function genPrev(){if(!sel)return;const s=sel;setPreview(template.replace("{כתובת}",s.address||"").replace("{שם}",s.name||"").replace("{מחיר}",s.price?Number(s.price).toLocaleString():"").replace(/{מספר}/g,Math.floor(Math.random()*5+2)).replace("{צפיות}",views||"0").replace("{המלצה}","להמשיך שיווק אגרסיבי בכל הפלטפורמות"))}
  async function aiGen(){if(!sel)return;setLoading(true);try{const txt=await aiCall("כתוב דיווח שבועי מקצועי וחם של חיים בן סימון מרימקס לבעל נכס "+sel.name+". נכס: "+sel.address+", "+sel.city+", "+(sel.rooms||"?")+" חד, "+sel.price+"₪. פורסם בפייסבוק טיקטוק אינסטגרם ויד2. "+views+" צפיות. כלול מצב שיווקי, פניות, המלצה. ללא תאריך בלעדיות. עד 12 שורות.",500);setPreview(txt)}catch(e){}setLoading(false)}
  return <div style={{padding:S.pg}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📊 דיווח שבועי</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>ערוך תבנית ושלח בלחיצה</div>
    <div style={S.card}>
      <Lbl t="תבנית (עריכה חופשית)" icon="📝"/>
      <textarea value={template} onChange={e=>{setTemplate(e.target.value);sv("report_tpl",e.target.value)}} rows={14} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.7,marginBottom:12}}/>
      <div style={{color:"#666",fontSize:12,marginBottom:14}}>משתנים: {"{שם} {כתובת} {מחיר} {צפיות}"}</div>
      <Sel label="בחר מוכר" val={sel?String(sel.id):""} set={v=>{setSel(sellers.find(s=>s.id===parseInt(v))||null);setPreview("")}} opts={[{v:"",l:"— בחר מוכר —"},...sellers.map(s=>({v:String(s.id),l:s.name+" — "+(s.address||"")}))]}/>
      {sel&&<div style={{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:14,marginBottom:14}}>
        <div style={{color:"#ede8f5",fontWeight:700}}>{sel.name}</div>
        <div style={{color:"#777",fontSize:13}}>{sel.address} · {sel.city}</div>
      </div>}
      <Inp label="כמות צפיות" ph="1200" val={views} set={setViews} mb={14} icon="👁"/>
      {sel&&<div style={{display:"flex",gap:10,flexWrap:"wrap"}}><Btn sm ch="תצוגה מקדימה" onClick={genPrev} c={BL} icon="👁"/><Btn sm ch={loading?"...":"AI דיווח"} onClick={aiGen} dis={loading} c={PU} icon="🤖"/></div>}
    </div>
    {preview&&<div style={{...S.cg,border:"1px solid rgba(37,211,102,0.25)"}}><Lbl t="ערוך לפני שליחה" icon="✏️"/><textarea value={preview} onChange={e=>setPreview(e.target.value)} rows={14} style={{...S.inp,resize:"none",color:"#c8f0d0",background:"rgba(37,211,102,0.04)",border:"1px solid rgba(37,211,102,0.15)",fontSize:14,lineHeight:1.7,marginBottom:14}}/>{sel&&sel.phone&&<div style={{display:"flex",gap:10,flexWrap:"wrap"}}><Btn full ch={sending?"שולח...":"📤 שלח ישירות"} c={GR} dis={sending||!preview.trim()} onClick={sendDirect}/><Btn sm ghost ch="פתח בווטסאפ" c={GR} onClick={()=>openWA(sel.phone,preview)} icon="📱"/></div>}</div>}
  </div>
}

function Archive({sellers,setSellers,buyers,setBuyers}){
  const[tab,setTab]=useState("sellers");
  const aS=sellers.filter(s=>s.archived);
  const aB=buyers.filter(b=>b.archived);
  function restoreS(id){const ns=sellers.map(s=>s.id===id?{...s,archived:false}:s);setSellers(ns);sv("sellers",ns);toast("↩️ הוחזר")}
  function restoreB(id){const nb=buyers.map(b=>b.id===id?{...b,archived:false}:b);setBuyers(nb);sv("buyers",nb);toast("↩️ הוחזר")}
  return <div style={{padding:S.pg}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:18}}>📦 ארכיון</div>
    <div style={{display:"flex",gap:10,marginBottom:16}}><Pill ch="🏡 מוכרים" count={aS.length} active={tab==="sellers"} onClick={()=>setTab("sellers")} c={OR}/><Pill ch="👥 קונים" count={aB.length} active={tab==="buyers"} onClick={()=>setTab("buyers")} c={BL}/></div>
    {tab==="sellers"&&<div>{aS.length===0&&<Empty icon="📦" text="אין מוכרים בארכיון"/>}{aS.map(s=><div key={s.id} style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div><div style={{fontWeight:700,color:"#ede8f5",fontSize:16}}>{s.name}</div><div style={{color:"#777",fontSize:14}}>{s.phone}</div><div style={{color:"#666",fontSize:14}}>{s.address}{s.rooms?" · "+s.rooms+" חד":""}</div></div><Tag c={OR} ch={fmtP(s.price)}/></div>
      <Btn sm ch="↩️ החזר" c={PU} onClick={()=>restoreS(s.id)}/>
    </div>)}</div>}
    {tab==="buyers"&&<div>{aB.length===0&&<Empty icon="📦" text="אין קונים בארכיון"/>}{aB.map(b=><div key={b.id} style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}><div><div style={{fontWeight:700,color:"#ede8f5",fontSize:16}}>{b.name}</div><div style={{color:"#777",fontSize:14}}>{b.phone} · {b.budget?fmtP(b.budget):""}</div></div><GradeBadge grade={b.grade} onChange={()=>{}}/></div>
      {b.notes&&<div style={{color:"#666",fontSize:13,marginBottom:10}}>{b.notes.substring(0,100)}</div>}
      <Btn sm ch="↩️ החזר" c={PU} onClick={()=>restoreB(b.id)}/>
    </div>)}</div>}
  </div>
}

function DistributionCenter({prop,onClose,fbGroups,addFbGroup,delFbGroup}){
  const today=new Date().toISOString().slice(0,10);
  const propIdStr=String(prop.id);
  const storageKey="fb_posted_"+propIdStr+"_"+today;
  const[posted,setPosted]=useState(()=>lv(storageKey,[]));
  const[adding,setAdding]=useState(false);
  const[gName,setGName]=useState("");const[gUrl,setGUrl]=useState("");const[gCat,setGCat]=useState("investor");

  const customGroups=(fbGroups||[]).map(g=>({...g,id:g._docId||("custom_"+(g._docId||"")),custom:true}));
  const allInvestor=[...FB_GROUPS_BUILTIN.filter(g=>g.category==="investor"),...customGroups.filter(g=>g.category==="investor")];
  const allLocal=[...FB_GROUPS_BUILTIN.filter(g=>g.category==="local"),...customGroups.filter(g=>g.category==="local")];
  const allPending=FB_GROUPS_BUILTIN.filter(g=>g.pending);
  const allGroups=[...allInvestor,...allLocal];

  function sourceText(){
    const saved=prop.savedAds&&prop.savedAds.facebook&&prop.savedAds.facebook.text;
    return ensureFbSignature(saved||buildFacebookCaption(prop));
  }
  const[shareText,setShareText]=useState(sourceText);
  const[wizard,setWizard]=useState(null); // null or {orderedGroups, idx}
  const[members,setMembers]=useState(()=>{
    const stored=lv("fb_member_groups_v2",null);
    if(stored===null){
      const defaults=FB_GROUPS_BUILTIN.filter(g=>!g.pending).map(g=>g.id);
      sv("fb_member_groups_v2",defaults);
      return defaults;
    }
    return stored;
  });
  const[joinPending,setJoinPending]=useState([]);
  const[joinWizard,setJoinWizard]=useState(null); // null or {ordered, idx}
  const[customUrls,setCustomUrls]=useState(()=>lv("fb_group_urls",{}));
  const[linkModal,setLinkModal]=useState(null); // null or {group, value}
  const[urlWizard,setUrlWizard]=useState(null); // null or {groups, total, idx}
  const images=(prop.images||[]).filter(i=>i.type!=="video");

  function isMember(g){return members.includes(g.id)}
  function isPending(g){return joinPending.includes(g.id)}
  function urlOf(g){return (customUrls&&customUrls[g.id])||g.url}
  function hasDirectUrl(g){return !!(customUrls&&customUrls[g.id])}

  function saveGroupUrl(g,raw,silent){
    const trimmed=(raw||"").trim();
    const next={...customUrls};
    if(trimmed===""){
      if(g.id in next){delete next[g.id];if(!silent)toast("🔄 הקישור אופס לחיפוש")}
      else if(!silent){toast("אין קישור לאפס");return false}
    }else if(!/^https?:\/\//i.test(trimmed)){
      toast("⚠️ הקישור חייב להתחיל ב-https://");
      return false;
    }else{
      next[g.id]=trimmed;
      if(!silent)toast("✅ קישור ישיר נשמר ל-"+g.name);
    }
    setCustomUrls(next);sv("fb_group_urls",next);
    return true;
  }

  async function readClipboard(){
    if(!navigator.clipboard||!navigator.clipboard.readText){
      toast("⚠️ הדפדפן לא תומך בקריאה אוטומטית — הדבק ידנית");
      return null;
    }
    try{
      const v=await navigator.clipboard.readText();
      return (v||"").trim();
    }catch(e){
      toast("⚠️ אין הרשאה לקרוא מה-clipboard — הדבק ידנית");
      return null;
    }
  }

  function updateGroupUrl(g){setLinkModal({group:g,value:customUrls[g.id]||""})}

  async function pasteIntoLinkModal(){
    const v=await readClipboard();
    if(v===null)return;
    if(!v){toast("⚠️ ה-clipboard ריק");return}
    setLinkModal(m=>m?{...m,value:v}:m);
  }

  function startUrlWizard(){
    const all=[...allInvestor,...allLocal,...allPending];
    const todo=all.filter(g=>!hasDirectUrl(g));
    if(todo.length===0){toast("✅ כל הקבוצות כבר עם קישור ישיר!");return}
    setUrlWizard({groups:todo,total:all.length,idx:0});
    window.open(urlOf(todo[0]),"_blank");
    toast("🌐 הקבוצה נפתחה — העתק את הכתובת מהדפדפן ולחץ הדבק",4000);
  }

  function urlWizardAdvance(savedNow){
    if(!urlWizard)return;
    const next=urlWizard.idx+1;
    if(next>=urlWizard.groups.length){
      setUrlWizard(null);
      toast("✅ סבב עדכון הקישורים הסתיים");
      return;
    }
    const ng=urlWizard.groups[next];
    window.open(urlOf(ng),"_blank");
    setUrlWizard({...urlWizard,idx:next});
  }

  async function urlWizardPaste(){
    if(!urlWizard)return;
    const cur=urlWizard.groups[urlWizard.idx];
    const v=await readClipboard();
    if(v===null||!v){toast("⚠️ ה-clipboard ריק");return}
    if(!saveGroupUrl(cur,v))return;
    urlWizardAdvance(true);
  }

  function joinGroup(g){
    window.open(urlOf(g),"_blank");
    if(!joinPending.includes(g.id))setJoinPending([...joinPending,g.id]);
    toast("📂 הקבוצה נפתחה — שלח בקשת הצטרפות");
  }

  function confirmMember(g){
    if(members.includes(g.id))return;
    const nm=[...members,g.id];
    setMembers(nm);sv("fb_member_groups_v2",nm);
    setJoinPending(joinPending.filter(id=>id!==g.id));
    toast("✅ סומנת כחבר ב-"+g.name);
  }

  function startJoinWizard(){
    const notMembers=allGroups.filter(g=>!members.includes(g.id));
    if(notMembers.length===0){toast("✅ אתה כבר חבר בכל הקבוצות!");return}
    setJoinWizard({ordered:notMembers,idx:0});
    window.open(urlOf(notMembers[0]),"_blank");
    if(!joinPending.includes(notMembers[0].id))setJoinPending([...joinPending,notMembers[0].id]);
  }

  function joinWizardAnswer(approved){
    if(!joinWizard)return;
    const cur=joinWizard.ordered[joinWizard.idx];
    let nm=members;
    if(approved&&!members.includes(cur.id)){
      nm=[...members,cur.id];
      setMembers(nm);sv("fb_member_groups_v2",nm);
      setJoinPending(joinPending.filter(id=>id!==cur.id));
    }
    const next=joinWizard.idx+1;
    if(next>=joinWizard.ordered.length){
      setJoinWizard(null);
      toast("✅ סבב הצטרפות הסתיים");
      return;
    }
    const ng=joinWizard.ordered[next];
    window.open(urlOf(ng),"_blank");
    if(!joinPending.includes(ng.id)&&!nm.includes(ng.id))setJoinPending(p=>p.includes(ng.id)?p:[...p,ng.id]);
    setJoinWizard({...joinWizard,idx:next});
  }

  function markPosted(ids){
    const set=new Set([...posted,...ids]);
    const arr=Array.from(set);
    setPosted(arr);sv(storageKey,arr);
  }

  function copyToClipboard(text){
    console.log("[copyToClipboard] called. type=",typeof text,"len=",(text||"").length,"preview=",JSON.stringify((text||"").slice(0,80)));
    if(typeof text!=="string"||text.length===0){
      console.warn("[copyToClipboard] text is empty/invalid — nothing to copy");
      return false;
    }
    // Synchronous execCommand FIRST — finishes before window.open can steal focus.
    // navigator.clipboard.writeText is async and can lose the race even with await.
    let execOk=false;
    try{
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.style.position="fixed";ta.style.left="-9999px";ta.style.top="0";
      ta.setAttribute("readonly","");
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0,text.length);
      execOk=document.execCommand("copy");
      document.body.removeChild(ta);
      console.log("[copyToClipboard] execCommand result=",execOk);
    }catch(e){
      console.warn("[copyToClipboard] execCommand threw:",e);
    }
    // Fire-and-forget the async API as redundancy. Don't await — we already returned.
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(
        ()=>console.log("[copyToClipboard] (async) clipboard.writeText also succeeded"),
        e=>console.warn("[copyToClipboard] (async) clipboard.writeText failed:",e)
      );
    }
    return execOk;
  }

  async function copyAndOpen(group){
    if(!isMember(group)){toast("⚠️ הצטרף לקבוצה לפני שליחה");return}
    const isAlready=posted.includes(group.id);
    if(isAlready&&!confirm("כבר פורסם היום בקבוצה זו. לפרסם שוב?"))return;
    console.log("[copyAndOpen] group=",group.name,"shareText.length=",(shareText||"").length);
    const copied=await copyToClipboard(shareText);
    console.log("[copyAndOpen] copied=",copied,"opening URL:",urlOf(group));
    window.open(urlOf(group),"_blank");
    if(!isAlready)markPosted([group.id]);
    if(!copied){
      toast("⚠️ ההעתקה נכשלה — העתק ידנית מהטקסט למעלה",4000);
      return;
    }
    if(hasDirectUrl(group)){
      toast("📋 הטקסט הועתק! הדביקו בקבוצה");
    }else{
      toast("📋 הטקסט הועתק! אחרי שתיכנס לקבוצה — העתק את הכתובת מהדפדפן ולחץ 🔗 כדי לשמור קישור ישיר",6000);
    }
  }

  async function broadcastCategory(category){
    const all=category==="investor"?allInvestor:allLocal;
    const groups=all.filter(g=>isMember(g));
    if(groups.length===0){toast("⚠️ אינך חבר באף קבוצה — הצטרף קודם");return}
    if(groups.length<all.length&&!confirm("חבר רק ב-"+groups.length+" מתוך "+all.length+" קבוצות. להמשיך?"))return;
    if(!confirm("לפתוח "+groups.length+" קבוצות בטאבים חדשים?"))return;
    const copied=await copyToClipboard(shareText);
    groups.forEach((g,i)=>setTimeout(()=>{try{window.open(urlOf(g),"_blank")}catch(e){}},i*400));
    markPosted(groups.map(g=>g.id));
    toast(copied?"📋 הטקסט הועתק! הקבוצות נפתחות...":"⚠️ ההעתקה נכשלה — העתק ידנית");
  }

  async function startQuickDistribution(){
    const memberGroups=allGroups.filter(g=>isMember(g));
    if(memberGroups.length===0){toast("⚠️ אינך חבר באף קבוצה — הצטרף קודם");return}
    const notPosted=memberGroups.filter(g=>!posted.includes(g.id));
    const alreadyPosted=memberGroups.filter(g=>posted.includes(g.id));
    const ordered=[...notPosted,...alreadyPosted];
    setWizard({orderedGroups:ordered,idx:0});
    const copied=await copyToClipboard(shareText);
    if(ordered[0]){window.open(urlOf(ordered[0]),"_blank")}
    if(!posted.includes(ordered[0].id))markPosted([ordered[0].id]);
    toast(copied?"📋 הטקסט הועתק! הדביקו בקבוצה":"⚠️ ההעתקה נכשלה — העתק ידנית מהטקסט למעלה",copied?2500:4000);
  }

  async function nextGroup(){
    if(!wizard)return;
    const next=wizard.idx+1;
    if(next>=wizard.orderedGroups.length){toast("✅ הושלם — אין עוד קבוצות");setWizard(null);return}
    const g=wizard.orderedGroups[next];
    const copied=await copyToClipboard(shareText);
    window.open(urlOf(g),"_blank");
    if(!posted.includes(g.id))markPosted([g.id]);
    setWizard({...wizard,idx:next});
    toast(copied?"📋 הטקסט הועתק! הדביקו בקבוצה":"⚠️ ההעתקה נכשלה — העתק ידנית",copied?2500:4000);
  }

  async function downloadZip(){
    if(images.length===0){toast("אין תמונות");return}
    if(!window.JSZip){toast("⚠️ JSZip עוד לא נטען");return}
    toast("⏳ מכין ZIP מ-"+images.length+" תמונות...");
    try{
      const zip=new window.JSZip();
      for(let i=0;i<images.length;i++){
        try{
          const r=await fetch(images[i].url);
          const blob=await r.blob();
          const ext=(blob.type.split("/")[1]||"jpg").split(";")[0];
          zip.file("image_"+(i+1)+"."+ext,blob);
        }catch(e){console.error(e)}
      }
      const blob=await zip.generateAsync({type:"blob"});
      const url=URL.createObjectURL(blob);
      const a=document.createElement("a");
      a.href=url;a.download=((prop.address||prop.name||"property").replace(/[^\w\u0590-\u05FF]+/g,"_"))+"_images.zip";
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
      toast("✅ ה-ZIP הורד");
    }catch(e){console.error(e);toast("❌ "+e.message)}
  }

  async function shareTextOnly(){
    if(!navigator.share){toast("⚠️ Web Share לא נתמך בדפדפן זה");return}
    try{
      await navigator.share({title:prop.address||"נכס",text:shareText});
    }catch(e){
      if(e.name!=="AbortError"){console.error(e);toast("❌ "+e.message)}
    }
  }

  async function shareImages(){
    if(images.length===0){toast("אין תמונות");return}
    if(!navigator.share){toast("⚠️ Web Share לא נתמך בדפדפן זה");return}
    try{
      toast("⏳ מכין תמונות...");
      const files=[];
      for(let i=0;i<images.length;i++){
        const r=await fetch(images[i].url);
        const blob=await r.blob();
        const ext=(blob.type.split("/")[1]||"jpg").split(";")[0];
        files.push(new File([blob],"image_"+(i+1)+"."+ext,{type:blob.type||"image/jpeg"}));
      }
      const shareData={files,title:prop.address||"נכס",text:shareText};
      if(navigator.canShare&&!navigator.canShare(shareData)){toast("⚠️ הדפדפן לא תומך בשיתוף קבצים — נסה הורד");return}
      await navigator.share(shareData);
    }catch(e){
      if(e.name!=="AbortError"){console.error(e);toast("❌ "+e.message)}
    }
  }

  async function copyImageLinks(){
    if(images.length===0){toast("אין תמונות");return}
    const links=images.map(i=>i.url).join("\n");
    try{await navigator.clipboard.writeText(links);toast("📋 "+images.length+" קישורים הועתקו")}
    catch(e){toast("❌ "+e.message)}
  }

  function saveCustomGroup(){
    if(!gName.trim()||!gUrl.trim()){toast("⚠️ שם ו-URL נדרשים");return}
    addFbGroup({name:gName.trim(),url:gUrl.trim(),category:gCat,fbGroupId:""});
    setGName("");setGUrl("");setGCat("investor");setAdding(false);
    toast("✅ קבוצה נוספה");
  }

  function deleteCustomGroup(g){
    if(!confirm("למחוק את הקבוצה?"))return;
    if(g._docId)delFbGroup(g._docId);
  }

  const investorPosted=allInvestor.filter(g=>posted.includes(g.id)).length;
  const localPosted=allLocal.filter(g=>posted.includes(g.id)).length;

  function GroupBtn({g}){
    const isPosted=posted.includes(g.id);
    const member=isMember(g);
    const pending=isPending(g);
    const direct=hasDirectUrl(g);
    return <div style={{display:"flex",gap:6,alignItems:"stretch",marginBottom:8}}>
      {member?
        <div title="חבר בקבוצה" style={{display:"flex",alignItems:"center",justifyContent:"center",width:42,background:"rgba(126,201,126,0.14)",border:"1px solid rgba(126,201,126,0.45)",borderRadius:12,color:"#7ec97e",fontSize:18,fontWeight:900}}>✓</div>
      :pending?
        <button onClick={()=>confirmMember(g)} title="סמן כחבר" style={{background:"linear-gradient(135deg,"+GR+","+GR+"bb)",border:"none",borderRadius:12,padding:"0 12px",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>אושרתי ✓</button>
      :
        <button onClick={()=>joinGroup(g)} title="הצטרף לקבוצה" style={{background:"linear-gradient(135deg,"+OR+","+OR+"bb)",border:"none",borderRadius:12,padding:"0 12px",color:"#1a1208",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ הצטרף</button>
      }
      <button onClick={member?()=>copyAndOpen(g):undefined} disabled={!member} style={{flex:1,background:isPosted?"rgba(126,201,126,0.12)":(member?"rgba(255,255,255,0.04)":"rgba(255,255,255,0.02)"),border:"1px solid "+(isPosted?"rgba(126,201,126,0.45)":(member?"rgba(255,255,255,0.1)":"rgba(255,255,255,0.05)")),borderRadius:12,padding:"12px 14px",color:isPosted?"#7ec97e":(member?"#ede8f5":"#555"),fontSize:14,fontWeight:700,cursor:member?"pointer":"not-allowed",opacity:member?1:0.55,fontFamily:"inherit",display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,textAlign:"right"}}>
        <span style={{display:"flex",alignItems:"center",gap:6}}>{direct&&<span title="קישור ישיר נשמר" style={{color:GR,fontSize:13}}>🎯</span>}{g.name}</span>
        <span style={{fontSize:16}}>{isPosted?"✓":(member?"📋":"🔒")}</span>
      </button>
      <button onClick={async()=>{const v=await readClipboard();if(v===null)return;if(!v){toast("⚠️ ה-clipboard ריק");return}saveGroupUrl(g,v)}} title="הדבק קישור מה-clipboard ושמור" style={{background:"rgba(126,201,126,0.10)",border:"1px solid rgba(126,201,126,0.35)",borderRadius:12,padding:"0 10px",color:GR,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>📥</button>
      <button onClick={()=>updateGroupUrl(g)} title={direct?"עדכן/אפס קישור ישיר":"שמור קישור ישיר"} style={{background:direct?"rgba(126,201,126,0.10)":"rgba(155,142,196,0.08)",border:"1px solid "+(direct?"rgba(126,201,126,0.35)":"rgba(155,142,196,0.25)"),borderRadius:12,padding:"0 10px",color:direct?GR:PU,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>🔗</button>
      {g.custom&&<button onClick={()=>deleteCustomGroup(g)} title="מחק" style={{background:"rgba(201,126,126,0.12)",border:"1px solid rgba(201,126,126,0.3)",borderRadius:12,padding:"0 12px",color:RE,cursor:"pointer",fontSize:16}}>🗑</button>}
    </div>;
  }

  // Link modal (per-group URL editor)
  if(linkModal){
    const g=linkModal.group;
    const direct=hasDirectUrl(g);
    return <Modal title={"🔗 קישור ישיר — "+g.name} color={GR} onClose={()=>setLinkModal(null)}>
      <div style={{...S.cg,marginBottom:14}}>
        <Lbl t="קישור נוכחי" icon="🌐"/>
        <div style={{color:direct?"#7ec97e":"#777",fontSize:12,wordBreak:"break-all",lineHeight:1.5}}>{direct?customUrls[g.id]:"(אין — נפתח חיפוש ברירת מחדל)"}</div>
      </div>
      <div style={{background:"rgba(155,142,196,0.06)",border:"1px solid rgba(155,142,196,0.25)",borderRadius:14,padding:14,marginBottom:14}}>
        <div style={{color:"#9b8ec4",fontSize:13,marginBottom:10,lineHeight:1.6}}>📋 העתק את הכתובת מסרגל הדפדפן בקבוצה (לדוגמה <span dir="ltr">facebook.com/groups/123456</span>) ולחץ:</div>
        <Btn full ch="📋 הדבק מהדפדפן" c={GR} onClick={pasteIntoLinkModal} icon="✨"/>
      </div>
      <Lbl t="או הדבק ידנית" icon="✏️"/>
      <textarea value={linkModal.value} onChange={e=>setLinkModal({...linkModal,value:e.target.value})} placeholder="https://www.facebook.com/groups/..." rows={3} style={{...S.inp,resize:"none",fontSize:13,lineHeight:1.6,marginBottom:12,direction:"ltr",textAlign:"left"}}/>

  // Join wizard view

        <div style={{color:"#777",fontSize:12,wordBreak:"break-all"}}>{urlOf(cur)}</div>

      </div>

  // Wizard view
  if(wizard){

      </div>

      <div style={{height:8}}/>
      {allLocal.map(g=><GroupBtn key={g.id} g={g}/>)}
    </div>

    {/* Pending section */}

      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <div style={{color:"#f5b06b",fontSize:14,fontWeight:800}}>⏳ ממתינות לאישור</div>
        <div style={{color:"#777",fontSize:11}}>אין פרסום עד אישור</div>

      {allPending.map(g=>{
        const member=isMember(g);
        const pending=isPending(g);
        const direct=hasDirectUrl(g);
        return <div key={g.id} style={{display:"flex",gap:6,alignItems:"stretch",marginBottom:8}}>
          {member?
            <div title="אושרת" style={{display:"flex",alignItems:"center",justifyContent:"center",width:42,background:"rgba(126,201,126,0.14)",border:"1px solid rgba(126,201,126,0.45)",borderRadius:12,color:"#7ec97e",fontSize:18,fontWeight:900}}>✓</div>
          :pending?
            <button onClick={()=>confirmMember(g)} title="סמן כאושר" style={{background:"linear-gradient(135deg,"+GR+","+GR+"bb)",border:"none",borderRadius:12,padding:"0 12px",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>אושרתי ✓</button>
          :
            <button onClick={()=>joinGroup(g)} title="הצטרף לקבוצה" style={{background:"linear-gradient(135deg,#f5b06b,#f5b06bbb)",border:"none",borderRadius:12,padding:"0 12px",color:"#1a1208",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ הצטרף</button>
          }
          <div style={{flex:1,background:"rgba(245,176,107,0.05)",border:"1px solid rgba(245,176,107,0.2)",borderRadius:12,padding:"12px 14px",color:"#ede8f5",fontSize:14,fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,textAlign:"right"}}>
            <span style={{display:"flex",alignItems:"center",gap:6}}>{direct&&<span title="קישור ישיר נשמר" style={{color:GR,fontSize:13}}>🎯</span>}{g.name}</span>
            <span style={{fontSize:14,color:member?"#7ec97e":"#777"}}>{member?"חבר":(pending?"ממתין":"לא מאושר")}</span>
          </div>
          <button onClick={async()=>{const v=await readClipboard();if(v===null)return;if(!v){toast("⚠️ ה-clipboard ריק");return}saveGroupUrl(g,v)}} title="הדבק קישור מה-clipboard ושמור" style={{background:"rgba(126,201,126,0.10)",border:"1px solid rgba(126,201,126,0.35)",borderRadius:12,padding:"0 10px",color:GR,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>📥</button>
      <button onClick={()=>updateGroupUrl(g)} title={direct?"עדכן/אפס קישור ישיר":"שמור קישור ישיר"} style={{background:direct?"rgba(126,201,126,0.10)":"rgba(155,142,196,0.08)",border:"1px solid "+(direct?"rgba(126,201,126,0.35)":"rgba(155,142,196,0.25)"),borderRadius:12,padding:"0 10px",color:direct?GR:PU,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>🔗</button>
        </div>;

    {/* Add group */}
    {!adding?<Btn sm full ghost ch="➕ הוסף קבוצה" c={G} onClick={()=>setAdding(true)}/>:<div style={{...S.cg}}>
      <Lbl t="קבוצה חדשה" icon="➕"/>
      <Inp label="שם הקבוצה" val={gName} set={setGName} mb={10}/>
      <Inp label="קישור (URL)" val={gUrl} set={setGUrl} ph="https://www.facebook.com/groups/..." mb={10}/>
      <Sel label="קטגוריה" val={gCat} set={setGCat} opts={[{v:"investor",l:"משקיעים"},{v:"local",l:"מקומי"}]} mb={12}/>

        <Btn sm ch="שמור" c={GR} onClick={saveCustomGroup}/>
        <Btn sm ghost ch="ביטול" c={"#888"} onClick={()=>{setAdding(false);setGName("");setGUrl("")}}/>
      </div>
    </div>}
  </Modal>;
}

function AgentsList({agentsContacts,setAgentsContacts,sellers,brokerProps}){
  const[mode,setMode]=useState("list");
  const[search,setSearch]=useState("");
  const[editing,setEditing]=useState(null);
  const[fName,setFName]=useState("");const[fPhone,setFPhone]=useState("");const[fCompany,setFCompany]=useState("");const[fArea,setFArea]=useState("");
  const[sendModal,setSendModal]=useState(null);
  const[sendWithImages,setSendWithImages]=useState(false);
  const[broadcastSel,setBroadcastSel]=useState(null);
  const[importOpen,setImportOpen]=useState(false);
  const[pasteText,setPasteText]=useState("");
  const vcfRef=useRef();
  const pickerAvailable=typeof navigator!=='undefined'&&'contacts' in navigator&&navigator.contacts&&'select' in navigator.contacts;

  function resetForm(){setFName("");setFPhone("");setFCompany("");setFArea("");setEditing(null)}
  function startEdit(a){setEditing(a);setFName(a.name||"");setFPhone(a.phone||"");setFCompany(a.company||"");setFArea(a.area||"");setMode("form")}

  function saveAgent(){
    if(!fName&&!fPhone){toast("⚠️ נדרש שם או טלפון");return}
    const data={name:fName.trim(),phone:fPhone.trim(),company:fCompany.trim(),area:fArea.trim()};
    if(editing){
      const upd=agentsContacts.map(a=>a.id===editing.id?{...a,...data}:a);
      setAgentsContacts(upd);
      toast("✅ עודכן");
    }else{
      const newAgent={id:Date.now()+"_"+Math.random().toString(36).slice(2,8),...data,created:nowStr()};
      const upd=[...agentsContacts,newAgent];
      setAgentsContacts(upd);
      toast("✅ נוסף");
    }
    resetForm();setMode("list");
  }

  function deleteAgent(id){
    if(!confirm("למחוק את המתווך?"))return;
    const upd=agentsContacts.filter(a=>a.id!==id);
    setAgentsContacts(upd);
    toast("🗑 נמחק");
  }

  function addImportedAgents(items){
    const newOnes=[];
    items.forEach(it=>{
      const name=(it.name||"").trim();
      const phone=(it.phone||"").trim();
      if(!name&&!phone)return;
      const exists=agentsContacts.some(a=>a.phone&&phone&&a.phone===phone);
      if(exists)return;
      if(newOnes.some(n=>n.phone&&phone&&n.phone===phone))return;
      newOnes.push({id:Date.now()+"_"+Math.random().toString(36).slice(2,8),name,phone,company:"",area:"",created:nowStr()});
    });
    if(newOnes.length===0){toast("לא נוספו מתווכים חדשים (כפולים?)");return 0}
    const upd=[...agentsContacts,...newOnes];
    setAgentsContacts(upd);
    toast("✅ יובאו "+newOnes.length+" מתווכים");
    return newOnes.length;
  }

  async function importFromContacts(){
    if(!pickerAvailable){
      toast("⚠️ Contact Picker זמין רק ב-Chrome אנדרואיד — נסה vCard או הדבקה");
      return;
    }
    try{
      const contacts=await navigator.contacts.select(['name','tel'],{multiple:true});
      if(!contacts||contacts.length===0){toast("לא נבחרו אנשי קשר");return}
      const items=contacts.map(c=>({name:(c.name&&c.name[0])||"",phone:(c.tel&&c.tel[0])||""}));
      addImportedAgents(items);
      setImportOpen(false);
    }catch(e){
      console.error(e);
      toast("❌ "+e.message);
    }
  }

  function parseVCard(text){
    const items=[];
    const blocks=text.split(/BEGIN:VCARD/i).slice(1);
    blocks.forEach(block=>{
      const body=block.split(/END:VCARD/i)[0]||"";
      const lines=body.split(/\r?\n/);
      let name="",phone="";
      lines.forEach(line=>{
        const l=line.trim();
        if(/^FN[:;]/i.test(l)){name=l.split(":").slice(1).join(":").trim()}
        else if(!name&&/^N[:;]/i.test(l)){const parts=l.split(":").slice(1).join(":").split(";").filter(Boolean);name=(parts[1]||"")+" "+(parts[0]||"");name=name.trim()}
        else if(!phone&&/^TEL/i.test(l)){phone=l.split(":").slice(1).join(":").replace(/[^\d+]/g,"").trim()}
      });
      if(name||phone)items.push({name,phone});
    });
    return items;
  }

  async function importVcfFile(file){
    if(!file)return;
    try{
      const text=await file.text();
      const items=parseVCard(text);
      if(items.length===0){toast("⚠️ לא נמצאו אנשי קשר בקובץ");return}
      const added=addImportedAgents(items);
      if(added>0)setImportOpen(false);
    }catch(e){
      console.error(e);
      toast("❌ שגיאה בקריאת הקובץ");
    }
  }

  function importFromPaste(){
    if(!pasteText.trim()){toast("⚠️ אין טקסט להדביק");return}
    const lines=pasteText.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const items=[];
    lines.forEach(line=>{
      const phoneMatch=line.match(/(\+?\d[\d\-\s]{6,})/);
      const phone=phoneMatch?phoneMatch[1].replace(/[\-\s]/g,""):"";
      let name=phone?line.replace(phoneMatch[1],"").replace(/[,;\t]+/g," ").trim():line;
      name=name.replace(/^[,;\s\-]+|[,;\s\-]+$/g,"");
      items.push({name,phone});
    });
    if(items.length===0){toast("⚠️ לא נמצאו שורות תקינות");return}
    const added=addImportedAgents(items);
    if(added>0){setPasteText("");setImportOpen(false)}
  }

  async function sendPropertyToAgent(agent,prop,withImages){
    const cap=buildAgentCaption(prop);
    const media=(withImages&&prop.images)?prop.images:[];
    if(media.length>0){
      await sendWhatsAppMedia(agent.phone,cap,media);
    }else{
      await sendDirectMessage(agent.phone,cap);
    }
  }

  const allProps=[...(sellers||[]).map(s=>({...s,_src:"seller"})),...(brokerProps||[]).map(p=>({...p,_src:"broker"}))];

  const fA=agentsContacts.filter(a=>!search||((a.name||"")+(a.phone||"")+(a.company||"")+(a.area||"")).toLowerCase().includes(search.toLowerCase()));

  if(mode==="form"){return <div style={{padding:S.pg}} className="fade">
    <button onClick={()=>{resetForm();setMode("list")}} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.cg}}>
      <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:22,color:"#ede8f5",marginBottom:18}}>{editing?"עריכת מתווך":"הוסף מתווך"}</div>
      <Inp label="שם" val={fName} set={setFName} icon="👤"/>
      <Inp label="טלפון" val={fPhone} set={setFPhone} icon="📞" type="tel"/>
      <Inp label="חברה (לא חובה)" val={fCompany} set={setFCompany} icon="🏢"/>
      <Inp label="אזור (לא חובה)" val={fArea} set={setFArea} icon="📍"/>
      <Btn full ch={editing?"💾 שמור שינויים":"➕ הוסף מתווך"} c={GR} onClick={saveAgent}/>
    </div>
  </div>}

  return <div style={{padding:S.pg}} className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div>
        <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:G}}>רשת מתווכים</div>
        <div style={{color:"#777",fontSize:12,marginTop:3}}>{agentsContacts.length} מתווכים ברשת</div>
      </div>
    </div>

    <div style={{display:"flex",gap:10,marginBottom:14,flexWrap:"wrap"}}>
      <Btn sm ch="➕ הוסף ידנית" c={G} onClick={()=>{resetForm();setMode("form")}}/>
      <Btn sm ch="📥 ייבוא אנשי קשר" c={BL} onClick={()=>setImportOpen(true)}/>
    </div>

    {importOpen&&<Modal title="📥 ייבוא מתווכים" color={BL} onClose={()=>setImportOpen(false)}>
      <div style={{display:"flex",flexDirection:"column",gap:14}}>
        <div>
          <Btn full ch={pickerAvailable?"📇 בחר מאנשי קשר (אנדרואיד)":"📇 לא נתמך במכשיר זה"} c={GR} dis={!pickerAvailable} onClick={importFromContacts}/>
          {!pickerAvailable&&<div style={{color:"#777",fontSize:12,marginTop:6,lineHeight:1.5}}>הבחירה הישירה זמינה רק ב-Chrome על אנדרואיד. השתמש בקובץ vCard או בהדבקה למטה.</div>}
        </div>

        <div style={{height:1,background:"rgba(255,255,255,0.06)"}}/>

        <div>
          <Lbl t="קובץ vCard (.vcf)" icon="📂"/>
          <Btn full ch="📂 העלה קובץ אנשי קשר" c={BL} onClick={()=>vcfRef.current&&vcfRef.current.click()}/>
          <input ref={vcfRef} type="file" accept=".vcf,text/vcard,text/x-vcard" style={{display:"none"}} onChange={e=>{const f=e.target.files&&e.target.files[0];if(f)importVcfFile(f);e.target.value=""}}/>
          <div style={{color:"#777",fontSize:12,marginTop:6,lineHeight:1.5}}>באייפון: אנשי קשר → בחר → שתף → vCard. באנדרואיד: אנשי קשר → ייצוא לקובץ .vcf</div>
        </div>

        <div style={{height:1,background:"rgba(255,255,255,0.06)"}}/>

        <div>
          <Lbl t="הדבק רשימה" icon="📋"/>
          <textarea placeholder={"הדבק שורה לכל איש קשר, לדוגמה:\nדני כהן 0501234567\nרונית רימקס, 052-9876543\n0541112222"} value={pasteText} onChange={e=>setPasteText(e.target.value)} rows={6} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.7,marginBottom:10}}/>
          <Btn full ch="➕ הוסף מהרשימה" c={G} onClick={importFromPaste}/>
        </div>
      </div>
    </Modal>}

    <input placeholder="🔍 חיפוש שם / טלפון / חברה / אזור" value={search} onChange={e=>setSearch(e.target.value)} style={{...S.inp,marginBottom:14}}/>

    {fA.length===0?<Empty icon="📒" text={agentsContacts.length===0?"עדיין אין מתווכים — הוסף ידנית או ייבא":"לא נמצאו תוצאות"}/>:fA.map(a=><div key={a.id} style={S.card}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10,marginBottom:10}}>
        <div style={{flex:1,minWidth:0}}>
          <div style={{fontWeight:800,color:"#ede8f5",fontSize:16}}>{a.name||"(ללא שם)"}</div>
          <div style={{color:"#777",fontSize:13,marginTop:3}}>{a.phone||"—"}</div>
          {(a.company||a.area)&&<div style={{color:"#9b8ec4",fontSize:12,marginTop:4}}>{[a.company,a.area].filter(Boolean).join(" · ")}</div>}
        </div>
      </div>
      <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
        <Btn sm ch="📤 שלח דירה" c={GR} onClick={()=>setSendModal(a)}/>
        <Btn sm ch="✏️ ערוך" c={BL} ghost onClick={()=>startEdit(a)}/>
        <Btn sm ch="💬" c={GR} ghost onClick={()=>openWA(a.phone,"")}/>
        <Btn sm ch="🗑" c={RE} ghost onClick={()=>deleteAgent(a.id)}/>
      </div>
    </div>)}

    {sendModal&&<Modal title={"📤 שלח דירה ל-"+(sendModal.name||sendModal.phone)} color={GR} onClose={()=>setSendModal(null)}>
      <label style={{display:"flex",alignItems:"center",gap:10,padding:"12px 14px",background:sendWithImages?"rgba(126,201,126,0.10)":"rgba(255,255,255,0.04)",border:"1px solid "+(sendWithImages?"rgba(126,201,126,0.45)":"rgba(255,255,255,0.1)"),borderRadius:12,cursor:"pointer",marginBottom:14}}>
        <input type="checkbox" checked={sendWithImages} onChange={e=>setSendWithImages(e.target.checked)} style={{width:18,height:18,accentColor:GR,cursor:"pointer"}}/>
        <div style={{flex:1}}>
          <div style={{color:"#ede8f5",fontSize:14,fontWeight:700}}>📷 צרף תמונות</div>
          <div style={{color:"#777",fontSize:11,marginTop:2}}>ברירת מחדל: רק טקסט (מהיר יותר ופחות מטריד למתווכים)</div>
        </div>
      </label>
      <Lbl t="בחר דירה לשליחה"/>
      {allProps.length===0?<div style={{color:"#777",padding:14}}>אין דירות זמינות</div>:allProps.map(p=><div key={p._src+"_"+p.id} onClick={async()=>{const ag=sendModal;const wi=sendWithImages;setSendModal(null);toast("📤 שולח ל-"+(ag.name||ag.phone)+(wi?" (עם תמונות)":"")+"...");await sendPropertyToAgent(ag,p,wi)}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"12px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer"}}>
        <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:14}}>{p.address||p.name||"—"}</div><div style={{color:"#777",fontSize:12}}>{p.rooms?p.rooms+" חד'":""} {p.price?" · "+fmtP(p.price):""} {p._src==="broker"?" · 🤝":""}</div></div>
        <span style={{color:GR,fontSize:18}}>📤</span>
      </div>)}
    </Modal>}
  </div>
}

function App(){
  const[tab,setTab]=useState("home");const[crmInitTab,setCrmInitTab]=useState("sellers");
  const[loaded,setLoaded]=useState(false);
  const[buyers,_setBuyers]=useState([]);
  const[sellers,_setSellers]=useState([]);
  const[tasks,_setTasks]=useState([]);
  const[brokerProps,_setBrokerProps]=useState([]);
  const[hotProps,setHotProps]=useState(()=>lv("hotProps",[]));
  const[prospects,_setProspects]=useState([]);
  const[agentsContacts,_setAgentsContacts]=useState([]);
  const[fbGroups,setFbGroups]=useState([]);

  function addFbGroup(g){
    try{db.collection("fb_groups").add({...g,created:new Date().toISOString()})}
    catch(e){console.error("fb_groups add err",e)}
  }
  function delFbGroup(docId){
    try{db.collection("fb_groups").doc(docId).delete()}
    catch(e){console.error("fb_groups del err",e)}
  }

  function fsWrite(name,items){try{const size=JSON.stringify(items).length;if(size>900000){toast("⚠️ יותר מדי תמונות — מחק כמה");return}db.collection("data").doc(name).set({items})}catch(e){console.error("Firestore write error:",e)}}
  function setBuyers(v){_setBuyers(v);sv("buyers",v);fsWrite("buyers",v)}
  function setSellers(v){_setSellers(v);sv("sellers",v);fsWrite("sellers",v)}
  function setTasks(v){_setTasks(v);sv("tasks",v);fsWrite("tasks",v)}
  function setBrokerProps(v){_setBrokerProps(v);sv("brokerProps",v);fsWrite("brokerProps",v)}
  function setProspects(v){_setProspects(v);sv("prospects",v);fsWrite("prospects",v)}
  function setAgentsContacts(v){_setAgentsContacts(v);sv("agentsContacts",v);fsWrite("agentsContacts",v)}

  useEffect(()=>{
    let unsubs=[];
    (async()=>{
      try{
        const initDoc=await db.collection("data").doc("_init").get();
        if(!initDoc.exists){
          await db.collection("data").doc("sellers").set({items:IS});
          await db.collection("data").doc("buyers").set({items:IB});
          await db.collection("data").doc("tasks").set({items:[]});
          await db.collection("data").doc("brokerProps").set({items:[]});
          await db.collection("data").doc("prospects").set({items:[]});
          await db.collection("data").doc("agentsContacts").set({items:[]});
          await db.collection("data").doc("_init").set({done:true,time:new Date().toISOString()});
        }
      }catch(e){console.error("Firestore init error:",e)}
      const collections=[["buyers",_setBuyers],["sellers",_setSellers],["tasks",_setTasks],["brokerProps",_setBrokerProps],["prospects",_setProspects],["agentsContacts",_setAgentsContacts]];
      collections.forEach(([name,setter])=>{
        const unsub=db.collection("data").doc(name).onSnapshot(doc=>{
          if(doc.exists){const items=doc.data().items||[];setter(items);sv(name,items)}
        },e=>console.error("Firestore sync error:",name,e));
        unsubs.push(unsub);
      });
      const fbUnsub=db.collection("fb_groups").onSnapshot(snap=>{
        const arr=[];snap.forEach(d=>arr.push({_docId:d.id,...d.data()}));setFbGroups(arr);
      },e=>console.error("fb_groups sync err",e));
      unsubs.push(fbUnsub);
      setLoaded(true);
    })();
    return()=>unsubs.forEach(u=>u());
  },[]);

  return <div style={{background:"#07060d",minHeight:"100vh",paddingBottom:92}}>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse 60% 45% at 12% 8%,rgba(100,70,180,0.07) 0%,transparent 55%)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1}}>
      <div style={{background:"rgba(7,6,13,0.96)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(201,168,76,0.1)",padding:"15px 18px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:G}}>NadlanPro</div><div style={{fontSize:11,color:"#444",marginTop:2}}>RE/MAX · חיים בן סימון · באר שבע</div></div>
          <div style={{background:"rgba(37,211,102,0.07)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:22,padding:"5px 14px",fontSize:11,color:GR,fontWeight:700,display:"flex",alignItems:"center",gap:6}}><span style={{width:7,height:7,background:GR,borderRadius:"50%",display:"inline-block",animation:"pdot 2s infinite"}}/>פעיל</div>
        </div>
      </div>

      {tab==="home"&&<Dashboard buyers={buyers} setBuyers={v=>{setBuyers(v);sv("buyers",v)}} sellers={sellers} tasks={tasks} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} brokerProps={brokerProps} setTab={setTab} setCrmInitTab={setCrmInitTab}/>}
      {tab==="recruit"&&<Recruit prospects={prospects} setProspects={setProspects}/>}
      {tab==="daily"&&<DailyPlan tasks={tasks} setTasks={setTasks}/>}
      {tab==="crm"&&<CRM buyers={buyers} setBuyers={setBuyers} sellers={sellers} setSellers={setSellers} brokerProps={brokerProps} initialTab={crmInitTab} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} tasks={tasks} setTasks={setTasks} agentsContacts={agentsContacts} fbGroups={fbGroups} addFbGroup={addFbGroup} delFbGroup={delFbGroup}/>}
      {tab==="broker"&&<BrokerPage brokerProps={brokerProps} setBrokerProps={setBrokerProps} buyers={buyers} hotProps={hotProps} setHotProps={v=>{setHotProps(v);sv("hotProps",v)}} agentsContacts={agentsContacts} fbGroups={fbGroups} addFbGroup={addFbGroup} delFbGroup={delFbGroup}/>}
      {tab==="agents"&&<AgentsList agentsContacts={agentsContacts} setAgentsContacts={setAgentsContacts} sellers={sellers} brokerProps={brokerProps}/>}
      {tab==="report"&&<WeeklyReport sellers={sellers}/>}
      {tab==="tiktok"&&<Tiktok/>}
      {tab==="uni"&&<University/>}
      {tab==="archive"&&<Archive sellers={sellers} setSellers={setSellers} buyers={buyers} setBuyers={setBuyers}/>}
      {tab==="settings"&&<Settings onClose={()=>setTab("home")}/>}

      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(5,4,10,0.98)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(201,168,76,0.1)",display:"flex",zIndex:200,padding:"6px 0 12px",overflowX:"auto"}}>
        {TABS.map(t=>{const active=tab===t.k;return <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:"0 0 auto",minWidth:54,background:"none",border:"none",cursor:"pointer",padding:"6px 6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative"}}>
          {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:3,background:G,borderRadius:3}}/>}
          <span style={{fontSize:22}}>{t.i}</span>
          <span style={{fontSize:9.5,fontWeight:active?800:600,color:active?G:"#2a2a2a",fontFamily:"inherit",whiteSpace:"nowrap"}}>{t.l}</span>
        </button>})}
      </nav>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
