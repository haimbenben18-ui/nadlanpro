/* Animations */
.fade{animation:fadeUp .25s cubic-bezier(.4,0,.2,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:200% center}100%{background-position:-200% center}}
.shimmer{background:linear-gradient(90deg,var(--gold),var(--gold-light),var(--gold));background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;animation:shimmer 3s linear infinite}
@keyframes pulse-dot{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes pulse-ring{0%,100%{box-shadow:0 0 0 0 rgba(201,126,126,.4)}50%{box-shadow:0 0 0 12px rgba(201,126,126,0)}}
.rec-pulse{animation:pulse-ring 1.5s ease infinite}
@keyframes glow{0%,100%{box-shadow:0 0 0 0 rgba(37,211,102,.25)}50%{box-shadow:0 0 20px rgba(37,211,102,.12)}}
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--gold);border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;display:inline-block}

/* Toast */
@keyframes toast-in{from{transform:translateY(100px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes toast-out{from{opacity:1}to{opacity:0;transform:translateY(20px)}}
.toast{position:fixed;bottom:100px;left:50%;transform:translateX(-50%);z-index:9999;background:rgba(30,28,40,0.96);border:1px solid var(--gold);border-radius:14px;padding:12px 24px;color:var(--gold);font-weight:700;font-size:14px;backdrop-filter:blur(20px);animation:toast-in .3s ease,toast-out .3s ease 2s forwards;pointer-events:none;white-space:nowrap}

/* Selection */
::selection{background:rgba(201,168,76,0.3);color:var(--text)}

let toastTimeout;
function showToast(msg){
  const old=document.querySelector('.toast');if(old)old.remove();

  const el=document.createElement('div');el.className='toast';el.textContent=msg;

function Btn({ch,onClick,c,ghost,sm,full,dis,icon,style:extra}){

  const isDark=col===G||col===OR;
  return <button onClick={onClick} disabled={dis} style={{

    ...extra

}

function Pill({ch,active,onClick,c,count}){

// ━━━ HELPERS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openWA(phone,msg){
  const p=(phone||"").replace(/^0/,"972").replace(/[-\s]/g,"");
  if(!p){showToast("⚠️ אין מספר טלפון");return}
  window.open("https://wa.me/"+p+(msg?"?text="+encodeURIComponent(msg):""),"_blank");
}

function addToCalendar(title,date,time){
  const dt=date||(new Date().toISOString().split("T")[0]);
  const t=time||"09:00";
  const start=dt.replace(/-/g,"")+"T"+t.replace(":","")+"00";
  const hr=String(Math.min(23,parseInt(t.split(":")[0])+1)).padStart(2,"0");
  const end=dt.replace(/-/g,"")+"T"+hr+t.split(":")[1]+"00";
  window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(title)+"&dates="+start+"/"+end,"_blank");
}

function fmtPrice(p){return p?Number(p).toLocaleString("he-IL")+"₪":"—"}

function parseDateDMY(str){
  if(!str)return null;
  const p=str.split("/");if(p.length<3)return null;
  const y=p[2].length===2?"20"+p[2]:p[2];
  return new Date(parseInt(y),parseInt(p[1])-1,parseInt(p[0]));
}

function daysUntil(dateStr){
  const d=parseDateDMY(dateStr);
  if(!d)return null;
  return Math.ceil((d-new Date())/86400000);
}

// ━━━ IMAGE UPLOADER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function ImgUp({images=[],onAdd,onRemove}){
  const fr=useRef();const[prev,setPrev]=useState(null);
  function handle(files){Array.from(files).forEach(f=>{const r=new FileReader();r.onload=e=>onAdd({id:Date.now()+Math.random(),url:e.target.result});r.readAsDataURL(f)})}
  return <div>
    {prev&&<div onClick={()=>setPrev(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"zoom-out"}}>
      <img src={prev} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16,boxShadow:"0 20px 60px rgba(0,0,0,.5)"}}/>
    </div>}
    <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
      {images.map(img=><div key={img.id} style={{position:"relative"}}>
        <img src={img.url} onClick={()=>setPrev(img.url)} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)",cursor:"pointer",transition:"transform .15s"}}/>
        {onRemove&&<button onClick={()=>onRemove(img.id)} style={{position:"absolute",top:-8,left:-8,width:24,height:24,borderRadius:"50%",background:RE,border:"2px solid #07060d",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button>}
      </div>)}
      {onAdd&&<button onClick={()=>fr.current.click()} style={{width:92,height:74,borderRadius:12,border:"2px dashed rgba(201,168,76,0.3)",background:"rgba(201,168,76,0.04)",color:G,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,fontSize:12,fontWeight:700,transition:"background .15s"}}>
        <span style={{fontSize:26}}>📷</span>הוסף
      </button>}
    </div>
    {onAdd&&<input ref={fr} type="file" accept="image/*" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>}
  </div>
}

// ━━━ AI CALL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function aiCall(prompt,max=900){
  const key=localStorage.getItem(PREFIX+"apikey")||"";
  if(!key){
    showToast("⚠️ חסר API Key — לחץ ⚙️ הגדרות");
    throw new Error("no key");
  }
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,
      system:"אתה עוזר אישי של חיים בן סימון, מתווך נדל\"ן RE/MAX בבאר שבע עם 13 שנות ניסיון. ענה תמיד בעברית, בקצרה ובמקצועיות.",
      messages:[{role:"user",content:prompt}]})
  });
  const d=await r.json();
  if(d.error)throw new Error(d.error.message);
  return d.content.map(i=>i.text||"").join("").trim();
}

// ━━━ VOICE BUTTON ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function VoiceBtn({onText,size}){
  const[rec,setRec]=useState(false);const[secs,setSecs]=useState(0);
  const mr=useRef();const ti=useRef();const sz=size||54;
  async function start(){
    try{
      const st=await navigator.mediaDevices.getUserMedia({audio:true});
      const m=new MediaRecorder(st);mr.current=m;
      m.onstop=()=>{st.getTracks().forEach(t=>t.stop());onText("__voice__")};
      m.start();setRec(true);setSecs(0);
      ti.current=setInterval(()=>setSecs(x=>x+1),1000);
    }catch(e){showToast("⚠️ אשר גישה למיקרופון")}
  }
  function stop(){clearInterval(ti.current);if(mr.current&&mr.current.state!=="inactive")mr.current.stop();setRec(false)}
  return rec
    ?<button onClick={stop} className="rec-pulse" style={{width:sz,height:sz,borderRadius:"50%",background:"rgba(201,126,126,0.18)",border:"3px solid "+RE,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>

}

  </div>
}

      ti.current=setInterval(()=>setSecs(x=>x+1),1000);
    }catch(e){showToast("⚠️ אשר גישה למיקרופון")}
  }
  function stopRec(){clearInterval(ti.current);if(mr.current&&mr.current.state!=="inactive")mr.current.stop()}

  async function analyze(){
    setAnalyzing(true);
    try{
      const txt=await aiCall("ניתח את הדרישות של הקונה הבא. ענה ב-JSON בלבד ללא markdown:\n{\"name\":\"שם\",\"area\":\"אזור\",\"rooms\":\"חדרים\",\"budget\":\"תקציב\",\"grade\":\"A|B|C\",\"notes\":\"הערות\",\"summary\":\"סיכום\"}\n\nדרישות: "+transcript,300);
      const clean=txt.replace(/```json|```/g,"").trim();
      setResult(JSON.parse(clean));
    }catch(e){setResult({summary:transcript,grade:"B",area:"באר שבע",rooms:"3-4",budget:"600K-1M"})}
    setAnalyzing(false);
  }

  function saveAsBuyer(){
    if(!result)return;
    const b={id:Date.now(),name:result.name||"קונה "+phone,phone:phone||"",budget:result.budget||"600K-1M",rooms:result.rooms||"3-4",area:result.area||"באר שבע",notes:result.notes||result.summary||"",grade:result.grade||"B",status:"חדש",actions:[],created:new Date().toLocaleDateString("he")};
    const nb=[...buyers,b];setBuyers(nb);sv("buyers",nb);
    setPhone("");setTranscript("");setResult(null);setSecs(0);
    showToast("✅ קונה נוסף למאגר!");
  }

  const matchingSellers=useMemo(()=>{
    if(!result||!result.area)return[];
    return sellers.filter(s=>s.city&&(s.city.includes(result.area.split(" ")[0])||result.area.includes(s.city))).slice(0,4);
  },[result,sellers]);

  return <div style={{padding:S.page}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📞 הזנת קונה מהירה</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>קיבלת שיחה? הכנס מספר, הקלט, AI מסווג אוטומטית</div>

    <div style={S.card}>
      <Inp label="מספר טלפון" ph="050-0000000" val={phone} set={setPhone} mb={16} icon="📱"/>
      <Lbl t="הקלט שיחה / פרטים" icon="🎙️"/>
      <div style={{textAlign:"center",padding:"24px 0"}}>
        {!recording&&!analyzing&&<button onClick={startRec} style={{width:84,height:84,borderRadius:"50%",background:"linear-gradient(135deg,"+RE+",#e8a0a0)",border:"none",cursor:"pointer",fontSize:34,boxShadow:"0 8px 30px "+RE+"44",display:"flex",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>🎙️</button>}
        {recording&&<button onClick={stopRec} className="rec-pulse" style={{width:84,height:84,borderRadius:"50%",background:"rgba(201,126,126,0.18)",border:"3px solid "+RE,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",margin:"0 auto 12px"}}>
          <span style={{fontSize:30}}>⏹</span><span style={{fontSize:13,color:RE,fontWeight:700}}>{secs}ש׳</span>
        </button>}
        {analyzing&&<div style={{padding:24}}><div className="spinner" style={{margin:"0 auto 12px"}}/><div style={{color:G,fontWeight:700,fontSize:15}}>מנתח...</div></div>}
        {!recording&&!analyzing&&<div style={{color:"#555",fontSize:13}}>לחץ להקלטה</div>}
        {recording&&<div style={{color:RE,fontWeight:700,fontSize:15}}>מקליט... לחץ לעצור</div>}
      </div>

      <Lbl t="תאר מה הקונה רצה" icon="📝"/>
      <textarea placeholder="לדוגמה: מחפש 3 חד בשכונה ד, תקציב עד 750K, צריך חניה..." value={transcript} onChange={e=>setTranscript(e.target.value)} rows={3} style={{...S.inp,resize:"none",marginBottom:14}}/>
      {transcript&&!result&&<Btn full ch="נתח וסווג" onClick={analyze} dis={analyzing} icon="🤖"/>}
    </div>

    {result&&<div style={{...S.cardGold,border:"1px solid rgba(37,211,102,0.25)"}} className="fade">
      <div style={{fontWeight:800,color:GR,fontSize:17,marginBottom:16}}>✅ ניתוח הקונה</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:16}}>
        {[{l:"אזור",v:result.area,i:"📍"},{l:"חדרים",v:result.rooms,i:"🚪"},{l:"תקציב",v:result.budget,i:"💰"},{l:"דירוג",v:result.grade,i:"⭐"}].map(x=><div key={x.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:14}}>
          <div style={{color:"#555",fontSize:11,marginBottom:4}}>{x.i} {x.l}</div>
          <div style={{color:"#ede8f5",fontWeight:700,fontSize:16}}>{x.v||"—"}</div>
        </div>)}
      </div>
      {result.summary&&<div style={{background:"rgba(0,0,0,0.2)",borderRadius:12,padding:14,marginBottom:16,color:"#aaa",fontSize:14,lineHeight:1.65}}>{result.summary}</div>}

      {matchingSellers.length>0&&<div style={{marginBottom:16}}>
        <Lbl t="דירות מתאימות" icon="🏠"/>
        {matchingSellers.map(s=><div key={s.id} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 0",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
          <div><div style={{fontWeight:600,color:"#ede8f5",fontSize:14}}>{s.address}</div><div style={{color:"#777",fontSize:13}}>{s.rooms}חד · {fmtPrice(s.price)}</div></div>
          {phone&&<Btn sm ch="💬" c={GR} onClick={()=>openWA(phone,"שלום! חיים בן סימון מרימקס.\n\nיש לי נכס שחשבתי עליך:\n🏠 "+s.address+"\n"+(s.rooms||"")+" חדרים | "+(s.size||"")+"מ | קומה "+(s.floor||"")+"\n💰 "+fmtPrice(s.price)+"\n\nאשלח פרטים? 📸")}/>}
        </div>)}
      </div>}
      {matchingSellers.length===0&&<div style={{color:"#444",fontSize:14,marginBottom:16}}>אין נכסים מתאימים באזור זה כרגע</div>}
      <Btn full ch="שמור כקונה במאגר" onClick={saveAsBuyer} c={G} icon="💾"/>
    </div>}
  </div>
}

// ━━━ CRM ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function CRM({buyers,setBuyers,sellers,setSellers}){
  const[tab,setTab]=useState("sellers");const[mode,setMode]=useState("list");
  const[sel,setSel]=useState(null);const[search,setSearch]=useState("");
  const[recruitSeller,setRecruitSeller]=useState(null);const[sendToBuyer,setSendToBuyer]=useState(null);
  // seller form
  const[sn,setSn]=useState("");const[sp,setSp]=useState("");const[sa,setSa]=useState("");
  const[sc,setSc]=useState("באר שבע");const[sr,setSr]=useState("");const[ss,setSs]=useState("");
  const[sf,setSf]=useState("");const[sprice,setSprice]=useState("");const[sred,setSred]=useState("");
  const[ses,setSes]=useState("");const[see,setSee]=useState("");const[snotes,setSnotes]=useState("");const[simgs,setSimgs]=useState([]);
  // buyer form
  const[bn,setBn]=useState("");const[bp,setBp]=useState("");const[bb,setBb]=useState("600K-1M");
  const[br,setBr]=useState("3-4");const[ba,setBa]=useState("באר שבע");const[bday,setBday]=useState("");const[bnotes,setBnotes]=useState("");

  function addSeller(){if(!sn||!sp)return;const s={id:Date.now(),name:sn,phone:sp,address:sa,city:sc,rooms:sr,size:ss,floor:sf,price:sprice,reducedPrice:sred,exclusiveStart:ses,exclusiveEnd:see,notes:snotes,images:simgs,actions:[],created:new Date().toLocaleDateString("he")};const ns=[...sellers,s];setSellers(ns);sv("sellers",ns);setSn("");setSp("");setSa("");setSc("באר שבע");setSr("");setSs("");setSf("");setSprice("");setSred("");setSes("");setSee("");setSnotes("");setSimgs([]);setMode("list");showToast("✅ מוכר נוסף")}
  function addBuyer(){if(!bn||!bp)return;const b={id:Date.now(),name:bn,phone:bp,budget:bb,rooms:br,area:ba,birthday:bday,notes:bnotes,grade:"B",status:"חדש",actions:[],created:new Date().toLocaleDateString("he")};const nb=[...buyers,b];setBuyers(nb);sv("buyers",nb);setBn("");setBp("");setBa("באר שבע");setBday("");setBnotes("");setMode("list");showToast("✅ קונה נוסף")}
  function delS(id){if(!confirm("למחוק מוכר?"))return;const ns=sellers.filter(s=>s.id!==id);setSellers(ns);sv("sellers",ns);setSel(null);setMode("list");showToast("🗑 מוכר נמחק")}
  function delB(id){if(!confirm("למחוק קונה?"))return;const nb=buyers.filter(b=>b.id!==id);setBuyers(nb);sv("buyers",nb);setSel(null);setMode("list");showToast("🗑 קונה נמחק")}
  function addImg(id,img){const ns=sellers.map(s=>s.id===id?{...s,images:[...(s.images||[]),img]}:s);setSellers(ns);sv("sellers",ns);if(sel&&sel.id===id)setSel(ns.find(s=>s.id===id))}
  function remImg(id,iid){const ns=sellers.map(s=>s.id===id?{...s,images:(s.images||[]).filter(i=>i.id!==iid)}:s);setSellers(ns);sv("sellers",ns);if(sel&&sel.id===id)setSel(ns.find(s=>s.id===id))}
  function updF(id,f,v){const ns=sellers.map(s=>s.id===id?{...s,[f]:v}:s);setSellers(ns);sv("sellers",ns);if(sel&&sel.id===id)setSel(ns.find(s=>s.id===id))}
  function updBuyer(id,f,v){const nb=buyers.map(b=>b.id===id?{...b,[f]:v}:b);setBuyers(nb);sv("buyers",nb);if(sel&&sel.id===id)setSel(nb.find(b=>b.id===id))}
  function toggleAct(type,id,action){
    if(type==="s"){const ns=sellers.map(s=>{if(s.id!==id)return s;const a=s.actions.includes(action)?s.actions.filter(x=>x!==action):[...s.actions,action];return{...s,actions:a}});setSellers(ns);sv("sellers",ns);if(sel&&sel.id===id)setSel(ns.find(s=>s.id===id))}
    else{const nb=buyers.map(b=>{if(b.id!==id)return b;const a=b.actions.includes(action)?b.actions.filter(x=>x!==action):[...b.actions,action];return{...b,actions:a}});setBuyers(nb);sv("buyers",nb);if(sel&&sel.id===id)setSel(nb.find(b=>b.id===id))}
  }
  const sActs=["שיחה ראשונית","פגישה בנכס","הסכם שיווק","צולמו תמונות","פורסם","הצעה התקבלה","עסקה נסגרה"];
  const bActs=["שיחה ראשונית","נשלחו פרטים","נשלחו תמונות","סיור בוצע","הצעת מחיר","עסקה נסגרה"];
  const fS=sellers.filter(s=>!search||(s.name+s.address+s.phone).toLowerCase().includes(search.toLowerCase()));
  const fB=buyers.filter(b=>!search||(b.name+b.area+b.phone).toLowerCase().includes(search.toLowerCase()));

  // VIEW
  if(mode==="view"&&sel){const isS=tab==="sellers";return <div style={{padding:S.page}} className="fade">
    {recruitSeller&&<RecruitModal seller={recruitSeller} onClose={()=>setRecruitSeller(null)}/>}
    {sendToBuyer&&<SendPropertyModal buyer={sendToBuyer} sellers={sellers} onClose={()=>setSendToBuyer(null)}/>}
    <button onClick={()=>{setSel(null);setMode("list")}} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור לרשימה</button>
    <div style={{...S.card,border:"1px solid "+(isS?OR:BL)+"44"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:18}}>
        <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:"#ede8f5"}}>{sel.name}</div><div style={{color:"#777",fontSize:15,marginTop:5}}>{sel.phone}</div></div>
        <div style={{display:"flex",gap:8,alignItems:"center"}}>
          {!isS&&<GradeBadge grade={sel.grade} onChange={v=>updBuyer(sel.id,"grade",v)} large/>}
          <Btn sm ch="🗑" c={RE} ghost onClick={()=>{if(isS)delS(sel.id);else delB(sel.id)}}/>
        </div>
      </div>
      {isS&&<div>
        <div style={{marginBottom:18}}><Lbl t="תמונות נכס" icon="📷"/><ImgUp images={sel.images||[]} onAdd={img=>addImg(sel.id,img)} onRemove={iid=>remImg(sel.id,iid)}/></div>
        {(sel.rooms||sel.size||sel.floor)&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:18}}>
          {[{l:"חדרים",v:sel.rooms,i:"🚪"},{l:"מ״ר",v:sel.size,i:"📐"},{l:"קומה",v:sel.floor,i:"🏢"}].filter(x=>x.v).map(x=><div key={x.l} style={{background:"rgba(0,0,0,0.2)",borderRadius:14,padding:14,textAlign:"center"}}>
            <div style={{fontSize:22,fontWeight:800,color:OR}}>{x.v}</div>
            <div style={{fontSize:12,color:"#555",marginTop:5}}>{x.i} {x.l}</div>
          </div>)}
        </div>}
        {sel.price&&<div style={{display:"flex",gap:24,marginBottom:18}}>
          <div><div style={{color:"#555",fontSize:12}}>מחיר מבוקש</div><div style={{color:OR,fontWeight:800,fontSize:22}}>{fmtPrice(sel.price)}</div></div>
          {sel.reducedPrice&&<div><div style={{color:"#555",fontSize:12}}>מחיר מוזל</div><div style={{color:"#7ec97e",fontWeight:800,fontSize:22}}>{fmtPrice(sel.reducedPrice)}</div></div>}
        </div>}
        <div style={{background:"rgba(201,168,76,0.05)",borderRadius:14,padding:16,marginBottom:18,border:"1px solid rgba(201,168,76,0.15)"}}>
          <Lbl t="בלעדיות" icon="📋"/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
            <div><div style={{color:"#555",fontSize:11,marginBottom:5}}>תחילה</div><input value={sel.exclusiveStart||""} onChange={e=>updF(sel.id,"exclusiveStart",e.target.value)} placeholder="DD/MM/YY" style={{...S.inp,fontSize:14}}/></div>
            <div><div style={{color:"#555",fontSize:11,marginBottom:5}}>סיום</div><input value={sel.exclusiveEnd||""} onChange={e=>updF(sel.id,"exclusiveEnd",e.target.value)} placeholder="DD/MM/YY" style={{...S.inp,fontSize:14}}/></div>
          </div>
        </div>
      </div>}
      {sel.notes&&<div style={{background:"rgba(0,0,0,0.2)",borderRadius:14,padding:"14px 18px",fontSize:14,color:"#aaa",lineHeight:1.7,marginBottom:18}}>{sel.notes}</div>}
      {sel.birthday&&<div style={{color:G,fontSize:14,marginBottom:18}}>🎂 {new Date(sel.birthday).toLocaleDateString("he")}</div>}
      <Lbl t="מעקב פעולות" icon="📊"/>
      {(isS?sActs:bActs).map(a=>{const done=sel.actions.includes(a);return <div key={a} onClick={()=>toggleAct(isS?"s":"b",sel.id,a)} style={{display:"flex",alignItems:"center",gap:14,padding:"13px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",cursor:"pointer"}}>
        <div style={{width:26,height:26,borderRadius:"50%",background:done?"#7ec97e":"transparent",border:"2px solid "+(done?"#7ec97e":"#333"),display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,color:"#1a1208",flexShrink:0,transition:"all .2s"}}>{done?"✓":""}</div>
        <span style={{fontSize:15,color:done?"#7ec97e":"#999"}}>{a}</span>
      </div>})}
      <div style={{marginTop:20,display:"flex",gap:10,flexWrap:"wrap"}}>
        {sel.phone&&<Btn sm ch="ווטסאפ" c={GR} onClick={()=>openWA(sel.phone)} icon="💬"/>}
        {isS&&<Btn sm ch="גיוס בלעדיות" c={OR} onClick={()=>setRecruitSeller(sel)} icon="📤"/>}
        {!isS&&<Btn sm ch="שלח דירה" c={BL} onClick={()=>setSendToBuyer(sel)} icon="🏠"/>}
        {sel.phone&&<Btn sm ghost ch="יומן" onClick={()=>addToCalendar("פגישה עם "+sel.name)} icon="📅"/>}
      </div>
    </div>
    {isS&&<PublishCard seller={sel} buyers={buyers}/>}
  </div>}

  // ADD SELLER
  if(mode==="add"&&tab==="sellers"){return <div style={{padding:S.page}} className="fade">
    <button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.card,border:"1px solid "+OR+"44"}}>
      <div style={{fontWeight:800,color:OR,fontSize:18,marginBottom:20}}>🏡 מוכר חדש</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="שם *" ph="ישראל ישראלי" val={sn} set={setSn} mb={10}/><Inp label="טלפון *" ph="050-0000000" val={sp} set={setSp} mb={10}/></div>
      <Inp label="כתובת" ph="רחוב הרצל 10" val={sa} set={setSa} mb={10}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="עיר" ph="באר שבע" val={sc} set={setSc} mb={10}/><Inp label="מחיר" ph="800000" val={sprice} set={setSprice} mb={10}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10}}><Inp label="חדרים" ph="4" val={sr} set={setSr} mb={10}/><Inp label="מ״ר" ph="80" val={ss} set={setSs} mb={10}/><Inp label="קומה" ph="3" val={sf} set={setSf} mb={10}/></div>
      <Inp label="מחיר מוזל" ph="750000" val={sred} set={setSred} mb={10}/>
      <div style={{background:"rgba(201,168,76,0.05)",borderRadius:14,padding:16,marginBottom:16,border:"1px solid rgba(201,168,76,0.15)"}}>
        <Lbl t="בלעדיות" icon="📋"/>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="תחילה" ph="01/01/26" val={ses} set={setSes} mb={0}/><Inp label="סיום" ph="01/04/26" val={see} set={setSee} mb={0}/></div>
      </div>
      <Inp label="הערות" ph="מושכרת, שוכרים, קוד כניסה..." val={snotes} set={setSnotes} rows={3} mb={16}/>
      <div style={{marginBottom:18}}><Lbl t="תמונות" icon="📷"/><ImgUp images={simgs} onAdd={img=>setSimgs(p=>[...p,img])} onRemove={id=>setSimgs(p=>p.filter(i=>i.id!==id))}/></div>
      <div style={{display:"flex",gap:10}}><Btn full ch="שמור מוכר" onClick={addSeller} dis={!sn||!sp} c={OR} icon="💾"/><Btn ghost ch="ביטול" onClick={()=>setMode("list")}/></div>
    </div>
  </div>}

  // ADD BUYER
  if(mode==="add"&&tab==="buyers"){return <div style={{padding:S.page}} className="fade">
    <button onClick={()=>setMode("list")} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.card,border:"1px solid "+BL+"44"}}>
      <div style={{fontWeight:800,color:BL,fontSize:18,marginBottom:20}}>👤 קונה חדש</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}><Inp label="שם *" ph="ישראל ישראלי" val={bn} set={setBn} mb={10}/><Inp label="טלפון *" ph="050-0000000" val={bp} set={setBp} mb={10}/></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
        <Sel label="תקציב" val={bb} set={setBb} opts={[{v:"עד-600K",l:"עד 600K"},{v:"600K-1M",l:"600K-1M"},{v:"1M-1.5M",l:"1-1.5M"},{v:"1.5M+",l:"1.5M+"}]} mb={10}/>
        <Sel label="חדרים" val={br} set={setBr} opts={[{v:"1-2",l:"1-2"},{v:"2-3",l:"2-3"},{v:"3-4",l:"3-4"},{v:"4-5",l:"4-5"},{v:"5+",l:"5+"}]} mb={10}/>
      </div>
      <Inp label="אזור" ph="באר שבע, שכונה ד..." val={ba} set={setBa} mb={10}/>
      <div style={{marginBottom:10}}><Lbl t="יום הולדת" icon="🎂"/><input type="date" value={bday} onChange={e=>setBday(e.target.value)} style={S.inp}/></div>
      <Inp label="הערות" ph="חניה חובה..." val={bnotes} set={setBnotes} rows={2} mb={16}/>
      <div style={{display:"flex",gap:10}}><Btn full ch="שמור קונה" onClick={addBuyer} dis={!bn||!bp} c={BL} icon="💾"/><Btn ghost ch="ביטול" onClick={()=>setMode("list")}/></div>
    </div>
  </div>}

  // LIST
  return <div style={{padding:S.page}} className="fade">
    {recruitSeller&&<RecruitModal seller={recruitSeller} onClose={()=>setRecruitSeller(null)}/>}
    {sendToBuyer&&<SendPropertyModal buyer={sendToBuyer} sellers={sellers} onClose={()=>setSendToBuyer(null)}/>}
    <div style={{display:"flex",gap:10,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
      <Pill ch="🏡 מוכרים" count={sellers.length} active={tab==="sellers"} onClick={()=>{setTab("sellers");setMode("list");setSel(null)}} c={OR}/>
      <Pill ch="👥 קונים" count={buyers.length} active={tab==="buyers"} onClick={()=>{setTab("buyers");setMode("list");setSel(null)}} c={BL}/>

        {d.topics.map((t,i)=>{const isSel=selT===t;return <div key={i} style={{...S.card,border:isSel?"1px solid "+d.color+"44":"1px solid rgba(255,255,255,0.06)",marginBottom:10}}>
          <div style={{display:"flex",justifyContent:"space-between",gap:10,alignItems:"center"}}><div style={{fontWeight:700,color:"#ede8f5",fontSize:15,flex:1,lineHeight:1.4}}>{t}</div><Btn sm ch="סקריפט" c={d.color} onClick={()=>{setSelT(t);gen(t,d.type,d.dur)}}/></div>
          {isSel&&<div style={{marginTop:14}}>
            {loading&&<div style={{textAlign:"center",padding:20}}><div className="spinner" style={{margin:"0 auto 10px"}}/><div style={{color:"#777",fontSize:14}}>מכין סקריפט...</div></div>}
            {script&&!loading&&<div><div style={{background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:14,padding:18,marginBottom:14,color:"#d0c8e8",fontSize:14,lineHeight:1.9,whiteSpace:"pre-wrap"}}>{script}</div>
              <div style={{display:"flex",gap:10}}>
                <Btn sm ch="העתק" c={G} onClick={()=>{navigator.clipboard.writeText(script);showToast("📋 הועתק!")}} icon="📋" style={{flex:1}}/>
                <Btn sm ghost ch="גרסה חדשה" onClick={()=>gen(t,d.type,d.dur)} icon="🔄" style={{flex:1}}/>
              </div>
            </div>}
          </div>}
        </div>})}
      </div>}
    </div>})}
    <div style={{...S.card,marginTop:8}}>
      <Lbl t="נושא חופשי" icon="✏️"/>
      <input placeholder="נושא לסרטון..." value={custom} onChange={e=>setCustom(e.target.value)} style={{...S.inp,marginBottom:12}}/>
      <Btn full ch={loading?"מכין...":"צור סקריפט"} onClick={()=>{if(custom.trim()){setSelT("c");gen(custom,"חופשי","45-60שנ")}}} dis={!custom.trim()||loading} icon="🎬"/>
    </div>
  </div>
}

// ━━━ UNIVERSITY ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function University(){
  const[topic,setTopic]=useState("");const[loading,setLoading]=useState(false);const[content,setContent]=useState(null);const[cat,setCat]=useState("market");
  const cats=[{k:"market",l:"שוק",i:"📈",c:G},{k:"law",l:"דינים",i:"⚖️",c:BL},{k:"sales",l:"מכירות",i:"💬",c:GR},{k:"finance",l:"מימון",i:"💰",c:OR},{k:"marketing",l:"שיווק",i:"📱",c:PU},{k:"ai",l:"AI",i:"🤖",c:TE},{k:"general",l:"כללי",i:"🌍",c:RE}];
  const topics={market:["מגמות מחירים בבאר שבע 2026","השפעת הריבית על הנדלן","שכונות בצמיחה","מדד מחירי דירות"],law:["מה זה טאבו","הסכם בלעדיות","חובות גילוי של מוכר","מסמכי העברת בעלות"],sales:["SPIN Selling לנדל\"ן","התמודדות עם התנגדויות","בניית rapport","מו\"מ אפקטיבי"],finance:["מסלולי משכנתא","מה זה LTV","מענקים לרוכשי דירה","מחזור משכנתא"],marketing:["אלגוריתם טיקטוק 2026","כתיבה שיווקית","מותג אישי","SEO לנדלן"],ai:["Claude AI לנדלן","ChatGPT למודעות","Midjourney לנכסים","אוטומציות Make.com"],general:["כלכלה ישראלית 2026","פסיכולוגיה של קנייה","ניהול זמן","AI ועתיד הנדלן"]};
  async function learn(t){setLoading(true);setContent(null);try{const txt=await aiCall("מרצה מומחה. נושא: \""+t+"\"\n\nצור שיעור:\n📚 תקציר (3 משפטים)\n---\n🔑 5 נקודות מפתח\n---\n💼 יישום מעשי\n---\n📖 מקורות\n---\n✅ שאלת חשיבה",1200);setContent({topic:t,text:txt})}catch(e){}setLoading(false)}
  return <div style={{padding:S.page}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>🎓 אוניברסיטת נדל"ן</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>למידה יומית · העשרה מקצועית · צמיחה עסקית</div>
    <div style={{display:"flex",gap:8,overflowX:"auto",paddingBottom:8,marginBottom:18}}>{cats.map(c=><Pill key={c.k} ch={c.i+" "+c.l} active={cat===c.k} onClick={()=>setCat(c.k)} c={c.c}/>)}</div>
    {!content&&!loading&&<div>
      {(topics[cat]||[]).map((t,i)=><button key={i} onClick={()=>learn(t)} style={{width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.07)",borderRadius:16,padding:"16px 20px",cursor:"pointer",display:"flex",alignItems:"center",gap:14,fontFamily:"inherit",textAlign:"right",marginBottom:8,transition:"border-color .15s"}}>
        <span style={{fontSize:26,flexShrink:0}}>{cats.find(c=>c.k===cat)?.i}</span>
        <span style={{color:"#d0c090",fontSize:15,flex:1,fontWeight:600}}>{t}</span>
        <span style={{color:"#333",fontSize:18}}>←</span>
      </button>)}
      <div style={{...S.card,marginTop:8}}>
        <Lbl t="נושא שלי" icon="✏️"/>
        <input placeholder="כתוב נושא..." value={topic} onChange={e=>setTopic(e.target.value)} onKeyDown={e=>e.key==="Enter"&&topic.trim()&&learn(topic)} style={{...S.inp,marginBottom:12}}/>
        <Btn full ch="למד עכשיו" onClick={()=>learn(topic)} dis={!topic.trim()} icon="🎓"/>
      </div>
    </div>}
    {loading&&<div style={{...S.card,textAlign:"center",padding:44}}><div className="spinner" style={{margin:"0 auto 16px"}}/><div style={{color:G,fontWeight:700,fontSize:16}}>מכין שיעור...</div></div>}
    {content&&!loading&&<div className="fade">
      <button onClick={()=>setContent(null)} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזרה</button>
      <div style={S.cardGold}>
        <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:20,color:G,marginBottom:16}}>{content.topic}</div>
        <div style={{color:"#d0c8e8",fontSize:15,lineHeight:2,whiteSpace:"pre-wrap"}}>{content.text}</div>
        <div style={{display:"flex",gap:10,marginTop:20}}>
          <Btn ch="שמור" c={G} onClick={()=>{navigator.clipboard.writeText(content.text);showToast("📋 הועתק!")}} icon="📋" style={{flex:1}}/>
          <Btn ghost ch="נושא חדש" onClick={()=>setContent(null)} style={{flex:1}}/>
        </div>
      </div>
    </div>}
  </div>
}

// ━━━ WEEKLY REPORT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function WeeklyReport({sellers}){
  const DEF="דיווח שבועי — נכס {כתובת}\nשלום {שם} 😊\n\nחיים בן סימון מרימקס — דיווח שבועי:\n\n📊 מצב שיווקי:\n• פרסום פעיל\n• {מספר} פניות השבוע\n• {מספר} סיורים\n\n💰 מחיר: {מחיר}₪\n📅 בלעדיות עד: {סיום}\n\n🔑 המלצה:\n{המלצה}\n\nזמין עבורך!\nחיים | RE/MAX";
  const[template,setTemplate]=useState(lv("report_tpl",DEF));
  const[sel,setSel]=useState(null);const[preview,setPreview]=useState("");const[loading,setLoading]=useState(false);
  function genPrev(){if(!sel)return;const s=sel;setPreview(template.replace("{כתובת}",s.address||"").replace("{שם}",s.name||"").replace("{מחיר}",s.price?Number(s.price).toLocaleString():"").replace("{סיום}",s.exclusiveEnd||"").replace(/{מספר}/g,Math.floor(Math.random()*5+2)).replace("{המלצה}","להוריד מחיר ב-20,000₪"))}
  async function aiGen(){if(!sel)return;setLoading(true);try{const txt=await aiCall("כתוב דיווח שבועי מקצועי וחם של חיים מרימקס לבעל נכס "+sel.name+". נכס: "+sel.address+", "+sel.city+", "+sel.rooms+" חד, "+sel.price+"₪, בלעדיות עד "+sel.exclusiveEnd+". עד 12 שורות.",500);setPreview(txt)}catch(e){}setLoading(false)}
  return <div style={{padding:S.page}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📊 דיווח שבועי</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>ערוך תבנית ושלח בלחיצה</div>
    <div style={S.card}>
      <Lbl t="תבנית" icon="📝"/>
      <textarea value={template} onChange={e=>{setTemplate(e.target.value);sv("report_tpl",e.target.value)}} rows={10} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.7,marginBottom:12}}/>
      <div style={{color:"#666",fontSize:12,marginBottom:14}}>משתנים: {"{שם} {כתובת} {מחיר} {סיום}"}</div>
      <Sel label="בחר מוכר" val={sel?String(sel.id):""} set={v=>{setSel(sellers.find(s=>s.id===parseInt(v))||null);setPreview("")}} opts={[{v:"",l:"— בחר מוכר —"},...sellers.map(s=>({v:String(s.id),l:s.name+" — "+(s.address||"")}))]}/>
      {sel&&<div style={{display:"flex",gap:10}}><Btn sm ch="תצוגה" onClick={genPrev} c={BL} icon="👁"/><Btn sm ch={loading?"...":"AI דיווח"} onClick={aiGen} dis={loading} c={PU} icon="🤖"/></div>}
    </div>
    {preview&&<div style={{...S.cardGold,border:"1px solid rgba(37,211,102,0.25)"}}>
      <Lbl t="ערוך לפני שליחה" icon="✏️"/>
      <textarea value={preview} onChange={e=>setPreview(e.target.value)} rows={12} style={{...S.inp,resize:"none",color:"#c8f0d0",background:"rgba(37,211,102,0.04)",border:"1px solid rgba(37,211,102,0.15)",fontSize:14,lineHeight:1.7,marginBottom:14}}/>
      {sel&&sel.phone&&<Btn full ch="שלח בווטסאפ" c={GR} onClick={()=>openWA(sel.phone,preview)} icon="📱"/>}
    </div>}
  </div>
}

// ━━━ ASSISTANT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Assistant({buyers,setBuyers,sellers,setSellers,tasks,setTasks}){
  const[msgs,setMsgs]=useState([{role:"ai",text:"שלום חיים! 👋\n\nאני העוזר האישי שלך.\nדבר אלי בחופשיות — מה תרצה?"}]);
  const[cmd,setCmd]=useState("");const[loading,setLoading]=useState(false);
  const[showV,setShowV]=useState(false);const[vt,setVt]=useState("");
  const bot=useRef();
  useEffect(()=>{bot.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  function addMsg(r,t){setMsgs(m=>[...m,{role:r,text:t}])}
  async function run(input){
    const c=input||cmd;if(!c.trim())return;setCmd("");addMsg("user",c);setLoading(true);
    try{
      const sl=sellers.slice(0,15).map(s=>s.name+"|"+s.phone+"|"+s.address+"|"+s.city+"|"+(s.rooms||"?")+"חד|"+(s.price||"?")+"₪|בלע׳:"+(s.exclusiveEnd||"—")).join("\n");
      const bl=buyers.slice(0,10).map(b=>b.name+"|"+b.phone+"|"+b.area+"|"+b.budget+"|דירוג:"+(b.grade||"B")).join(", ");
      const prompt="עוזר של חיים בן סימון רימקס באר שבע.\n\nמוכרים:\n"+sl+"\n\nקונים: "+bl+"\n\nפקודה: \""+c+"\"\n\nענה JSON:\n{\"action\":\"INFO|SCHEDULE|WHATSAPP|FIND_MATCH\",\"response\":\"תשובה\",\"details\":\"\",\"waMessage\":\"\",\"taskText\":\"\",\"taskTime\":\"\"}";
      const txt=await aiCall(prompt,600);
      const r=JSON.parse(txt.replace(/```json|```/g,"").trim());
      if(r.action==="SCHEDULE"&&r.taskText){const t=[...tasks,{id:Date.now(),text:r.taskText,time:r.taskTime||"—",done:false,type:"remind"}];setTasks(t);sv("tasks",t);showToast("📅 משימה נוספה")}
      addMsg("ai",r.response+(r.details?"\n\n"+r.details:"")+(r.waMessage?"\n\n💬 הודעה:\n"+r.waMessage:""));
    }catch(e){addMsg("ai","⚠️ שגיאה — ודא חיבור לאינטרנט ו-API Key")}
    setLoading(false);
  }
  const examples=["מי מהקונים דירוג A?","בלעדיויות שפגות?","תזכורת להתקשר לירדן מחר 10:00","כמה מוכרים בשכונה ד?","הכן הודעה לקונים A על נכס חדש"];
  return <div style={{padding:S.page,paddingBottom:170}} className="fade">
    <div style={{marginBottom:16}}>
      {msgs.map((m,i)=><div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-start":"flex-end",marginBottom:14}}>
        <div style={{maxWidth:"88%",background:m.role==="user"?"rgba(201,168,76,0.1)":"rgba(255,255,255,0.05)",border:"1px solid "+(m.role==="user"?"rgba(201,168,76,0.22)":"rgba(255,255,255,0.08)"),borderRadius:m.role==="user"?"18px 18px 4px 18px":"18px 18px 18px 4px",padding:"15px 20px",fontSize:15,color:m.role==="user"?"#f0d888":"#d0c8e8",lineHeight:1.75,whiteSpace:"pre-wrap"}}>
          {m.role==="ai"&&<span style={{fontSize:12,color:G,fontWeight:700,display:"block",marginBottom:6}}>🤖 עוזר AI</span>}
          {m.text}
        </div>
      </div>)}
      {loading&&<div style={{display:"flex",justifyContent:"flex-end"}}><div style={{background:"rgba(255,255,255,0.05)",border:"1px solid rgba(255,255,255,0.08)",borderRadius:"18px 18px 18px 4px",padding:"15px 20px",color:"#777",fontSize:15,display:"flex",alignItems:"center",gap:10}}><span className="spinner"/><span>מעבד...</span></div></div>}
      <div ref={bot}/>
    </div>
    {msgs.length===1&&<div style={{marginBottom:18}}>{examples.map((ex,i)=><button key={i} onClick={()=>run(ex)} style={{display:"block",width:"100%",background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)",borderRadius:14,padding:"13px 18px",cursor:"pointer",fontFamily:"inherit",textAlign:"right",color:"#999",fontSize:14,marginBottom:8,transition:"border-color .15s"}}>→ {ex}</button>)}</div>}
    <div style={{position:"fixed",bottom:82,right:0,left:0,padding:"14px 16px",background:"rgba(7,6,13,0.97)",borderTop:"1px solid rgba(201,168,76,0.12)",backdropFilter:"blur(20px)"}}>
      {showV&&<div style={{marginBottom:12}} className="fade"><div style={{color:G,fontSize:13,fontWeight:700,marginBottom:6}}>מה אמרת? כתוב:</div>
        <div style={{display:"flex",gap:8}}><input placeholder="כתוב..." value={vt} onChange={e=>setVt(e.target.value)} onKeyDown={e=>{if(e.key==="Enter"&&vt.trim()){run(vt);setShowV(false);setVt("")}}} style={{...S.inp,flex:1}}/><Btn sm ch="▶" c={G} onClick={()=>{run(vt);setShowV(false);setVt("")}} dis={!vt.trim()}/></div>
      </div>}
      <div style={{display:"flex",gap:10,alignItems:"center"}}>
        <VoiceBtn size={54} onText={t=>{if(t==="__voice__")setShowV(v=>!v)}}/>
        <input placeholder="כתוב פקודה..." value={cmd} onChange={e=>setCmd(e.target.value)} onKeyDown={e=>e.key==="Enter"&&cmd.trim()&&run()} style={{...S.inp,flex:1}}/>
        <Btn sm ch="שלח" onClick={()=>run()} dis={!cmd.trim()||loading} c={G}/>
      </div>
    </div>
  </div>
}

// ━━━ NAVIGATION & APP ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const TABS=[
  {k:"home",l:"בית",i:"🏠"},{k:"caller",l:"קונה",i:"📞"},{k:"daily",l:"יומי",i:"📅"},
  {k:"crm",l:"לקוחות",i:"👥"},{k:"publish",l:"פרסום",i:"📣"},{k:"broker",l:"מתווך",i:"🤝"},
  {k:"report",l:"דיווח",i:"📊"},{k:"tiktok",l:"טיקטוק",i:"🎬"},{k:"ai",l:"עוזר",i:"🤖"},
  {k:"uni",l:"אוני׳",i:"🎓"},{k:"settings",l:"הגדרות",i:"⚙️"},
];

function App(){
  const[tab,setTab]=useState("home");
  const[buyers,setBuyers]=useState(()=>lv("buyers",[]));
  const[sellers,setSellers]=useState(()=>{const s=lv("sellers",null);return s&&s.length>0?s:IS});
  const[tasks,setTasks]=useState(()=>lv("tasks",[]));
  const hasKey=!!localStorage.getItem(PREFIX+"apikey");

  return <div style={{background:"#07060d",minHeight:"100vh",paddingBottom:92}}>
    <div style={{position:"fixed",inset:0,background:"radial-gradient(ellipse 60% 45% at 12% 8%,rgba(100,70,180,0.07) 0%,transparent 55%),radial-gradient(ellipse 40% 30% at 88% 90%,rgba(201,168,76,0.04) 0%,transparent 50%)",pointerEvents:"none",zIndex:0}}/>
    <div style={{position:"relative",zIndex:1}}>
      {/* Header */}
      <div style={{background:"rgba(7,6,13,0.96)",backdropFilter:"blur(24px)",borderBottom:"1px solid rgba(201,168,76,0.1)",padding:"15px 18px",position:"sticky",top:0,zIndex:100}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
          <div>
            <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:G,letterSpacing:-.5}}>NadlanPro</div>
            <div style={{fontSize:11,color:"#444",marginTop:2,letterSpacing:.3}}>RE/MAX · חיים בן סימון · באר שבע</div>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"center"}}>
            {!hasKey&&<button onClick={()=>setTab("settings")} style={{background:"rgba(201,126,126,0.12)",border:"1px solid rgba(201,126,126,0.3)",borderRadius:22,padding:"5px 14px",fontSize:12,color:RE,fontWeight:700,cursor:"pointer",fontFamily:"inherit",transition:"all .15s"}}>⚠️ API Key</button>}
            <div style={{background:"rgba(37,211,102,0.07)",border:"1px solid rgba(37,211,102,0.2)",borderRadius:22,padding:"5px 14px",fontSize:11,color:GR,fontWeight:700,display:"flex",alignItems:"center",gap:6}}>
              <span style={{width:7,height:7,background:GR,borderRadius:"50%",display:"inline-block",animation:"pulse-dot 2s infinite"}}/>פעיל
            </div>
          </div>
        </div>
      </div>

      {/* Pages */}
      {tab==="home"&&<Dashboard buyers={buyers} sellers={sellers} tasks={tasks}/>}
      {tab==="caller"&&<QuickCaller buyers={buyers} setBuyers={setBuyers} sellers={sellers}/>}
      {tab==="daily"&&<DailyPlan tasks={tasks} setTasks={setTasks}/>}
      {tab==="crm"&&<CRM buyers={buyers} setBuyers={setBuyers} sellers={sellers} setSellers={setSellers}/>}
      {tab==="publish"&&<Publish sellers={sellers} buyers={buyers}/>}
      {tab==="broker"&&<Broker buyers={buyers}/>}
      {tab==="report"&&<WeeklyReport sellers={sellers}/>}
      {tab==="tiktok"&&<Tiktok/>}
      {tab==="ai"&&<Assistant buyers={buyers} setBuyers={setBuyers} sellers={sellers} setSellers={setSellers} tasks={tasks} setTasks={setTasks}/>}
      {tab==="uni"&&<University/>}
      {tab==="settings"&&<Settings onClose={()=>setTab("home")}/>}

      {/* Bottom Nav */}
      <nav style={{position:"fixed",bottom:0,left:0,right:0,background:"rgba(5,4,10,0.98)",backdropFilter:"blur(24px)",borderTop:"1px solid rgba(201,168,76,0.1)",display:"flex",zIndex:200,padding:"6px 0 12px",overflowX:"auto"}}>
        {TABS.map(t=>{const active=tab===t.k;return <button key={t.k} onClick={()=>setTab(t.k)} style={{flex:"0 0 auto",minWidth:54,background:"none",border:"none",cursor:"pointer",padding:"6px 6px 2px",display:"flex",flexDirection:"column",alignItems:"center",gap:3,position:"relative",transition:"all .15s"}}>
          {active&&<div style={{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:22,height:3,background:G,borderRadius:3}}/>}
          <span style={{fontSize:22}}>{t.i}</span>
          <span style={{fontSize:9.5,fontWeight:active?800:600,color:active?G:"#2a2a2a",fontFamily:"inherit",whiteSpace:"nowrap",letterSpacing:.2}}>{t.l}</span>
        </button>})}
      </nav>
    </div>
  </div>
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
