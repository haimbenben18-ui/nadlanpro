async function sendWhatsAppMedia(phone,caption,mediaItems){
  const ULTRAMSG_INSTANCE="instance169955";
  const ULTRAMSG_TOKEN="slhhpfslyuey11fp";
  const p=(phone||"").replace(/^0/,"972").replace(/[-\s+]/g,"");
  if(!p){toast("⚠️ אין מספר טלפון");return false}
  const items=(mediaItems||[]).map(m=>typeof m==='string'?{url:m,type:'image'}:m);
  if(items.length===0){
    try{
      const r=await fetch(`https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/chat`,{
        method:'POST',
        headers:{'Content-Type':'application/x-www-form-urlencoded'},
        body:new URLSearchParams({token:ULTRAMSG_TOKEN,to:p,body:caption})
      });
      const d=await r.json();
      if(d.sent)toast("✅ הודעה נשלחה");
      else toast("❌ שגיאה: "+(d.error||"unknown"));
      return d.sent;
    }catch(e){toast("❌ "+e.message);return false}
  }
  async function sendMediaItem(item,i){
    const isVideo=item.type==='video';
    const endpoint=isVideo?'video':'image';
    const fieldName=isVideo?'video':'image';
    const bodyParams={token:ULTRAMSG_TOKEN,to:p,caption:i===0?caption:""};
    bodyParams[fieldName]=item.url;
    const r=await fetch(`https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/${endpoint}`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams(bodyParams)
    });
    return await r.json();
  }
  try{
    for(let i=0;i<items.length;i++){
      toast("📸 שולח "+(items[i].type==='video'?"וידאו":"תמונה")+" "+(i+1)+" מתוך "+items.length+"...");
      let d=await sendMediaItem(items[i],i);
      if(!d.sent){
        toast("⚠️ ניסיון חוזר לתמונה "+(i+1)+"...");
        await new Promise(res=>setTimeout(res,2000));
        d=await sendMediaItem(items[i],i);
        if(!d.sent){toast("❌ תמונה "+(i+1)+" נכשלה לאחר ניסיון חוזר");console.error(d);return false}

    return true;
  }catch(e){
    toast("❌ "+e.message);
    console.error(e);
    return false;
  }
}

function buildMultiCaption(prop,buyerName,isFirst,totalCount,currentIndex){

  }
  msg+="🏠 *"+(streetOnly||prop.name||"נכס")+"*\n";
  msg+="📍 "+city+"\n\n";
  if(rooms)msg+="🛏 "+rooms+"\n";
  if(size)msg+="📐 "+size+"\n";
  if(floor)msg+="🏢 "+floor+"\n";
  if(price)msg+="\n💰 *"+price+"*\n";
  if(notes)msg+="\n"+notes+"\n";
  if(currentIndex===totalCount-1){
    msg+="\n━━━━━━━━━━\n";
    msg+="📞 *חיים בן סימון*\n";
    msg+="🏆 RE/MAX\n";
    msg+="📱 054-4740691\n\n";

    }else{
      msg+="מעוניין? אשמח לתאם סיור 😊";
    }
  }
  return msg;
}

async function sendMultipleProperties(buyer,propsArray){
  if(!buyer.phone){toast("⚠️ אין טלפון לקונה");return false}

  toast("⏳ שולח "+propsArray.length+" דירות ל"+buyer.name+"...");
  for(let i=0;i<propsArray.length;i++){
    const prop=propsArray[i];
    const isFirst=(i===0);
    const caption=buildMultiCaption(prop,buyer.name,isFirst,propsArray.length,i);
    const media=prop.images||[];
    const ok=await sendWhatsAppMedia(buyer.phone,caption,media);

      await new Promise(res=>setTimeout(res,3000));
    }
  }
  toast("✅ כל "+propsArray.length+" הדירות נשלחו!");
  return true;
}

// Sends images ONLY to a phone or group — no caption, no body, no companion
// text message. One image per request via /messages/image with a 2-second
// delay between requests. caption is always the empty string '' (never
// undefined/null) so the receiving WhatsApp client treats it as media-only.
async function sendWhatsAppImagesOnly(recipient,imageUrls){
  const ULTRAMSG_INSTANCE="instance169955";
  const ULTRAMSG_TOKEN="slhhpfslyuey11fp";
  const isGroup=/@g\.us$/i.test(recipient||"");
  const to=isGroup?recipient:(recipient||"").replace(/^0/,"972").replace(/[-\s+]/g,"");
  if(!to){toast("⚠️ אין יעד");return false}
  const urls=(imageUrls||[]).map(u=>typeof u==="string"?u:(u&&u.url)).filter(Boolean);
  if(urls.length===0){toast("⚠️ אין תמונות לנכס זה");return false}
  toast("📸 שולח "+urls.length+" תמונות...");
  let ok=0;
  for(let i=0;i<urls.length;i++){
    const caption='';
    console.log('Sending image:',{to,image:urls[i],caption,hasCaption:caption!==''});
    try{
      const r=await fetch(`https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/image`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({token:ULTRAMSG_TOKEN,to,image:urls[i],caption})
      });
      const d=await r.json();
      if(d.sent)ok++;else console.warn("image send failed",urls[i],d);
    }catch(e){console.error("image send err",e)}
    if(i<urls.length-1)await new Promise(rs=>setTimeout(rs,2000));
  }
  if(ok===urls.length)toast("📷 "+ok+" תמונות נשלחו");
  else toast("⚠️ "+ok+"/"+urls.length+" תמונות נשלחו");
  return ok===urls.length;
}

async function sendDirectMessage(phone,text){
  const ULTRAMSG_INSTANCE="instance169955";
  const ULTRAMSG_TOKEN="slhhpfslyuey11fp";
  // Groups: pass through unchanged. Phones: normalize.
  const isGroup=/@g\.us$/i.test(phone||"");
  const p=isGroup?phone:(phone||"").replace(/^0/,"972").replace(/[-\s+]/g,"");
  if(!p){toast("⚠️ אין מספר טלפון");return false}
  try{
    const r=await fetch(`https://api.ultramsg.com/${ULTRAMSG_INSTANCE}/messages/chat`,{
      method:'POST',
      headers:{'Content-Type':'application/x-www-form-urlencoded'},
      body:new URLSearchParams({token:ULTRAMSG_TOKEN,to:p,body:text})
    });
    const d=await r.json();
    if(d.sent){
      try{db.collection("messages").doc(p).collection("msgs").add({text,sent_at:new Date().toISOString(),direction:"out"})}catch(e){console.error("msg save err",e)}
      return true;
    }else{toast("❌ שגיאה: "+(d.error||"unknown"));return false}
  }catch(e){toast("❌ "+e.message);return false}
}

async function sendPropertyToMultipleAgents(prop,agents){
  if(!agents||agents.length===0){toast("⚠️ אין מתווכים");return false}
  const cap=buildAgentCaption(prop);
  const media=prop.images||[];
  let okCount=0;
  for(let i=0;i<agents.length;i++){
    const a=agents[i];
    toast("📤 נשלח ל-"+(i+1)+" מתוך "+agents.length+" — "+(a.name||a.phone||""));
    if(!a.phone){continue}
    if(media.length>0){
      const ok=await sendWhatsAppMedia(a.phone,cap,media);
      if(ok)okCount++;
    }else{
      const ok=await sendDirectMessage(a.phone,cap);
      if(ok)okCount++;
    }
    if(i<agents.length-1)await new Promise(r=>setTimeout(r,3000));
  }
  toast("✅ נשלח ל-"+okCount+" מתוך "+agents.length+" מתווכים");
  return true;
}

// Daily reset for posted-group marks.
// Compares today's date with a saved "last reset date". When they differ,
// wipes every np7_fb_posted_* key and updates the saved date. A one-shot
// version flag also forces an immediate full wipe of all posted marks the
// first time this code ships.
(function cleanupPostedMarks(){
  try{
    const today=new Date().toISOString().slice(0,10);
    const postedPrefix=PX+"fb_posted_";
    const lastResetKey=PX+"fb_last_reset_date";
    const lastReset=localStorage.getItem(lastResetKey);
    const wipeFlagKey=PX+"fb_wipe_v2";
    const forceWipe=!localStorage.getItem(wipeFlagKey);
    const dayChanged=lastReset!==today;
    const shouldWipe=forceWipe||dayChanged;
    if(shouldWipe){
      const toRemove=[];
      for(let i=0;i<localStorage.length;i++){
        const k=localStorage.key(i);
        if(k&&k.startsWith(postedPrefix))toRemove.push(k);
      }
      toRemove.forEach(k=>localStorage.removeItem(k));
      localStorage.setItem(lastResetKey,today);
      if(forceWipe)localStorage.setItem(wipeFlagKey,"1");
      if(toRemove.length)console.log("[cleanupPostedMarks] wiped "+toRemove.length+" entries"+(forceWipe?" (one-shot force wipe)":" (day changed: "+lastReset+" → "+today+")"));
    }
  }catch(e){console.warn("[cleanupPostedMarks] failed:",e)}
})();

function openWA(phone,msg){
  const p=(phone||"").replace(/^0/,"972").replace(/[-\s]/g,"");
  if(!p&&!msg){toast("⚠️ אין מספר טלפון");return}
  const encodedMsg=msg?encodeURIComponent(msg):"";
  let url;
  if(p){
    url="https://api.whatsapp.com/send?phone="+p+(msg?"&text="+encodedMsg:"");
  }else{
    url="https://api.whatsapp.com/send?text="+encodedMsg;
  }
  window.open(url,"_blank");
}
function addCal(title,date,time){const dt=date||(new Date().toISOString().split("T")[0]);const t=time||"09:00";const s=dt.replace(/-/g,"")+"T"+t.replace(":","")+"00";const h=String(Math.min(23,parseInt(t.split(":")[0])+1)).padStart(2,"0");const e=dt.replace(/-/g,"")+"T"+h+t.split(":")[1]+"00";window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+encodeURIComponent(title)+"&dates="+s+"/"+e,"_blank")}
function fmtP(p){if(!p||isNaN(Number(p)))return"—";return Number(p).toLocaleString("he-IL")+"₪"}
function daysTo(str){if(!str)return null;const p=str.split("/");if(p.length<3)return null;const y=p[2].length===2?"20"+p[2]:p[2];return Math.ceil((new Date(parseInt(y),parseInt(p[1])-1,parseInt(p[0]))-new Date())/86400000)}

// ━━━ REST-DAY CHECK & 3-TOUCH SCHEDULING ━━━━━━━━━━━━━━━━
function isRestDay(date){
  const d=new Date(date);
  if(d.getDay()===6)return true; // Saturday
  // Major Israeli holidays (approximate fixed dates — Gregorian anchors for 2025-2027)
  const m=d.getMonth()+1;const day=d.getDate();
  const holidays=[[9,22],[9,23],[9,24],[10,1],[10,2],[10,6],[10,7],[10,13],[10,14],[10,20],[10,21],[4,12],[4,13],[4,18],[4,19],[6,1],[6,2]];
  return holidays.some(h=>h[0]===m&&h[1]===day);
}
function nextWorkday(from,addDays){
  const d=new Date(from);
  let added=0;
  while(added<addDays){
    d.setDate(d.getDate()+1);
    if(!isRestDay(d))added++;
  }
  return d;
}
function getSequenceDates(){
  let t1=new Date();
  while(isRestDay(t1))t1.setDate(t1.getDate()+1);
  const t2=nextWorkday(t1,1);
  const t3=nextWorkday(t1,4);
  return{t1,t2,t3};
}
function fmtDate(d){return d.toLocaleDateString("he-IL",{day:"2-digit",month:"2-digit",year:"2-digit"})}
function nowStr(){const d=new Date();return d.toLocaleDateString("he")+" "+d.toLocaleTimeString("he",{hour:"2-digit",minute:"2-digit"})}

function ImgUp({images=[],onAdd,onRemove}){const fr=useRef();const[prev,setPrev]=useState(null);async function handle(files){const arr=Array.from(files);if(arr.length===0)return;toast("⏳ מעלה "+arr.length+" קבצים...");const newMedia=[];for(const f of arr){try{const isVideo=f.type.startsWith('video/');if(isVideo&&f.size>40*1024*1024){toast("⚠️ וידאו גדול מדי (מקס 40MB): "+f.name);continue}const fd=new FormData();fd.append('file',f);fd.append('upload_preset','nadlanpro');const resourceType=isVideo?'video':'image';const r=await fetch('https://api.cloudinary.com/v1_1/dopvqfgzw/'+resourceType+'/upload',{method:'POST',body:fd});const d=await r.json();if(d.secure_url){newMedia.push({id:Date.now()+Math.random(),url:d.secure_url,type:isVideo?'video':'image'})}else{console.error(d);toast("❌ שגיאה ב-"+f.name)}}catch(e){console.error(e);toast("❌ "+e.message)}}if(newMedia.length>0){onAdd(newMedia);toast("✅ "+newMedia.length+" קבצים הועלו")}else{toast("❌ שגיאה בהעלאה")}}return <div>{prev&&<div onClick={()=>setPrev(null)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.96)",zIndex:9999,display:"flex",alignItems:"center",justifyContent:"center",padding:16,cursor:"zoom-out"}}>{prev.type==='video'?<video src={prev.url} controls style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16}}/>:<img src={prev.url||prev} style={{maxWidth:"100%",maxHeight:"90vh",borderRadius:16}}/>}</div>}<div style={{display:"flex",gap:10,flexWrap:"wrap"}}>{images.map(img=><div key={img.id} style={{position:"relative"}}>{img.type==='video'?<video src={img.url} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)"}} onClick={()=>setPrev(img)}/>:<img src={img.url} onClick={()=>setPrev(img)} style={{width:92,height:74,objectFit:"cover",borderRadius:12,border:"2px solid rgba(201,168,76,0.25)",cursor:"pointer"}}/>}{onRemove&&<button onClick={()=>onRemove(img.id)} style={{position:"absolute",top:-8,left:-8,width:24,height:24,borderRadius:"50%",background:RE,border:"2px solid #07060d",color:"#fff",fontSize:14,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900}}>×</button>}</div>)}{onAdd&&<button onClick={()=>fr.current.click()} style={{width:92,height:74,borderRadius:12,border:"2px dashed rgba(201,168,76,0.3)",background:"rgba(201,168,76,0.04)",color:G,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:4,fontSize:12,fontWeight:700}}><span style={{fontSize:26}}>📷</span>הוסף</button>}</div>{onAdd&&<input ref={fr} type="file" accept="image/*,video/*" multiple style={{display:"none"}} onChange={e=>handle(e.target.files)}/>}</div>}

async function aiCall(prompt,max=900){
  const key=getKey();
  if(!key){toast("⚠️ חסר API Key — לחץ ⚙️ הגדרות");throw new Error("no key")}
  const r=await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":key,"anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:max,
      system:"אתה עוזר אישי של חיים בן סימון, מתווך נדל\"ן RE/MAX Plus בבאר שבע עם 15 שנות ניסיון. ענה תמיד בעברית, בקצרה ובמקצועיות.",

}

      <div style={{flex:1}}>
        <div style={{fontSize:15,color:t.done?"#555":"#ede8f5",textDecoration:t.done?"line-through":"none"}}>{icons[t.type]||"📌"} {t.text}</div>
        {t.clientName&&<div style={{fontSize:12,color:"#777",marginTop:2}}>{t.clientType==="buyer"?"👤 קונה":"🏡 מוכר"}: {t.clientName}{t.clientPhone&&<span style={{color:BL,marginRight:6}}> · {t.clientPhone}</span>}</div>}
      </div>
      <div style={{color:"#555",fontSize:13,flexShrink:0,fontWeight:600}}>{t.time}</div>
      {t.clientPhone&&<a href={"tel:"+t.clientPhone} title="חייג" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:4,color:BL,textDecoration:"none"}}>📞</a>}
      {t.clientPhone&&<button onClick={()=>openWA(t.clientPhone)} title="ווטסאפ" style={{background:"none",border:"none",cursor:"pointer",fontSize:16,padding:4,color:GR}}>💬</button>}
      <button onClick={()=>addCal(t.text+(t.clientName?" — "+t.clientName:""))} title="יומן" style={{background:"none",border:"none",cursor:"pointer",fontSize:18,padding:4}}>📅</button>
      <button onClick={()=>del(t.id)} style={{background:"none",border:"none",color:"#333",cursor:"pointer",fontSize:20,padding:4}}>×</button>
    </div>)}
    <div style={S.card}>
      <Lbl t="משימה חדשה" icon="➕"/>
      <input placeholder="תיאור..." value={nt} onChange={e=>setNt(e.target.value)} onKeyDown={e=>e.key==="Enter"&&add()} style={{...S.inp,marginBottom:12}}/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:12}}>
        <input type="time" value={ntime} onChange={e=>setNtime(e.target.value)} style={S.inp}/>
        <select value={ntype} onChange={e=>setNtype(e.target.value)} style={{...S.inp,background:"#0e0d14"}}><option value="call">📞 שיחה</option><option value="tour">🏠 סיור</option><option value="meeting">🤝 פגישה</option><option value="send">📤 שליחה</option><option value="publish">📣 פרסום</option><option value="remind">⏰ תזכורת</option></select>
      </div>
      <Lbl t="לקוח (אופציונלי)" icon="👤"/>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:10}}>
        <input placeholder="שם לקוח" value={nclient} onChange={e=>setNclient(e.target.value)} style={S.inp}/>
        <input placeholder="טלפון" value={ncphone} onChange={e=>setNcphone(e.target.value)} style={S.inp}/>
      </div>
      <div style={{display:"flex",gap:8,marginBottom:14}}>
        {[{v:"buyer",l:"👤 קונה"},{v:"seller",l:"🏡 מוכר"}].map(x=><button key={x.v} onClick={()=>setNctype(nctype===x.v?"":x.v)} style={{flex:1,background:nctype===x.v?G+"22":"rgba(255,255,255,0.03)",border:"1px solid "+(nctype===x.v?G+"55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"10px",color:nctype===x.v?G:"#777",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{x.l}</button>)}
      </div>
      <Btn full ch="הוסף משימה" onClick={add} dis={!nt} icon="➕"/>
    </div>
  </div>
}

// ━━━ RECRUIT (גיוס נכסים) ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function Recruit({prospects,setProspects,landingConfig,setLandingConfig}){
  const[phones,setPhones]=useState("");
  const[selMsg,setSelMsg]=useState(0);
  const[msg,setMsg]=useState("");
  const[viewP,setViewP]=useState(null);
  const[mode,setMode]=useState("send"); // send | list | landing
  const[seqModal,setSeqModal]=useState(null);
  async function sendLandingPage(prospect){
    if(!prospect.phone){toast("⚠️ אין מספר טלפון");return}
    const name=(prospect.name||"").trim();
    const greet=name?"שלום "+name:"שלום";
    const m=greet+", כאן חיים בן סימון מרימקס. בהמשך לשיחתנו, הכנתי עבורכם דף מקצועי עם האסטרטגיה השיווקית שלי: "+LANDING_URL;
    const ok=await sendDirectMessage(prospect.phone,m);
    if(ok)toast("✅ דף נחיתה נשלח");
  }
  const[seqEditMsg,setSeqEditMsg]=useState("");
  const[seqEditT2,setSeqEditT2]=useState("");
  const[seqEditT3,setSeqEditT3]=useState("");
  const[seqSending,setSeqSending]=useState(false);
  function startRecruitSequence(p){
    if(!p.phone){toast("⚠️ אין מספר טלפון");return}
    const dates=getSequenceDates();
    const name=(p.name||"").trim();
    const t1msg=(name?name+", ":"")+"שמחתי להכיר 🤝 כפי שהבטחתי, אני שולח לך את התוכנית העסקית שלי למכירת הבית שלך. מצורף הקישור לאסטרטגיית השיווק המלאה שלי ולמדריך למכירת נכס שהכנתי עבורך — כולל סרטוני תוכן, טיפים זהב וכלים מעשיים: "+LANDING_URL+". המטרה שלי היא שתגיע לתהליך הזה בביטחון מלא. נדבר מחר. חיים בן סימון | RE/MAX Plus";
    const t2msg="היי"+(name?" "+name:"")+", מקווה שמצאת ערך בסרטונים ששלחתי. עלו לך שאלות לגבי התהליך? אני כאן לכל התייעצות מקצועית. חיים.";
    const t3msg="היי"+(name?" "+name:"")+", רציתי לשתף אותך בנכס דומה לשלך שמכרנו השבוע בשכונה. ידע ושיווק נכון עושים את ההבדל. נשתמע? חיים.";
    setSeqModal({prospect:p,dates,t1msg,t2msg,t3msg});
    setSeqEditMsg(t1msg);
    setSeqEditT2(t2msg);
    setSeqEditT3(t3msg);
  }
  async function confirmRecruitSequence(){
    if(!seqModal||seqSending)return;
    setSeqSending(true);
    const{prospect:p,dates}=seqModal;
    const ok=await sendDirectMessage(p.phone,seqEditMsg);
    if(ok){
      addPLog(p.id,"🚀 Touch 1 — רצף שיווקי הופעל");
      updProspect(p.id,"sentMaterial",true);
      toast("🚀 Touch 1 נשלח ברקע");
    }else{toast("❌ שליחה נכשלה")}
    setSeqSending(false);
    setSeqModal(null);
  }

  const templates=["שלום 👋\nחיים בן סימון, מתווך RE/MAX Plus — 15 שנה.\nראיתי את הנכס שלך ויש לי 2 קונים רציניים עם הון עצמי מוכן שמחפשים בדיוק באזור שלך.\nאשמח לשיחה קצרה של 3 דקות — בלי התחייבות.\nמתי נוח לך? 📞\nחיים בן סימון | RE/MAX Plus","שלום 👋\nחיים בן סימון מרימקס פלוס.\nפניתי אליך כי יש לי קונה עם מזומן שמחפש נכס בדיוק כמו שלך — והוא רוצה לסגור השבוע.\nשווה שיחה של 5 דקות? אני זמין היום.\nחיים | RE/MAX Plus","שלום 👋\nחיים בן סימון מרימקס פלוס.\nבעקבות המעבר לעיר הבהד\"ים יש לי קונים מצה\"ל ומשרד הביטחון עם תקציב מוכן שמחפשים דירות בדיוק באזור שלך.\nאשמח לשיחה קצרה — בלי התחייבות.\nחיים בן סימון | RE/MAX Plus | 15 שנות ניסיון"];

  useEffect(()=>{setMsg(templates[selMsg])},[selMsg]);

  function sendAll(){
    const nums=phones.split(/[\n,;]+/).map(x=>x.trim()).filter(Boolean);
    if(!nums.length){toast("⚠️ הכנס מספרים");return}
    nums.forEach((n,i)=>setTimeout(()=>openWA(n,msg),i*500));
    toast("📤 נשלח ל-"+nums.length+" מספרים");
  }
  function addProspect(){
    const num=phones.trim().split(/[\n,;]+/)[0]||"";
    if(!num){toast("⚠️ הכנס מספר");return}
    const p={id:Date.now(),phone:num,grade:"B",notes:"",sentMaterial:false,followUp:false,exclusive:false,calDate:"",logs:[{text:"כרטיסייה נפתחה",time:nowStr()}]};
    const np=[...prospects,p];setProspects(np);sv("prospects",np);toast("✅ כרטיסייה נפתחה");setViewP(p)
  }
  function updProspect(id,f,v){const np=prospects.map(p=>p.id===id?{...p,[f]:v}:p);setProspects(np);sv("prospects",np);if(viewP&&viewP.id===id)setViewP(np.find(p=>p.id===id))}
  function addPLog(id,text){const np=prospects.map(p=>p.id===id?{...p,logs:[...p.logs,{text,time:nowStr()}]}:p);setProspects(np);sv("prospects",np);if(viewP&&viewP.id===id)setViewP(np.find(p=>p.id===id))}
  function delProspect(id){const np=prospects.filter(p=>p.id!==id);setProspects(np);sv("prospects",np);setViewP(null);toast("🗑 נמחק")}

  if(viewP){return <div style={{padding:S.pg}} className="fade">
    <button onClick={()=>setViewP(null)} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.card,border:"1px solid "+OR+"44"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
        <div><div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:22,color:"#ede8f5"}}>{viewP.phone}</div></div>
        <div style={{display:"flex",gap:8}}><GradeBadge grade={viewP.grade} onChange={v=>updProspect(viewP.id,"grade",v)}/><Btn sm ch="🗑" c={RE} ghost onClick={()=>delProspect(viewP.id)}/></div>
      </div>
      <Inp label="מספר טלפון" ph="050..." val={viewP.phone} set={v=>updProspect(viewP.id,"phone",v)} icon="📱" mb={12}/>
      <Inp label="הערות" ph="מלל חופשי..." val={viewP.notes} set={v=>updProspect(viewP.id,"notes",v)} rows={3} mb={12}/>
      <div style={{display:"flex",gap:10,flexWrap:"wrap",marginBottom:16}}>
        {[{f:"sentMaterial",l:"נשלח חומר",i:"📤"},{f:"followUp",l:"פולואפ",i:"🔄"},{f:"exclusive",l:"גויסה בלעדיות",i:"🏆"}].map(x=><button key={x.f} onClick={()=>updProspect(viewP.id,x.f,!viewP[x.f])} style={{background:viewP[x.f]?"#7ec97e22":"rgba(255,255,255,0.03)",border:"1px solid "+(viewP[x.f]?"#7ec97e55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"10px 16px",color:viewP[x.f]?"#7ec97e":"#777",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{x.i} {x.l}</button>)}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
        <Btn sm ch="📅 יומן" ghost onClick={()=>addCal("פגישה גיוס — "+viewP.phone)}/>
        <Btn sm ch="💬 ווטסאפ" c={GR} onClick={()=>openWA(viewP.phone)}/>
        {viewP.phone&&<Btn sm ch="📞" c={BL} onClick={()=>window.location.href='tel:'+(viewP.phone||'')}/>}
        <Btn sm ch="🌐 שלח דף נחיתה" c={BL} ghost onClick={()=>{if(confirm("לשלוח דף נחיתה ל-"+(viewP.phone||"")+"?"))sendLandingPage(viewP)}}/>
        {viewP.phone&&<Btn sm ch="🚀 רצף שיווקי" c={OR} onClick={()=>startRecruitSequence(viewP)}/>}
      </div>
      <Lbl t="תיעוד" icon="📝"/>
      {viewP.logs&&viewP.logs.map((l,i)=><div key={i} style={{padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:13}}><span style={{color:"#555"}}>{l.time}</span> — <span style={{color:"#bbb"}}>{l.text}</span></div>)}
      <div style={{display:"flex",gap:8,marginTop:10}}><input placeholder="הוסף תיעוד..." id="plog" style={{...S.inp,flex:1}} onKeyDown={e=>{if(e.key==="Enter"&&e.target.value){addPLog(viewP.id,e.target.value);e.target.value=""}}}/></div>
    </div>
  </div>}

  return <div style={{padding:S.pg}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📤 גיוס נכסים</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>שלח הודעות מפתות לבעלי נכסים מיד2</div>
    <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}><Pill ch="✉️ שליחה" active={mode==="send"} onClick={()=>setMode("send")} c={OR}/><Pill ch={"📋 כרטיסיות ("+prospects.length+")"} active={mode==="list"} onClick={()=>setMode("list")} c={G}/><Pill ch="🌐 דף נחיתה" active={mode==="landing"} onClick={()=>setMode("landing")} c={BL}/></div>

    {mode==="landing"&&<LandingEditor landingConfig={landingConfig} setLandingConfig={setLandingConfig}/>}

    {mode==="send"&&<div>
      <div style={S.card}>
        <Lbl t="מספרי טלפון" icon="📱"/>
        <textarea placeholder="הכנס מספרים (כל מספר בשורה חדשה)..." value={phones} onChange={e=>setPhones(e.target.value)} rows={3} style={{...S.inp,resize:"none",marginBottom:14}}/>
        <Lbl t="בחר הודעה"/>
        <div style={{display:"flex",gap:8,marginBottom:14}}>
          {[1,2,3].map(i=><button key={i} onClick={()=>setSelMsg(i-1)} style={{flex:1,background:selMsg===i-1?"rgba(232,168,76,0.15)":"rgba(255,255,255,0.03)",border:"1px solid "+(selMsg===i-1?OR+"55":"rgba(255,255,255,0.08)"),borderRadius:12,padding:"11px",cursor:"pointer",color:selMsg===i-1?OR:"#666",fontSize:14,fontWeight:700,fontFamily:"inherit"}}>אופציה {i}</button>)}
        </div>
        <textarea value={msg} onChange={e=>setMsg(e.target.value)} rows={8} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.75,marginBottom:14}}/>
        <div style={{display:"flex",gap:10,flexWrap:"wrap"}}>
          <Btn full ch="שלח ווטסאפ" c={GR} onClick={sendAll} icon="📱"/>
          <Btn sm ghost ch="פתח כרטיסייה" onClick={addProspect} icon="📋"/>
        </div>
      </div>
    </div>}

    {mode==="list"&&<div>
      {prospects.length===0&&<Empty icon="📋" text="אין כרטיסיות גיוס"/>}
      {prospects.map(p=><div key={p.id} style={S.card}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div><div style={{fontWeight:700,color:"#ede8f5",fontSize:16}}>{p.phone}</div><div style={{color:"#777",fontSize:13}}>{p.notes?p.notes.substring(0,50):"ללא הערות"}</div></div>
          <div style={{display:"flex",gap:8}}><GradeBadge grade={p.grade} onChange={v=>updProspect(p.id,"grade",v)}/></div>
        </div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",marginBottom:10}}>
          {p.sentMaterial&&<Tag c="#7ec97e" ch="📤 נשלח חומר"/>}
          {p.followUp&&<Tag c={BL} ch="🔄 פולואפ"/>}
          {p.exclusive&&<Tag c={G} ch="🏆 בלעדיות"/>}
        </div>
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          <Btn sm ch="כרטיסייה" c={OR} onClick={()=>setViewP(p)}/>
          <Btn sm ch="💬" c={GR} onClick={()=>openWA(p.phone)}/>
          {p.phone&&<Btn sm ch="📞" c={BL} onClick={()=>window.location.href='tel:'+(p.phone||'')}/>}
          {p.phone&&<Btn sm ch="🌐 דף נחיתה" c={BL} ghost onClick={()=>{if(confirm("לשלוח דף נחיתה ל-"+p.phone+"?"))sendLandingPage(p)}}/>}
          {p.phone&&<Btn sm ch="🚀 רצף" c={OR} onClick={()=>startRecruitSequence(p)}/>}
          <Btn sm ghost c={RE} ch="מחק" onClick={()=>delProspect(p.id)}/>
        </div>
      </div>)}
    </div>}

    {seqModal&&<div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.7)",zIndex:200,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setSeqModal(null)}>
      <div onClick={e=>e.stopPropagation()} className="fade" style={{background:"var(--surface)",border:"1px solid var(--border-gold)",borderRadius:16,padding:22,maxWidth:400,width:"100%",maxHeight:"85vh",overflowY:"auto"}}>
        <div style={{fontWeight:800,fontSize:16,color:G,marginBottom:14}}>🚀 רצף שיווקי — {seqModal.prospect.phone}</div>
        <div style={{fontSize:13,color:"var(--text-gray)",marginBottom:16,lineHeight:1.7}}>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:10}}>
            <span style={{background:GR+"22",color:GR,borderRadius:8,padding:"2px 8px",fontWeight:700,fontSize:12,flexShrink:0}}>T1 היום</span>
            <span>{fmtDate(seqModal.dates.t1)} — שלח הודעה בווטסאפ (API ישיר)</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start",marginBottom:10}}>
            <span style={{background:BL+"22",color:"#5b8def",borderRadius:8,padding:"2px 8px",fontWeight:700,fontSize:12,flexShrink:0}}>T2 יום 2</span>
            <span>{fmtDate(seqModal.dates.t2)} — מעקב: שאלות על הסרטונים</span>
          </div>
          <div style={{display:"flex",gap:8,alignItems:"flex-start"}}>
            <span style={{background:PU+"22",color:"#a78bfa",borderRadius:8,padding:"2px 8px",fontWeight:700,fontSize:12,flexShrink:0}}>T3 יום 5</span>
            <span>{fmtDate(seqModal.dates.t3)} — שיתוף עסקה דומה</span>
          </div>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"var(--gold)",marginBottom:6}}>✏️ הודעת Touch 1 (ניתן לערוך):</div>
          <textarea value={seqEditMsg} onChange={e=>setSeqEditMsg(e.target.value)} rows={6} style={{...S.inp,resize:"none",fontSize:13,lineHeight:1.6,direction:"rtl"}}/>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#5b8def",marginBottom:6}}>✏️ הודעת Touch 2 (ניתן לערוך):</div>
          <textarea value={seqEditT2} onChange={e=>setSeqEditT2(e.target.value)} rows={4} style={{...S.inp,resize:"none",fontSize:13,lineHeight:1.6,direction:"rtl"}}/>
        </div>
        <div style={{marginBottom:14}}>
          <div style={{fontSize:12,fontWeight:700,color:"#a78bfa",marginBottom:6}}>✏️ הודעת Touch 3 (ניתן לערוך):</div>
          <textarea value={seqEditT3} onChange={e=>setSeqEditT3(e.target.value)} rows={4} style={{...S.inp,resize:"none",fontSize:13,lineHeight:1.6,direction:"rtl"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <Btn full ch={seqSending?"שולח...":"🚀 שלח עכשיו (API)"} c={G} onClick={confirmRecruitSequence} dis={seqSending}/>
          <Btn ghost ch="ביטול" onClick={()=>setSeqModal(null)}/>
        </div>
      </div>
    </div>}
  </div>
}

// ━━━ INLINE MSG BOX ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function InlineMsgBox({phone,name,onSent}){
  const[open,setOpen]=useState(false);
  const[text,setText]=useState("");
  const[sending,setSending]=useState(false);
  const[history,setHistory]=useState([]);
  async function loadHistory(){
    if(!phone)return;
    const p=phone.replace(/^0/,"972").replace(/[-\s+]/g,"");
    try{
      const snap=await db.collection("messages").doc(p).collection("msgs")
        .orderBy("sent_at","desc").limit(5).get();
      setHistory(snap.docs.map(d=>d.data()));
    }catch(e){console.error("hist err",e)}
  }
  async function send(){
    if(!text.trim()||!phone||sending)return;
    setSending(true);
    const ok=await sendDirectMessage(phone,text);
    if(ok){
      toast("✅ ההודעה נשלחה");

function AddTaskModal({client,onClose,onAdd}){
  const[clientType,setClientType]=useState(client.type||"buyer");
  const[desc,setDesc]=useState("");
  const[date,setDate]=useState(new Date().toISOString().split("T")[0]);
  const[taskTime,setTaskTime]=useState("10:00");
  const[taskCat,setTaskCat]=useState("call");
  function create(){
    if(!desc.trim())return;
    const task={
      id:Date.now()+Math.random(),
      text:desc,
      time:taskTime||"—",
      done:false,
      type:taskCat,
      clientName:client.name,
      clientPhone:client.phone||"",
      clientType,
      date
    };
    onAdd&&onAdd(task);
    toast("✅ משימה נוצרה — נפתח Google Calendar");
    try{
      const typeLabel=clientType==="seller"?"מוכר":"קונה";
      const title=encodeURIComponent(typeLabel+" "+client.name+" — "+desc);
      const details=encodeURIComponent((client.phone?"טלפון: "+client.phone+"\n":"")+desc);
      const[y,m,d]=date.split("-");
      const[h,mn]=(taskTime||"10:00").split(":");
      const pad=n=>String(n).padStart(2,"0");
      const startDt=y+m+d+"T"+pad(h)+pad(mn)+"00";
      const endH=Math.min(parseInt(h)+1,23);
      const endDt=y+m+d+"T"+pad(endH)+pad(mn)+"00";
      window.open("https://calendar.google.com/calendar/render?action=TEMPLATE&text="+title+"&dates="+startDt+"/"+endDt+"&details="+details,"_blank");
    }catch(e){console.warn("calendar open failed",e)}
    onClose();
  }
  return <Modal title={"➕ הוסף משימה — "+client.name} color={PU} onClose={onClose}>
    <div style={{marginBottom:14}}>
      <Lbl t="סוג לקוח"/>
      <div style={{display:"flex",gap:8}}>
        {[{v:"seller",l:"🏡 מוכר"},{v:"buyer",l:"👤 קונה"}].map(x=>
          <button key={x.v} onClick={()=>setClientType(x.v)}
            style={{flex:1,background:clientType===x.v?PU+"22":"rgba(255,255,255,0.03)",
              border:"1px solid "+(clientType===x.v?PU+"55":"rgba(255,255,255,0.08)"),
              borderRadius:12,padding:"10px",color:clientType===x.v?PU:"#777",
              fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>{x.l}</button>
        )}
      </div>
    </div>
    <Inp label="תיאור משימה *" ph="לדוגמה: לתאם סיור, לשלוח פרטים..." val={desc} set={setDesc} mb={14}/>
    <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
      <div><Lbl t="תאריך"/><input type="date" value={date} onChange={e=>setDate(e.target.value)} style={S.inp}/></div>
      <div><Lbl t="שעה"/><input type="time" value={taskTime} onChange={e=>setTaskTime(e.target.value)} style={S.inp}/></div>
    </div>
    <Sel label="סוג פעולה" val={taskCat} set={setTaskCat} opts={[
      {v:"call",l:"📞 שיחה"},{v:"tour",l:"🏠 סיור"},{v:"meeting",l:"🤝 פגישה"},
      {v:"send",l:"📤 שליחה"},{v:"remind",l:"⏰ תזכורת"}
    ]} mb={18}/>
    <Btn full ch="צור משימה" onClick={create} dis={!desc.trim()} c={PU} icon="➕"/>
  </Modal>
}

// ━━━ WEEKLY REPORT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function WeeklyReport({sellers}){
  const DEF="דיווח שבועי — נכס {כתובת}\nשלום {שם} 😊\n\nחיים בן סימון מרימקס — דיווח שבועי לנכסך:\n\n📊 מצב שיווקי:\n• פורסם ב: פייסבוק, טיקטוק, אינסטגרם, יד2\n• {צפיות} צפיות\n• {מספר} פניות השבוע\n• {מספר} סיורים בוצעו\n\n💰 מחיר: {מחיר}₪\n\n🔑 המלצה:\n{המלצה}\n\nלכל שאלה — זמין עבורך!\nחיים | RE/MAX";
  const[template,setTemplate]=useState(lv("report_tpl",DEF));
  const[sel,setSel]=useState(null);const[preview,setPreview]=useState("");const[loading,setLoading]=useState(false);const[views,setViews]=useState("");const[sending,setSending]=useState(false);

    if(!sel||!sel.phone||!preview.trim()||sending)return;
    setSending(true);
    const ok=await sendDirectMessage(sel.phone,preview);
    if(ok)toast("✅ הדיווח נשלח ל"+sel.name);
    setSending(false);
  }
  function genPrev(){if(!sel)return;const s=sel;setPreview(template.replace("{כתובת}",s.address||"").replace("{שם}",s.name||"").replace("{מחיר}",s.price?Number(s.price).toLocaleString():"").replace(/{מספר}/g,Math.floor(Math.random()*5+2)).replace("{צפיות}",views||"0").replace("{המלצה}","להמשיך שיווק אגרסיבי בכל הפלטפורמות"))}
  async function aiGen(){if(!sel)return;setLoading(true);try{const txt=await aiCall("כתוב דיווח שבועי מקצועי וחם של חיים בן סימון מרימקס לבעל נכס "+sel.name+". נכס: "+sel.address+", "+sel.city+", "+(sel.rooms||"?")+" חד, "+sel.price+"₪. פורסם בפייסבוק טיקטוק אינסטגרם ויד2. "+views+" צפיות. כלול מצב שיווקי, פניות, המלצה. ללא תאריך בלעדיות. עד 12 שורות.",500);setPreview(txt)}catch(e){}setLoading(false)}
  return <div style={{padding:S.pg}} className="fade">
    <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontSize:24,fontWeight:900,color:G,marginBottom:6}}>📊 דיווח שבועי</div>
    <div style={{color:"#777",fontSize:14,marginBottom:18}}>ערוך תבנית ושלח בלחיצה</div>
    <div style={S.card}>
      <Lbl t="תבנית (עריכה חופשית)" icon="📝"/>
      <textarea value={template} onChange={e=>{setTemplate(e.target.value);sv("report_tpl",e.target.value)}} rows={14} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.7,marginBottom:12}}/>
      <div style={{color:"#666",fontSize:12,marginBottom:14}}>משתנים: {"{שם} {כתובת} {מחיר} {צפיות}"}</div>
      <Sel label="בחר מוכר" val={sel?String(sel.id):""} set={v=>{setSel(sellers.find(s=>s.id===parseInt(v))||null);setPreview("")}} opts={[{v:"",l:"— בחר מוכר —"},...sellers.map(s=>({v:String(s.id),l:s.name+" — "+(s.address||"")}))]}/>

function DistributionCenter({prop,onClose,fbGroups,addFbGroup,delFbGroup,onSaveText}){
  const today=new Date().toISOString().slice(0,10);
  const propIdStr=String(prop.id);
  const storageKey="fb_posted_"+propIdStr+"_"+today;
  const[posted,setPosted]=useState(()=>lv(storageKey,[]));

  const[gName,setGName]=useState("");const[gUrl,setGUrl]=useState("");const[gCat,setGCat]=useState("investor");

  const customGroups=(fbGroups||[]).map(g=>({...g,id:g._docId||("custom_"+(g._docId||"")),custom:true}));
  const allInvestor=[...FB_GROUPS_BUILTIN.filter(g=>g.category==="investor"),...customGroups.filter(g=>g.category==="investor")];
  const allLocal=[...FB_GROUPS_BUILTIN.filter(g=>g.category==="local"),...customGroups.filter(g=>g.category==="local")];

  function sourceText(){
    const saved=prop.savedAds&&prop.savedAds.facebook&&prop.savedAds.facebook.text;
    return ensureFbSignature(saved||buildFacebookCaption(prop));
  }
  const[shareText,setShareText]=useState(sourceText);
  const[wizard,setWizard]=useState(null); // null or {orderedGroups, idx}
  const[selectedIds,setSelectedIds]=useState([]);
  const[openProgress,setOpenProgress]=useState(null); // {groups,idx} or null
  const[members,setMembers]=useState(()=>{
    const stored=lv("fb_member_groups_v2",null);
    if(stored===null){
      const defaults=FB_GROUPS_BUILTIN.filter(g=>!g.pending).map(g=>g.id);
      sv("fb_member_groups_v2",defaults);
      return defaults;
    }
    return stored;
  });
  const[joinPending,setJoinPending]=useState([]);
  const[joinWizard,setJoinWizard]=useState(null); // null or {ordered, idx}
  const[customUrls,setCustomUrls]=useState(()=>lv("fb_group_urls",{}));
  const[linkModal,setLinkModal]=useState(null); // null or {group, value}
  const[urlWizard,setUrlWizard]=useState(null); // null or {groups, total, idx}
  const images=(prop.images||[]).filter(i=>i.type!=="video");

  function isMember(g){return members.includes(g.id)}
  function isPending(g){return joinPending.includes(g.id)}
  function urlOf(g){return (customUrls&&customUrls[g.id])||g.url}
  function hasDirectUrl(g){return !!(customUrls&&customUrls[g.id])}

  function saveGroupUrl(g,raw,silent){
    const trimmed=(raw||"").trim();
    const next={...customUrls};
    if(trimmed===""){
      if(g.id in next){delete next[g.id];if(!silent)toast("🔄 הקישור אופס לחיפוש")}
      else if(!silent){toast("אין קישור לאפס");return false}
    }else if(!/^https?:\/\//i.test(trimmed)){
      toast("⚠️ הקישור חייב להתחיל ב-https://");
      return false;
    }else{
      next[g.id]=trimmed;
      if(!silent)toast("✅ קישור ישיר נשמר ל-"+g.name);
    }
    setCustomUrls(next);sv("fb_group_urls",next);
    return true;
  }

  async function readClipboard(){
    if(!navigator.clipboard||!navigator.clipboard.readText){
      toast("⚠️ הדפדפן לא תומך בקריאה אוטומטית — הדבק ידנית");
      return null;
    }
    try{
      const v=await navigator.clipboard.readText();
      return (v||"").trim();
    }catch(e){
      toast("⚠️ אין הרשאה לקרוא מה-clipboard — הדבק ידנית");
      return null;
    }
  }

  function updateGroupUrl(g){setLinkModal({group:g,value:customUrls[g.id]||""})}

  async function pasteIntoLinkModal(){
    const v=await readClipboard();
    if(v===null)return;
    if(!v){toast("⚠️ ה-clipboard ריק");return}
    setLinkModal(m=>m?{...m,value:v}:m);
  }

  function startUrlWizard(){
    const all=[...allInvestor,...allLocal,...allPending];
    const todo=all.filter(g=>!hasDirectUrl(g));
    if(todo.length===0){toast("✅ כל הקבוצות כבר עם קישור ישיר!");return}
    setUrlWizard({groups:todo,total:all.length,idx:0});
    window.open(urlOf(todo[0]),"_blank");
    toast("🌐 הקבוצה נפתחה — העתק את הכתובת מהדפדפן ולחץ הדבק",4000);
  }

  function urlWizardAdvance(savedNow){
    if(!urlWizard)return;
    const next=urlWizard.idx+1;
    if(next>=urlWizard.groups.length){
      setUrlWizard(null);
      toast("✅ סבב עדכון הקישורים הסתיים");
      return;
    }
    const ng=urlWizard.groups[next];
    window.open(urlOf(ng),"_blank");
    setUrlWizard({...urlWizard,idx:next});
  }

  async function urlWizardPaste(){
    if(!urlWizard)return;
    const cur=urlWizard.groups[urlWizard.idx];

  function copyToClipboard(text){
    console.log("[copyToClipboard] called. type=",typeof text,"len=",(text||"").length,"preview=",JSON.stringify((text||"").slice(0,80)));
    if(typeof text!=="string"||text.length===0){
      console.warn("[copyToClipboard] text is empty/invalid — nothing to copy");
      return false;
    }
    // Synchronous execCommand FIRST — finishes before window.open can steal focus.
    // navigator.clipboard.writeText is async and can lose the race even with await.
    let execOk=false;
    try{
      const ta=document.createElement("textarea");
      ta.value=text;
      ta.style.position="fixed";ta.style.left="-9999px";ta.style.top="0";
      ta.setAttribute("readonly","");
      document.body.appendChild(ta);
      ta.focus();
      ta.select();
      ta.setSelectionRange(0,text.length);
      execOk=document.execCommand("copy");
      document.body.removeChild(ta);
      console.log("[copyToClipboard] execCommand result=",execOk);
    }catch(e){
      console.warn("[copyToClipboard] execCommand threw:",e);
    }
    // Fire-and-forget the async API as redundancy. Don't await — we already returned.
    if(navigator.clipboard&&navigator.clipboard.writeText){
      navigator.clipboard.writeText(text).then(
        ()=>console.log("[copyToClipboard] (async) clipboard.writeText also succeeded"),
        e=>console.warn("[copyToClipboard] (async) clipboard.writeText failed:",e)
      );
    }
    return execOk;
  }

  async function downloadImages(){
    if(images.length===0){toast("אין תמונות");return}
    if(!window.JSZip){toast("⚠️ JSZip עוד לא נטען");return}
    const baseName=(prop.address||prop.name||"property").replace(/[^\w\u0590-\u05FF]+/g,"_");
    toast("⏳ מכין ZIP מ-"+images.length+" תמונות...");
    try{
      const zip=new window.JSZip();
      let okCount=0;
      for(let i=0;i<images.length;i++){
        try{
          const r=await fetch(images[i].url);
          const blob=await r.blob();
          const ext=((blob.type.split("/")[1]||"jpg").split(";")[0])||"jpg";
          zip.file(baseName+"_"+(i+1)+"."+ext,blob);
          okCount++;
        }catch(e){console.error("downloadImages item",i,e)}
      }
      if(okCount===0){toast("❌ לא ניתן היה להוריד אף תמונה");return}
      const zipBlob=await zip.generateAsync({type:"blob"});
      const url=URL.createObjectURL(zipBlob);
      const a=document.createElement("a");
      a.href=url;a.download=baseName+"_images.zip";
      document.body.appendChild(a);a.click();a.remove();
      setTimeout(()=>URL.revokeObjectURL(url),2000);
      toast("✅ ה-ZIP הורד ("+okCount+" תמונות)");
    }catch(e){console.error(e);toast("❌ "+e.message)}
  }

      const files=[];

        const ext=(blob.type.split("/")[1]||"jpg").split(";")[0];

      <textarea value={shareText} onChange={e=>setShareText(e.target.value)} rows={8} style={{...S.inp,resize:"none",fontSize:14,lineHeight:1.7,marginBottom:12}}/>
      <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:10}}>
        <Btn sm ch="📋 העתק שוב" c={BL} ghost onClick={async()=>{const ok=await copyToClipboard(shareText);toast(ok?"📋 הועתק":"⚠️ ההעתקה נכשלה")}}/>
        <Btn sm ch="פתח שוב" c={PU} ghost onClick={()=>window.open(urlOf(cur),"_blank")} icon="🔗"/>

      </div>
      <div style={{display:"flex",gap:8}}>
        {wizard.idx<wizard.orderedGroups.length-1?<Btn full ch={"הבא ← "+wizard.orderedGroups[wizard.idx+1].name} c={OR} onClick={nextGroup}/>:<Btn full ch="✅ סיים הפצה" c={GR} onClick={()=>{setWizard(null);toast("✅ הפצה הסתיימה")}}/>}

      {!(prop.savedAds&&prop.savedAds.facebook)&&<div style={{color:"#666",fontSize:11,marginTop:6}}>💡 טיפ: צור פרסום פייסבוק בכרטיסיית הנכס כדי להשתמש בו אוטומטית כאן</div>}

      {allPending.map(g=>{
        const member=isMember(g);
        const pending=isPending(g);
        const direct=hasDirectUrl(g);
        return <div key={g.id} style={{display:"flex",gap:6,alignItems:"stretch",marginBottom:8}}>
          {member?
            <div title="אושרת" style={{display:"flex",alignItems:"center",justifyContent:"center",width:42,background:"rgba(126,201,126,0.14)",border:"1px solid rgba(126,201,126,0.45)",borderRadius:12,color:"#7ec97e",fontSize:18,fontWeight:900}}>✓</div>
          :pending?
            <button onClick={()=>confirmMember(g)} title="סמן כאושר" style={{background:"linear-gradient(135deg,"+GR+","+GR+"bb)",border:"none",borderRadius:12,padding:"0 12px",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>אושרתי ✓</button>
          :
            <button onClick={()=>joinGroup(g)} title="הצטרף לקבוצה" style={{background:"linear-gradient(135deg,#f5b06b,#f5b06bbb)",border:"none",borderRadius:12,padding:"0 12px",color:"#1a1208",fontWeight:800,fontSize:12,cursor:"pointer",fontFamily:"inherit",whiteSpace:"nowrap"}}>+ הצטרף</button>
          }
          <div style={{flex:1,background:"rgba(245,176,107,0.05)",border:"1px solid rgba(245,176,107,0.2)",borderRadius:12,padding:"12px 14px",color:"#ede8f5",fontSize:14,fontWeight:700,display:"flex",justifyContent:"space-between",alignItems:"center",gap:10,textAlign:"right"}}>
            <span style={{display:"flex",alignItems:"center",gap:6}}>{direct&&<span title="קישור ישיר נשמר" style={{color:GR,fontSize:13}}>🎯</span>}{g.name}</span>
            <span style={{fontSize:14,color:member?"#7ec97e":"#777"}}>{member?"חבר":(pending?"ממתין":"לא מאושר")}</span>
          </div>
          <button onClick={async()=>{const v=await readClipboard();if(v===null)return;if(!v){toast("⚠️ ה-clipboard ריק");return}saveGroupUrl(g,v)}} title="הדבק קישור מה-clipboard ושמור" style={{background:"rgba(126,201,126,0.10)",border:"1px solid rgba(126,201,126,0.35)",borderRadius:12,padding:"0 10px",color:GR,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>📥</button>
      <button onClick={()=>updateGroupUrl(g)} title={direct?"עדכן/אפס קישור ישיר":"שמור קישור ישיר"} style={{background:direct?"rgba(126,201,126,0.10)":"rgba(155,142,196,0.08)",border:"1px solid "+(direct?"rgba(126,201,126,0.35)":"rgba(155,142,196,0.25)"),borderRadius:12,padding:"0 10px",color:direct?GR:PU,cursor:"pointer",fontSize:14,fontFamily:"inherit"}}>🔗</button>

    {/* Add group */}
    {!adding?<Btn sm full ghost ch="➕ הוסף קבוצה" c={G} onClick={()=>setAdding(true)}/>:<div style={{...S.cg}}>
      <Lbl t="קבוצה חדשה" icon="➕"/>
      <Inp label="שם הקבוצה" val={gName} set={setGName} mb={10}/>
      <Inp label="קישור (URL)" val={gUrl} set={setGUrl} ph="https://www.facebook.com/groups/..." mb={10}/>
      <Sel label="קטגוריה" val={gCat} set={setGCat} opts={[{v:"investor",l:"משקיעים"},{v:"local",l:"מקומי"}]} mb={12}/>

function AgentsList({agentsContacts,setAgentsContacts,sellers,brokerProps}){
  const[mode,setMode]=useState("list");
  const[search,setSearch]=useState("");
  const[editing,setEditing]=useState(null);
  const[fName,setFName]=useState("");const[fPhone,setFPhone]=useState("");const[fCompany,setFCompany]=useState("");const[fArea,setFArea]=useState("");
  const[sendModal,setSendModal]=useState(null);
  const[sendWithImages,setSendWithImages]=useState(false);
  const[broadcastSel,setBroadcastSel]=useState(null);
  const[importOpen,setImportOpen]=useState(false);
  const[pasteText,setPasteText]=useState("");
  const vcfRef=useRef();
  const pickerAvailable=typeof navigator!=='undefined'&&'contacts' in navigator&&navigator.contacts&&'select' in navigator.contacts;

  function resetForm(){setFName("");setFPhone("");setFCompany("");setFArea("");setEditing(null)}
  function startEdit(a){setEditing(a);setFName(a.name||"");setFPhone(a.phone||"");setFCompany(a.company||"");setFArea(a.area||"");setMode("form")}

  function saveAgent(){
    if(!fName&&!fPhone){toast("⚠️ נדרש שם או טלפון");return}
    const data={name:fName.trim(),phone:fPhone.trim(),company:fCompany.trim(),area:fArea.trim()};
    if(editing){
      const upd=agentsContacts.map(a=>a.id===editing.id?{...a,...data}:a);
      setAgentsContacts(upd);
      toast("✅ עודכן");
    }else{
      const newAgent={id:Date.now()+"_"+Math.random().toString(36).slice(2,8),...data,created:nowStr()};
      const upd=[...agentsContacts,newAgent];
      setAgentsContacts(upd);
      toast("✅ נוסף");
    }
    resetForm();setMode("list");
  }

  function deleteAgent(id){
    if(!confirm("למחוק את המתווך?"))return;
    const upd=agentsContacts.filter(a=>a.id!==id);
    setAgentsContacts(upd);
    toast("🗑 נמחק");
  }

  function addImportedAgents(items){
    const newOnes=[];
    items.forEach(it=>{
      const name=(it.name||"").trim();
      const phone=(it.phone||"").trim();
      if(!name&&!phone)return;
      const exists=agentsContacts.some(a=>a.phone&&phone&&a.phone===phone);
      if(exists)return;
      if(newOnes.some(n=>n.phone&&phone&&n.phone===phone))return;
      newOnes.push({id:Date.now()+"_"+Math.random().toString(36).slice(2,8),name,phone,company:"",area:"",created:nowStr()});
    });
    if(newOnes.length===0){toast("לא נוספו מתווכים חדשים (כפולים?)");return 0}
    const upd=[...agentsContacts,...newOnes];
    setAgentsContacts(upd);
    toast("✅ יובאו "+newOnes.length+" מתווכים");
    return newOnes.length;
  }

  async function importFromContacts(){
    if(!pickerAvailable){
      toast("⚠️ Contact Picker זמין רק ב-Chrome אנדרואיד — נסה vCard או הדבקה");
      return;
    }
    try{
      const contacts=await navigator.contacts.select(['name','tel'],{multiple:true});
      if(!contacts||contacts.length===0){toast("לא נבחרו אנשי קשר");return}
      const items=contacts.map(c=>({name:(c.name&&c.name[0])||"",phone:(c.tel&&c.tel[0])||""}));
      addImportedAgents(items);
      setImportOpen(false);
    }catch(e){
      console.error(e);
      toast("❌ "+e.message);
    }
  }

  function parseVCard(text){
    const items=[];
    const blocks=text.split(/BEGIN:VCARD/i).slice(1);
    blocks.forEach(block=>{
      const body=block.split(/END:VCARD/i)[0]||"";
      const lines=body.split(/\r?\n/);
      let name="",phone="";
      lines.forEach(line=>{
        const l=line.trim();
        if(/^FN[:;]/i.test(l)){name=l.split(":").slice(1).join(":").trim()}
        else if(!name&&/^N[:;]/i.test(l)){const parts=l.split(":").slice(1).join(":").split(";").filter(Boolean);name=(parts[1]||"")+" "+(parts[0]||"");name=name.trim()}
        else if(!phone&&/^TEL/i.test(l)){phone=l.split(":").slice(1).join(":").replace(/[^\d+]/g,"").trim()}
      });
      if(name||phone)items.push({name,phone});
    });
    return items;
  }

  async function importVcfFile(file){
    if(!file)return;
    try{
      const text=await file.text();
      const items=parseVCard(text);
      if(items.length===0){toast("⚠️ לא נמצאו אנשי קשר בקובץ");return}
      const added=addImportedAgents(items);
      if(added>0)setImportOpen(false);
    }catch(e){
      console.error(e);
      toast("❌ שגיאה בקריאת הקובץ");
    }
  }

  function importFromPaste(){
    if(!pasteText.trim()){toast("⚠️ אין טקסט להדביק");return}
    const lines=pasteText.split(/\r?\n/).map(l=>l.trim()).filter(Boolean);
    const items=[];
    lines.forEach(line=>{
      const phoneMatch=line.match(/(\+?\d[\d\-\s]{6,})/);
      const phone=phoneMatch?phoneMatch[1].replace(/[\-\s]/g,""):"";
      let name=phone?line.replace(phoneMatch[1],"").replace(/[,;\t]+/g," ").trim():line;
      name=name.replace(/^[,;\s\-]+|[,;\s\-]+$/g,"");
      items.push({name,phone});
    });
    if(items.length===0){toast("⚠️ לא נמצאו שורות תקינות");return}
    const added=addImportedAgents(items);
    if(added>0){setPasteText("");setImportOpen(false)}
  }

  async function sendPropertyToAgent(agent,prop,withImages){
    const cap=buildAgentCaption(prop);
    const media=(withImages&&prop.images)?prop.images:[];
    if(media.length>0){
      await sendWhatsAppMedia(agent.phone,cap,media);
    }else{
      await sendDirectMessage(agent.phone,cap);
    }
  }

  const allProps=[...(sellers||[]).map(s=>({...s,_src:"seller"})),...(brokerProps||[]).map(p=>({...p,_src:"broker"}))];

  const fA=agentsContacts.filter(a=>!search||((a.name||"")+(a.phone||"")+(a.company||"")+(a.area||"")).toLowerCase().includes(search.toLowerCase()));

  if(mode==="form"){return <div style={{padding:S.pg}} className="fade">
    <button onClick={()=>{resetForm();setMode("list")}} style={{background:"none",border:"none",color:G,fontSize:15,cursor:"pointer",fontFamily:"inherit",marginBottom:18,fontWeight:700,padding:0}}>← חזור</button>
    <div style={{...S.cg}}>
      <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:22,color:"#ede8f5",marginBottom:18}}>{editing?"עריכת מתווך":"הוסף מתווך"}</div>
      <Inp label="שם" val={fName} set={setFName} icon="👤"/>
      <Inp label="טלפון" val={fPhone} set={setFPhone} icon="📞" type="tel"/>
      <Inp label="חברה (לא חובה)" val={fCompany} set={setFCompany} icon="🏢"/>
      <Inp label="אזור (לא חובה)" val={fArea} set={setFArea} icon="📍"/>
      <Btn full ch={editing?"💾 שמור שינויים":"➕ הוסף מתווך"} c={GR} onClick={saveAgent}/>
    </div>
  </div>}

  return <div style={{padding:S.pg}} className="fade">
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
      <div>
        <div style={{fontFamily:"'Frank Ruhl Libre',serif",fontWeight:900,fontSize:24,color:G}}>רשת מתווכים</div>
        <div style={{color:"#777",fontSize:12,marginTop:3}}>{agentsContacts.length} מתווכים ברשת</div>
      </div>

// Pull a usable location string from a property — prefers an explicit
// 'שכונה X' from the address, then the street name (without unit/digits).
// Never returns 'באר שבע' (which is implicit for the agent network); only
// returns a city if it's somewhere else (e.g. עומר).
function getNeighborhood(prop){
  if(!prop)return "";
  const addr=(prop.address||"").trim();
  if(addr){
    const sm=addr.match(/שכונה\s+([^\s,]+)/);
    if(sm)return "שכונה "+sm[1];
    const street=addr.replace(/\s+\d+.*$/,"").trim();
    if(street)return street;
  }
  const city=(prop.city||"").trim();
  if(city&&city!=="באר שבע")return city;
  return "";
}
function fmtPriceShort(price){
  if(price==null||price===""||isNaN(Number(price)))return "";
  return Number(price).toLocaleString()+" ₪";
}
// One-line property details ('X חדרים, קומה Y, מחיר: Z'), built only from
// fields that actually exist on the property — returns "" if nothing usable.
function buildDetailsLine(p){
  const parts=[];
  if(p&&p.rooms)parts.push(p.rooms+" חדרים");
  if(p&&p.floor)parts.push("קומה "+p.floor);
  const price=fmtPriceShort(p&&p.price);
  if(price)parts.push("מחיר: "+price);
  return parts.join(", ");
}

// Load the message text for a property — prefers a previously saved
// 'custom' text (already substituted, ready to send) over the first
// template. NEVER re-applies placeholder substitution on saved text.
function loadPropertyText(prop,customAgentTexts){
  if(!prop)return "";
  const saved=(customAgentTexts||{})[propKeyOf(prop)];
  if(saved&&typeof saved==="string"&&saved.trim()!=="")return saved;
  return AGENT_GROUP_TEMPLATES[0].build(prop);
}

  const city=prop.city||"";

  const floor=prop.floor||"";
  const price=(prop.price&&!isNaN(Number(prop.price)))?Number(prop.price).toLocaleString()+" ₪":"";
  let m="דירה למכירה\n";
  m+="📍 "+addr+(city?", "+city:"")+"\n";

  if(rooms)parts.push("🛏️ "+rooms+" חד'");
  if(floor)parts.push("🏢 ק' "+floor);
  if(size)parts.push("📐 "+size);
  if(parts.length)m+=parts.join(" | ")+"\n";
  if(price)m+="💰 "+price+"\n";
  m+="📞 חיים 0544740691";
  return m;
}

  return m;
}

function VipSection({queue,customAgentTexts,setCustomAgentTexts,sellers,brokerProps}){

  const[hotlistSelected,setHotlistSelected]=useState({});

  const[approvalLoop,setApprovalLoop]=useState(null);
  const[propPicker,setPropPicker]=useState(null);
  const[hotlistSaveText,setHotlistSaveText]=useState(false);

  function markSent(phone){setLastSentTimes(s=>({...s,[phone]:new Date().toLocaleString('he-IL')}))}

  function toggleVip(phone){setSelectedVips(s=>({...s,[phone]:!s[phone]}))}
  function selectAllVips(){const m={};vipList.forEach(v=>{m[v.phone]=true});setSelectedVips(m)}
  function clearAllVips(){setSelectedVips({})}

  // Load saved hotlist text from Firebase on mount
  useEffect(()=>{(async()=>{try{const doc=await db.collection("hotlists").doc("last_edited").get();if(doc.exists&&doc.data()&&doc.data().text){setHotlistText(doc.data().text)}}catch(e){console.log("No saved hotlist")}})()},[]);

  async function sendPhotos(v,targetProp){
    const p=targetProp||prop;

function AgentAutomation({sellers,brokerProps,agentsContacts,agentAuto,setAgentAuto,agentGroups,setAgentGroups,customAgentTexts,setCustomAgentTexts}){
  const allProps=[...(sellers||[]).map(s=>({...s,_src:"s"})),...(brokerProps||[]).map(p=>({...p,_src:"b"}))];
  const items=agentAuto.items||[];
  const queue=items.map(it=>{const p=allProps.find(p=>p.id===it.propId&&p._src===it.propSrc);return p?{...p,_qId:it.id}:null}).filter(Boolean);
  const sendTimes=agentAuto.sendTimes||["09:00","14:00"];
  const selectedAgents=agentAuto.selectedAgents||[];
  const lastSent=agentAuto.lastSent||{};
  const[showPicker,setShowPicker]=useState(false);
  const[showAgents,setShowAgents]=useState(false);
  const[preview,setPreview]=useState(null);
  const[sending,setSending]=useState(false);
  const[search,setSearch]=useState("");
  const[imgModal,setImgModal]=useState(null);
  const[vipVer,setVipVer]=useState(0);
  const[showGroups,setShowGroups]=useState(false);
  const[newGroupName,setNewGroupName]=useState("");
  const[newGroupId,setNewGroupId]=useState("");
  const groupsList=Array.isArray(agentGroups)?agentGroups:[];
  const enabledGroups=groupsList.filter(g=>g.enabled);
  function toggleGroup(id){setAgentGroups(groupsList.map(g=>g.id===id?{...g,enabled:!g.enabled}:g))}
  function addGroup(){
    const name=newGroupName.trim();const id=newGroupId.trim();
    if(!name||!id){toast("⚠️ צריך שם ומזהה");return}
    if(groupsList.some(g=>g.id===id)){toast("⚠️ הקבוצה כבר קיימת");return}
    setAgentGroups([...groupsList,{id,name,enabled:true}]);
    setNewGroupName("");setNewGroupId("");
    toast("✅ קבוצה נוספה");
  }
  function removeGroup(id){
    if(!confirm("להסיר את הקבוצה מהאוטומציה?"))return;
    setAgentGroups(groupsList.filter(g=>g.id!==id));
    toast("🗑 הוסר");
  }
  function saveGroups(){setAgentGroups(groupsList);toast("💾 נשמר ב-Firebase")}

  function patch(p){setAgentAuto({...agentAuto,...p})}
  function addProp(p){
    if(items.some(it=>it.propId===p.id&&it.propSrc===p._src)){toast("כבר ברשימה");return}
    patch({items:[...items,{id:Date.now(),propId:p.id,propSrc:p._src}]});
    toast("✅ נוסף לאוטומציה");
  }
  function removeProp(qId){patch({items:items.filter(it=>it.id!==qId)});toast("🗑 הוסר")}
  function toggleAgent(id){
    const sel=selectedAgents.includes(id)?selectedAgents.filter(x=>x!==id):[...selectedAgents,id];
    patch({selectedAgents:sel});
  }
  function setTimes(idx,val){
    const t=[...sendTimes];t[idx]=val;patch({sendTimes:t});
  }
  function openPreview(timeStr,singleProp){
    const propsToUse=singleProp?[singleProp]:queue;
    if(propsToUse.length===0){toast("⚠️ אין דירות באוטומציה — הוסף דירה קודם");return}
    const sourceProp=propsToUse[0];
    const saved=(customAgentTexts||{})[propKeyOf(sourceProp)];
    const initText=saved||AGENT_GROUP_TEMPLATES[0].build(sourceProp);
    const initTemplate=saved?"custom":AGENT_GROUP_TEMPLATES[0].key;
    const agentsList=(agentsContacts||[]).filter(a=>a.phone).map(a=>({...a,_selected:selectedAgents.includes(a.id)}));
    const gList=groupsList.map(g=>({...g,_selected:!!g.enabled}));
    if(agentsList.length===0&&gList.length===0){toast("⚠️ אין מתווכים או קבוצות זמינים");return}
    setPreview({time:timeStr||null,text:initText,template:initTemplate,saveCustom:false,agents:agentsList,groups:gList,progress:null,sourceProp});
  }
  function applyTemplate(key){
    if(!preview||!preview.sourceProp)return;
    const tpl=AGENT_GROUP_TEMPLATES.find(t=>t.key===key);
    if(!tpl)return;
    setPreview(p=>p?{...p,text:tpl.build(p.sourceProp),template:key}:p);
  }
  function loadCustomForPreview(){
    if(!preview||!preview.sourceProp)return;
    const saved=(customAgentTexts||{})[propKeyOf(preview.sourceProp)];
    if(!saved){toast("⚠️ אין טקסט מותאם שמור");return}
    setPreview(p=>p?{...p,text:saved,template:"custom"}:p);
  }
  function resetToTemplate(){
    if(!preview||!preview.sourceProp)return;
    const tpl=AGENT_GROUP_TEMPLATES[0];
    setPreview(p=>p?{...p,text:tpl.build(p.sourceProp),template:tpl.key,saveCustom:false}:p);
  }
  async function approveAndSend(){
    if(!preview||sending)return;
    const{text,agents,groups,time}=preview;
    const finalText=(text||"").trim();
    if(!finalText){toast("⚠️ ההודעה ריקה");return}
    const recipients=[
      ...agents.filter(a=>a._selected).map(a=>({to:a.phone,kind:"agent",label:a.name||a.phone})),
      ...groups.filter(g=>g._selected).map(g=>({to:g.id,kind:"group",label:g.name})),
    ];
    if(recipients.length===0){toast("⚠️ לא נבחרו יעדים לשליחה");return}
    setSending(true);
    setPreview(p=>p?{...p,progress:{sent:0,total:recipients.length,failed:[]}}:p);
    let ok=0;const failed=[];
    for(let i=0;i<recipients.length;i++){
      const r=recipients[i];
      const sent=r.kind==="group"?await sendWhatsAppGroup(r.to,finalText):await sendDirectMessage(r.to,finalText);
      if(sent)ok++;else failed.push(r.label);
      setPreview(p=>p?{...p,progress:{sent:i+1,total:recipients.length,failed:[...failed]}}:p);
      if(i<recipients.length-1)await new Promise(rs=>setTimeout(rs,3000));
    }
    if(time){
      const key=new Date().toISOString().slice(0,10)+"_"+time;
      const agentsCount=recipients.filter(r=>r.kind==="agent").length;
      const groupsCount=recipients.filter(r=>r.kind==="group").length;
      patch({lastSent:{...lastSent,[key]:{agents:agentsCount,groups:groupsCount,props:1,sentAt:new Date().toISOString()}}});
    }
    // Persist custom text for this property if the user opted in.

      const pk=propKeyOf(preview.sourceProp);
